function _sd(n) { const v = Math.sin(n * 127.1) * 43758.5453; return v - Math.floor(v); }

let birdImg = null;
function loadImg(src) {
  return new Promise(function (resolve) {
    if (!src) return resolve(null);
    const i = new Image();
    i.onload = function () { resolve(i); };
    i.onerror = function () { resolve(null); };
    i.src = src;
  });
}

// Viewer flair icons (aquilo.gg/printflair) — small solid glyphs drawn
// flanking the viewer's name. Names must match the worker's ICONS list.
function drawFlair(x, name, cx, cy, s) {
  x.fillStyle = '#000'; x.strokeStyle = '#000';
  if (name === 'heart') {
    x.beginPath(); x.moveTo(cx, cy + s);
    x.bezierCurveTo(cx - s * 1.5, cy - s * 0.3, cx - s * 0.6, cy - s * 1.2, cx, cy - s * 0.35);
    x.bezierCurveTo(cx + s * 0.6, cy - s * 1.2, cx + s * 1.5, cy - s * 0.3, cx, cy + s); x.fill();

    x.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = Math.PI * i / 5 - Math.PI / 2, r = i % 2 ? s * 0.45 : s;
      x[i ? 'lineTo' : 'moveTo'](cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    }
    x.closePath(); x.fill();
  } else if (name === 'bolt') {
    x.beginPath(); x.moveTo(cx + s * 0.35, cy - s); x.lineTo(cx - s * 0.55, cy + s * 0.2);
    x.lineTo(cx - s * 0.05, cy + s * 0.2); x.lineTo(cx - s * 0.35, cy + s);
    x.lineTo(cx + s * 0.55, cy - s * 0.15); x.lineTo(cx + s * 0.05, cy - s * 0.15);
    x.closePath(); x.fill();
  } else if (name === 'skull') {
    x.beginPath(); x.arc(cx, cy - s * 0.15, s * 0.8, 0, 7); x.fill();
    x.fillRect(cx - s * 0.45, cy + s * 0.3, s * 0.9, s * 0.55);
    x.fillStyle = '#fff';
    x.beginPath(); x.arc(cx - s * 0.32, cy - s * 0.2, s * 0.22, 0, 7); x.arc(cx + s * 0.32, cy - s * 0.2, s * 0.22, 0, 7); x.fill();
    x.fillStyle = '#000';
  } else if (name === 'flame') {
    x.beginPath(); x.moveTo(cx, cy - s);
    x.bezierCurveTo(cx + s * 0.9, cy - s * 0.2, cx + s * 0.65, cy + s * 0.7, cx, cy + s);
    x.bezierCurveTo(cx - s * 0.65, cy + s * 0.7, cx - s * 0.9, cy - s * 0.2, cx, cy - s); x.fill();
    x.fillStyle = '#fff';
    x.beginPath(); x.ellipse(cx, cy + s * 0.45, s * 0.24, s * 0.34, 0, 0, 7); x.fill();
    x.fillStyle = '#000';
  } else if (name === 'crown') {
    x.beginPath(); x.moveTo(cx - s, cy + s * 0.7); x.lineTo(cx - s, cy - s * 0.25);
    x.lineTo(cx - s * 0.4, cy + s * 0.1); x.lineTo(cx, cy - s * 0.85);
    x.lineTo(cx + s * 0.4, cy + s * 0.1); x.lineTo(cx + s, cy - s * 0.25);
    x.lineTo(cx + s, cy + s * 0.7); x.closePath(); x.fill();
  } else if (name === 'paw') {
    [[-0.62, -0.45], [0, -0.7], [0.62, -0.45]].forEach(function (p) {
      x.beginPath(); x.arc(cx + p[0] * s, cy + p[1] * s, s * 0.28, 0, 7); x.fill();
    });
    x.beginPath(); x.ellipse(cx, cy + s * 0.35, s * 0.55, s * 0.45, 0, 0, 7); x.fill();
  } else if (name === 'moon') {
    x.beginPath(); x.arc(cx, cy, s, 0, 7); x.fill();
    x.fillStyle = '#fff';
    x.beginPath(); x.arc(cx + s * 0.5, cy - s * 0.15, s * 0.85, 0, 7); x.fill();
    x.fillStyle = '#000';
  } else if (name === 'pumpkin') {
    x.beginPath(); x.ellipse(cx, cy + s * 0.1, s, s * 0.75, 0, 0, 7); x.fill();
    x.fillRect(cx - 2, cy - s * 0.95, 4, s * 0.42);
    x.strokeStyle = '#fff'; x.lineWidth = 1.5;
    x.beginPath(); x.ellipse(cx, cy + s * 0.1, s * 0.45, s * 0.72, 0, 0, 7); x.stroke();
    x.strokeStyle = '#000';
  } else if (name === 'snowman') {
    x.lineWidth = 2.5; x.strokeStyle = '#000';
    x.beginPath(); x.arc(cx, cy + s * 0.35, s * 0.6, 0, 7); x.stroke();
    x.beginPath(); x.arc(cx, cy - s * 0.45, s * 0.42, 0, 7); x.stroke();
    x.fillRect(cx - s * 0.35, cy - s * 0.95, s * 0.7, 2.5);
    x.fillRect(cx - s * 0.2, cy - s * 1.28, s * 0.4, s * 0.34);
  } else if (name === 'rose') {
    x.lineWidth = 2.5; x.strokeStyle = '#000';
    x.beginPath(); x.arc(cx, cy - s * 0.25, s * 0.55, 0, 5.2); x.stroke();
    x.beginPath(); x.arc(cx, cy - s * 0.25, s * 0.28, 1, 5.8); x.stroke();
    x.beginPath(); x.moveTo(cx, cy + s * 0.3); x.lineTo(cx, cy + s); x.stroke();
    x.beginPath(); x.ellipse(cx - s * 0.35, cy + s * 0.6, s * 0.3, s * 0.14, -0.6, 0, 7); x.fill();
  } else if (name === 'firework') {
    x.lineWidth = 2; x.strokeStyle = '#000';
    for (let i = 0; i < 8; i++) {
      const a = Math.PI * i / 4;
      x.beginPath(); x.moveTo(cx + Math.cos(a) * s * 0.3, cy + Math.sin(a) * s * 0.3);
      x.lineTo(cx + Math.cos(a) * s, cy + Math.sin(a) * s); x.stroke();

function fitFont(x, text, weight, size, style, maxW) {
  let s = size;
  while (s > 14) {
    x.font = (style || '') + ' ' + weight + ' ' + s + 'px "Segoe UI", Arial';
    if (x.measureText(text).width <= maxW) break;
    s -= 2;
  }
  return s;
}

function wrapText(x, text, size, weight, style, maxW) {
  x.font = (style || '') + ' ' + weight + ' ' + size + 'px "Segoe UI", Arial';
  const words = String(text).split(/\s+/);
  const lines = [];
  let line = '';
  for (const w of words) {
    const t = line ? line + ' ' + w : w;
    if (x.measureText(t).width > maxW && line) { lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  return lines.slice(0, 6);
}

function drawBadge(x, cx, cy, plat, r) {
  if (!PICON[plat]) return;
  r = r || 30;
  x.beginPath(); x.arc(cx, cy, r, 0, 7); x.fillStyle = '#fff'; x.fill();
  x.lineWidth = 4; x.strokeStyle = '#000'; x.stroke();
  const s = r * 1.06;
  x.save(); x.translate(cx - s / 2, cy - s / 2); x.scale(s / 24, s / 24);
  x.fillStyle = '#000'; x.fill(new Path2D(PICON[plat]));
  x.restore();
  x.fillStyle = '#000';   // the '#fff' circle fill survives restore — reset for callers
}

function _shapePath(x, cx, cy, r, shape) {
  x.beginPath();
  if (shape === 'squircle') x.roundRect(cx - r, cy - r, r * 2, r * 2, r * 0.42);
  else if (shape === 'hex') {
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 6 + i * Math.PI / 3;
      x[i ? 'lineTo' : 'moveTo'](cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    }
    x.closePath();
  } else if (shape === 'diamond') {
    x.moveTo(cx, cy - r); x.lineTo(cx + r, cy); x.lineTo(cx, cy + r); x.lineTo(cx - r, cy);
    x.closePath();
  } else x.arc(cx, cy, r, 0, 7);
}

function drawAvatar(x, img, user, cy, shape) {
  const cx = W / 2, r = 80;
  if (img) {
    x.save(); _shapePath(x, cx, cy, r, shape); x.clip();
    x.drawImage(img, cx - r, cy - r, r * 2, r * 2); x.restore();
  } else {
    _shapePath(x, cx, cy, r, shape); x.fillStyle = '#000'; x.fill();
    x.fillStyle = '#fff'; x.font = '700 52px "Segoe UI", Arial';
    x.textAlign = 'center'; x.textBaseline = 'middle';
    x.fillText(String(user || '?').slice(0, 2).toUpperCase(), cx, cy + 2);
    x.textBaseline = 'alphabetic';
  }
  _shapePath(x, cx, cy, r + 2, shape);
  x.lineWidth = 4; x.strokeStyle = '#000'; x.stroke();
  x.fillStyle = '#000';   // initials branch leaves '#fff' — reset for callers
}

// Full-perimeter personal frames (viewer flair). Drawn after content, once
// the final height is known, inset 6 dots.
function drawFrame(x, style, h) {
  x.strokeStyle = '#000'; x.fillStyle = '#000';
  if (style === 'double') {
    x.lineWidth = 2.5; x.strokeRect(5.5, 5.5, W - 11, h - 11);
    x.lineWidth = 1.5; x.strokeRect(11.5, 11.5, W - 23, h - 23);
  } else if (style === 'dashed') {
    x.lineWidth = 3; x.setLineDash([14, 10]); x.strokeRect(6, 6, W - 12, h - 12); x.setLineDash([]);
  } else if (style === 'dots') {
    for (let i = 8; i < W - 8; i += 18) { x.beginPath(); x.arc(i, 8, 2.5, 0, 7); x.arc(i, h - 8, 2.5, 0, 7); x.fill(); }
    for (let j = 8; j < h - 8; j += 18) { x.beginPath(); x.arc(8, j, 2.5, 0, 7); x.arc(W - 8, j, 2.5, 0, 7); x.fill(); }
  } else if (style === 'zigzag') {
    x.lineWidth = 2.5;
    x.beginPath();
    for (let i = 0; i <= W; i += 14) { x.lineTo(i, i % 28 ? 12 : 5); x.moveTo(i, i % 28 ? 12 : 5); x.lineTo(i + 14, (i + 14) % 28 ? 12 : 5); }
    x.stroke();
    x.beginPath();
    for (let i = 0; i <= W; i += 14) { x.moveTo(i, h - (i % 28 ? 12 : 5)); x.lineTo(i + 14, h - ((i + 14) % 28 ? 12 : 5)); }
    x.stroke();
    x.beginPath();
    for (let j = 0; j <= h; j += 14) { x.moveTo(j % 28 ? 12 : 5, j); x.lineTo((j + 14) % 28 ? 12 : 5, j + 14); }
    x.stroke();
    x.beginPath();
    for (let j = 0; j <= h; j += 14) { x.moveTo(W - (j % 28 ? 12 : 5), j); x.lineTo(W - ((j + 14) % 28 ? 12 : 5), j + 14); }
    x.stroke();
  }
}

// Draws one CAH-style card at yTop. dark=true → black card with white text;
// otherwise a white card with a black border + black text. Left-aligned body
// with a tiny logo mark bottom-left. Returns the bottom y.
function drawCahCard(x, yTop, text, dark) {
  const M = 34, cardW = W - M * 2, pad = 26, fs = 30, lh = 40, brandH = 30;
  const maxW = cardW - pad * 2;
  x.font = '700 ' + fs + 'px "Segoe UI", Arial';
  const words = String(text).split(/\s+/);
  const lines = [];
  let ln = '';
  for (const w of words) {
    const t = ln ? ln + ' ' + w : w;
    if (x.measureText(t).width > maxW && ln) { lines.push(ln); ln = w; }
    else ln = t;
  }
  if (ln) lines.push(ln);
  const cardH = pad + lines.length * lh + brandH;
  x.beginPath(); x.roundRect(M, yTop, cardW, cardH, 16);
  if (dark) { x.fillStyle = '#000'; x.fill(); }
  else { x.fillStyle = '#fff'; x.fill(); x.lineWidth = 3; x.strokeStyle = '#000'; x.stroke(); }
  x.fillStyle = dark ? '#fff' : '#000';
  x.textAlign = 'left';
  let ty = yTop + pad + fs * 0.78;
  for (const l of lines) { x.fillText(l, M + pad, ty); ty += lh; }
  const sq = 15, by = yTop + cardH - 12;
  x.fillStyle = dark ? '#fff' : '#000';
  x.fillRect(M + pad, by - sq + 2, sq, sq);
  x.font = '700 13px "Segoe UI", Arial';
  x.fillText(CAH_MARK, M + pad + sq + 8, by);
  x.textAlign = 'center'; x.fillStyle = '#000';   // reset shared state for the caller
  return yTop + cardH;
}

// Draws the job, returns the y coordinate just below the last element.
async function drawJob(x, job) {
  x.fillStyle = '#000'; x.textAlign = 'center';
  const MAXW = 520;
  let y = 24;

  const vars = THEMES[job.theme] || null;
  const seed = Number(job._receiptNo) || 0;
  const th = vars ? vars[seed % vars.length] : null;
  if (th) { th.top(x, seed); x.fillStyle = '#000'; x.strokeStyle = '#000'; y = 62; }

  if (!birdImg) birdImg = await loadImg(BIRD);
  if (birdImg) { x.drawImage(birdImg, W / 2 - 55, y, 110, 80); y += 80 + 38; }

  const av = await loadImg(job.avatarData);
  if (job.user) {
    drawAvatar(x, av, job.user, y + 80, job.flairShape || '');
    drawBadge(x, W / 2 + 57, y + 137, job.platform);
    y += 196;
    const s = fitFont(x, job.user, 700, 40, '', MAXW);
    y += s;
    const nw = x.measureText(job.user).width;
    if (job.flairName === 'pill') {
      x.beginPath(); x.roundRect(W / 2 - nw / 2 - 18, y - s + 2, nw + 36, s + 14, (s + 14) / 2); x.fill();
      x.fillStyle = '#fff'; x.fillText(job.user, W / 2, y + 3); x.fillStyle = '#000';
      y += 8;
    } else if (job.flairName === 'outline') {
      x.lineWidth = 2.2; x.strokeStyle = '#000'; x.strokeText(job.user, W / 2, y);
    } else {
      x.fillText(job.user, W / 2, y);
    }
    const emImg = job.flairEmoteData ? await loadImg(job.flairEmoteData) : null;
    if (emImg || job.flairIcon) {
      const fx = Math.min(nw / 2 + (job.flairName === 'pill' ? 46 : 32), W / 2 - 20);
      if (emImg) {
        // Viewer's own emote as the stamp — contrast-boosted like gift art.
        x.save(); x.filter = 'grayscale(1) contrast(1.8) brightness(0.9)';
        x.drawImage(emImg, W / 2 - fx - 16, y - s * 0.32 - 16, 32, 32);
        x.drawImage(emImg, W / 2 + fx - 16, y - s * 0.32 - 16, 32, 32);
        x.filter = 'none'; x.restore();
      } else {
        drawFlair(x, job.flairIcon, W / 2 - fx, y - s * 0.32, 13);
        drawFlair(x, job.flairIcon, W / 2 + fx, y - s * 0.32, 13);
      }
      x.fillStyle = '#000';
    }
    y += 10;
  } else if (PICON[job.platform]) {
    drawBadge(x, W / 2, y + 34, job.platform, 34); y += 84;
  }

  if (job.action) {
    x.font = '400 24px "Segoe UI", Arial';
    y += 24; x.fillText(job.action, W / 2, y); y += 8;
  }

  if (job.banner) {
    y += 14;
    const h = 64;
    const text = String(job.banner).toUpperCase();
    x.fillStyle = '#000';
    x.fillRect(0, y, W, h);
    x.fillStyle = '#fff';
    try { x.letterSpacing = '4px'; } catch (e) {}
    const s = fitFont(x, text, 700, 36, '', MAXW);
    x.fillText(text, W / 2, y + h / 2 + s * 0.36);
    try { x.letterSpacing = '0px'; } catch (e) {}
    x.fillStyle = '#000';
    y += h + 10;
  }

  // Cards Against Humanity: the black prompt card, then the white answer
  // card(s), each joined by a connector caret. Read the prompt, reveal the rest.
  if (job.cahBlack) {
    y += 20;
    y = drawCahCard(x, y, job.cahBlack, true);
    const whites = job.cahWhites || [];
    for (const wc of whites) {
      y += 12;
      x.fillStyle = '#000';
      x.beginPath(); x.moveTo(W / 2 - 13, y); x.lineTo(W / 2 + 13, y); x.lineTo(W / 2, y + 15); x.closePath(); x.fill();
      y += 24;
      y = drawCahCard(x, y, String(wc), false);
    }
    y += 4;
  }

  // Big image (meme prints): full-width dithered frame with a border.
  const big = await loadImg(job.bigImageData);
  if (big && big.width) {
    y += 14;
    const bw = 460, bh = Math.max(60, Math.min(420, Math.round(bw * big.height / big.width)));
    x.save(); x.filter = 'grayscale(1) contrast(1.6)';
    x.drawImage(big, (W - bw) / 2, y, bw, bh);
    x.filter = 'none'; x.restore();
    x.lineWidth = 3; x.strokeStyle = '#000';
    x.strokeRect((W - bw) / 2 + 1.5, y + 1.5, bw - 3, bh - 3);
    y += bh + 8;
  }

  const gift = await loadImg(job.giftIconData);
  if (gift) {
    y += 12;
    const r = 52, cx = W / 2, cy = y + r;
    x.save(); x.beginPath(); x.arc(cx, cy, r - 6, 0, 7); x.clip();
    x.filter = 'grayscale(1) contrast(1.9) brightness(0.85)';
    x.drawImage(gift, cx - r + 6, cy - r + 6, (r - 6) * 2, (r - 6) * 2);
    x.filter = 'none'; x.restore();
    x.beginPath(); x.arc(cx, cy, r, 0, 7); x.lineWidth = 5; x.strokeStyle = '#000'; x.stroke();
    y += r * 2 + 10;
  }
  if (job.giftLabel) {
    x.font = '600 28px "Segoe UI", Arial';
    y += 28; x.fillText(job.giftLabel, W / 2, y); y += 6;
  }

  if (job.bigNum) {
    y += 16;
    const s = fitFont(x, String(job.bigNum), 700, 72, '', MAXW);
    y += s; x.fillText(String(job.bigNum), W / 2, y);
    if (job.bigNumLabel) {
      x.font = '400 24px "Segoe UI", Arial';
      y += 32; x.fillText(job.bigNumLabel, W / 2, y);
    }
    y += 6;
  }

  if (job.recipients && job.recipients.length) {
    y += 30;
    try { x.letterSpacing = '4px'; } catch (e) {}
    x.font = '600 20px "Segoe UI", Arial';
    x.fillText('WENT TO', W / 2, y);
    try { x.letterSpacing = '0px'; } catch (e) {}
    y += 14;
    x.textAlign = 'left'; x.font = '400 24px "Segoe UI", Arial';
    const names = job.recipients.slice(0, 12);
    for (let i = 0; i < names.length; i += 2) {
      y += 34;
      x.fillText('→ ' + names[i], 90, y);
      if (names[i + 1]) x.fillText('→ ' + names[i + 1], 320, y);
    }
    x.textAlign = 'center';
    y += 6;
  }

  if (job.message) {
    y += 18;
    const lines = wrapText(x, '"' + job.message + '"', 26, 400, 'italic', MAXW);
    for (const ln of lines) { y += 34; x.fillText(ln, W / 2, y); }
  }

  if (job.rows && job.rows.length) {
    y += 16;
    for (const r of job.rows.slice(0, 12)) {
      y += 34;
      x.textAlign = 'left'; x.font = '400 24px "Segoe UI", Arial';
      x.fillText(String(r.label), 70, y);
      x.textAlign = 'right'; x.font = '700 26px "Segoe UI", Arial';
      x.fillText(String(r.value), W - 70, y);
    }
    x.textAlign = 'center';
    y += 6;
  }

  const t = new Date();
  let hh = t.getHours(); const ap = hh >= 12 ? 'pm' : 'am'; hh = hh % 12 || 12;
  const time = hh + ':' + String(t.getMinutes()).padStart(2, '0') + ' ' + ap;
  const footer = job.footer ||
    ('receipt #' + String(job._receiptNo || 0).padStart(4, '0') + ' · ' + time + ' · thank you <3');
  x.font = '400 20px "Segoe UI", Arial';
  y += 40; x.fillText(footer, W / 2, y);
  if (th && th.foot) { th.foot(x, y, seed); x.fillStyle = '#000'; x.strokeStyle = '#000'; }
  if (job.flairTag) {
    x.font = 'italic 400 19px "Segoe UI", Arial';
    y += 28; x.fillText('“' + job.flairTag + '”', W / 2, y);
  }
  // Approved viewer doodle: 16×16 1-bit pixel art, 5-dot cells, centered.
  if (job.flairDoodle && /^[0-9a-f]{64}$/.test(job.flairDoodle)) {
    y += 14;
    const cell = 5, dx = W / 2 - 8 * cell;
    x.fillStyle = '#000';
    for (let p = 0; p < 256; p++) {
      const byte = parseInt(job.flairDoodle.substr((p >> 3) * 2, 2), 16);
      if (byte & (0x80 >> (p & 7))) x.fillRect(dx + (p % 16) * cell, y + ((p / 16) | 0) * cell, cell, cell);
    }
    y += 16 * cell;
  }

  return y;
}

// Floyd–Steinberg to 1bpp packed rows (MSB first, 1 = ink), serpentine scan.
function ditherPack(x, height) {
  const d = x.getImageData(0, 0, W, height).data;
  const lum = new Float32Array(W * height);
  for (let i = 0; i < W * height; i++) {
    const a = d[i * 4 + 3] / 255;
    lum[i] = (0.299 * d[i * 4] + 0.587 * d[i * 4 + 1] + 0.114 * d[i * 4 + 2]) * a + 255 * (1 - a);
  }
  const out = new Uint8Array(WIDTH_BYTES * height);
  for (let y = 0; y < height; y++) {
    const ltr = (y % 2 === 0);
    for (let k = 0; k < W; k++) {
      const xx = ltr ? k : W - 1 - k, i = y * W + xx;
      const old = lum[i], nv = old < 128 ? 0 : 255, err = old - nv;
      lum[i] = nv;
      if (nv === 0) out[y * WIDTH_BYTES + (xx >> 3)] |= (0x80 >> (xx & 7));
      const dir = ltr ? 1 : -1;
      if (xx + dir >= 0 && xx + dir < W) lum[i + dir] += err * 7 / 16;
      if (y + 1 < height) {
        if (xx - dir >= 0 && xx - dir < W) lum[i + W - dir] += err * 3 / 16;
        lum[i + W] += err * 5 / 16;
        if (xx + dir >= 0 && xx + dir < W) lum[i + W + dir] += err * 1 / 16;
      }
    }
  }
  return out;
}

// Last row containing any ink — the crop line that guarantees no trailing
// blank paper beyond BOTTOM_PAD.
function lastInkRow(packed, height) {
  for (let y = height - 1; y >= 0; y--) {
    for (let b = 0; b < WIDTH_BYTES; b++) {
      if (packed[y * WIDTH_BYTES + b] !== 0) return y;
    }
  }
  return 0;
}

ipcRenderer.on('printer-render-job', async function (ev, payload) {
  const chan = 'printer-render-done-' + payload.id;
  try {
    const c = document.createElement('canvas');
    c.width = W; c.height = 2400;
    const x = c.getContext('2d', { willReadFrequently: true });
    x.fillStyle = '#fff'; x.fillRect(0, 0, W, c.height);
    const drawnY = await drawJob(x, payload.job || {});
    const roughH = Math.min(c.height, Math.ceil(drawnY + BOTTOM_PAD));
    if (payload.job && payload.job.flairFrame) drawFrame(x, payload.job.flairFrame, roughH);
    const packed = ditherPack(x, roughH);
    const height = Math.min(roughH, lastInkRow(packed, roughH) + 1 + BOTTOM_PAD);
    const cropped = packed.slice(0, WIDTH_BYTES * height);
    let bin = '';
    for (let i = 0; i < cropped.length; i++) bin += String.fromCharCode(cropped[i]);
    // Paper-styled PNG of the exact dithered raster — used by the Discord
    // mirror so the channel sees precisely what came out of the printer.
    const vis = document.createElement('canvas');
    vis.width = W; vis.height = height;
    const vx = vis.getContext('2d');
    const vd = vx.createImageData(W, height);
    for (let y = 0; y < height; y++) for (let px = 0; px < W; px++) {
      const on = (cropped[y * WIDTH_BYTES + (px >> 3)] >> (7 - (px & 7))) & 1;
      const o = (y * W + px) * 4;
      vd.data[o] = on ? 40 : 249; vd.data[o + 1] = on ? 36 : 246; vd.data[o + 2] = on ? 30 : 237; vd.data[o + 3] = 255;
    }
    vx.putImageData(vd, 0, 0);
    const pngB64 = vis.toDataURL('image/png').split(',')[1];
    ipcRenderer.send(chan, { ok: true, rasterB64: btoa(bin), widthBytes: WIDTH_BYTES, height: height, pngB64: pngB64 });
  } catch (e) {
    ipcRenderer.send(chan, { ok: false, error: (e && e.message) || 'draw error' });
  }
});
</script>
