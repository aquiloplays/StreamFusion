<!doctype html>
<!-- Hidden receipt renderer for printer.js. Draws each print job on a
     576-dot-wide canvas (80mm ESC/POS raster width), Floyd–Steinberg
     dithers to 1-bit, bottom-crops to the last ink row (no blank paper
     before the cut) and returns packed raster rows over IPC. -->
<meta charset="utf-8">
<body>
<script>
const { ipcRenderer } = require('electron');

const W = 576, WIDTH_BYTES = 72;
const BOTTOM_PAD = 16;      // dots of quiet zone before the cut — keep tight

const BIRD = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="140 280 744 540">' +
  '<path d="M512 408 C 538 480 542 612 512 786 C 482 612 486 480 512 408 Z" fill="#000"/>' +
  '<path d="M505 452 C 410 408 290 366 180 318 C 268 432 372 492 498 520 Z" fill="#000"/>' +
  '<path d="M519 452 C 614 408 734 366 844 318 C 756 432 652 492 526 520 Z" fill="#000"/></svg>');

const PICON = {
  tw: 'M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z',
  yt: 'M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z',
  tt: 'M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z',
  kk: 'M2 0h7v9h3V6h3V3h3V0h4v7h-3v3h-3v4h3v3h3v7h-4v-3h-3v-3h-3v-3H9v9H2z'
};
const PLAT_NAME = { tw: 'twitch', kk: 'kick', yt: 'youtube', tt: 'tiktok', sys: '' };

// ── Seasonal themes ──────────────────────────────────────────────────────────
// Decoration layers only — receipt content is untouched. `top` draws in the
// first ~56 dots (content shifts down to clear it); `foot` draws small flanks
// at the footer baseline so themed receipts stay exactly as short. The job's
// `theme` field is resolved main-side (printer.js) from the pane setting.
function _sd(n) { const v = Math.sin(n * 127.1) * 43758.5453; return v - Math.floor(v); }
function _leaf(x, cx, cy, s, rot) {
  x.save(); x.translate(cx, cy); x.rotate(rot || 0);
  x.beginPath(); x.moveTo(0, -s); x.quadraticCurveTo(s * 0.9, 0, 0, s);
  x.quadraticCurveTo(-s * 0.9, 0, 0, -s); x.fill(); x.restore();
}
function _snow(x, cx, cy, r) {
  x.lineWidth = 2.5; x.strokeStyle = '#000'; x.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI * i / 3, dx = Math.cos(a), dy = Math.sin(a);
    x.moveTo(cx, cy); x.lineTo(cx + dx * r, cy + dy * r);
    x.moveTo(cx + dx * r * 0.55 - dy * r * 0.22, cy + dy * r * 0.55 + dx * r * 0.22); x.lineTo(cx + dx * r * 0.75, cy + dy * r * 0.75);
    x.moveTo(cx + dx * r * 0.55 + dy * r * 0.22, cy + dy * r * 0.55 - dx * r * 0.22); x.lineTo(cx + dx * r * 0.75, cy + dy * r * 0.75);
  }
  x.stroke();
}
function _sprout(x, cx, cy, s) {
  x.lineWidth = 3.5; x.strokeStyle = '#000';
  x.beginPath(); x.moveTo(cx, cy + s); x.quadraticCurveTo(cx, cy, cx, cy - s * 0.3); x.stroke();
  _leaf(x, cx - s * 0.45, cy - s * 0.4, s * 0.5, -0.9);
  _leaf(x, cx + s * 0.45, cy - s * 0.4, s * 0.5, 0.9);
}
function _sun(x, cx, cy, r) {
  x.lineWidth = 4; x.strokeStyle = '#000';
  x.beginPath(); x.arc(cx, cy, r, 0, 7); x.stroke();
  for (let i = 0; i < 12; i++) {
    const a = Math.PI * i / 6;
    x.beginPath(); x.moveTo(cx + Math.cos(a) * (r + 6), cy + Math.sin(a) * (r + 6));
    x.lineTo(cx + Math.cos(a) * (r + 15), cy + Math.sin(a) * (r + 15)); x.stroke();
  }
}
function _waveRow(x, y) {
  x.lineWidth = 3; x.strokeStyle = '#000'; x.beginPath();
  for (let i = 0; i < 10; i++) { x.moveTo(i * 64, y); x.quadraticCurveTo(i * 64 + 32, y - 14, i * 64 + 64, y); }
  x.stroke();
}
const THEMES = {
  spring: {
    top: function (x) { for (let i = 0; i < 7; i++) _sprout(x, 45 + i * 82, 26, 15); },
    foot: function (x, fy) { _sprout(x, 68, fy - 16, 12); _sprout(x, 508, fy - 16, 12); }
  },
  summer: {
    top: function (x) { _waveRow(x, 22); _waveRow(x, 38); _sun(x, 62, 96, 19); },
    foot: function (x, fy) {
      x.lineWidth = 3; x.strokeStyle = '#000';
      [50, 478].forEach(function (sx) {
        x.beginPath(); x.moveTo(sx, fy - 6); x.quadraticCurveTo(sx + 12, fy - 16, sx + 24, fy - 6);
        x.quadraticCurveTo(sx + 36, fy + 4, sx + 48, fy - 6); x.stroke();
      });
    }
  },
  autumn: {
    top: function (x) {
      for (let i = 0; i < 8; i++) _leaf(x, 30 + _sd(i) * 516, 14 + _sd(i + 5) * 34, 9 + _sd(i + 2) * 6, _sd(i) * 3);
      _leaf(x, 46, 108, 13, 0.5); _leaf(x, 530, 102, 13, -0.4);
    },
    foot: function (x, fy) { _leaf(x, 66, fy - 8, 11, 0.9); _leaf(x, 510, fy - 8, 11, -0.7); }
  },
  winter: {
    top: function (x) {
      x.fillStyle = '#000'; x.fillRect(0, 0, W, 8);
      for (let i = 0; i < 12; i++) {
        const ix = 14 + i * 48;
        x.beginPath(); x.moveTo(ix, 8); x.lineTo(ix + 9, 8); x.lineTo(ix + 4.5, 8 + 12 + _sd(i) * 20); x.closePath(); x.fill();
      }
      _snow(x, 48, 100, 13); _snow(x, 528, 94, 12);
    },
    foot: function (x, fy) { _snow(x, 66, fy - 7, 11); _snow(x, 510, fy - 7, 12); }
  }
};

let birdImg = null;
function loadImg(src) {
  return new Promise(function (resolve) {
    if (!src) return resolve(null);
    const i = new Image();
    i.onload = function () { resolve(i); };
    i.onerror = function () { resolve(null); };
    i.src = src;
  });
}

function fitFont(x, text, weight, size, style, maxW) {
  let s = size;
  while (s > 14) {
    x.font = (style || '') + ' ' + weight + ' ' + s + 'px "Segoe UI", Arial';
    if (x.measureText(text).width <= maxW) break;
    s -= 2;
  }
  return s;
}

function wrapText(x, text, size, weight, style, maxW) {
  x.font = (style || '') + ' ' + weight + ' ' + size + 'px "Segoe UI", Arial';
  const words = String(text).split(/\s+/);
  const lines = [];
  let line = '';
  for (const w of words) {
    const t = line ? line + ' ' + w : w;
    if (x.measureText(t).width > maxW && line) { lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  return lines.slice(0, 6);
}

function drawBadge(x, cx, cy, plat, r) {
  if (!PICON[plat]) return;
  r = r || 30;
  x.beginPath(); x.arc(cx, cy, r, 0, 7); x.fillStyle = '#fff'; x.fill();
  x.lineWidth = 4; x.strokeStyle = '#000'; x.stroke();
  const s = r * 1.06;
  x.save(); x.translate(cx - s / 2, cy - s / 2); x.scale(s / 24, s / 24);
  x.fillStyle = '#000'; x.fill(new Path2D(PICON[plat]));
  x.restore();
  x.fillStyle = '#000';   // the '#fff' circle fill survives restore — reset for callers
}

function drawAvatar(x, img, user, cy) {
  const cx = W / 2, r = 80;
  if (img) {
    x.save(); x.beginPath(); x.arc(cx, cy, r, 0, 7); x.clip();
    x.drawImage(img, cx - r, cy - r, r * 2, r * 2); x.restore();
  } else {
    x.beginPath(); x.arc(cx, cy, r, 0, 7); x.fillStyle = '#000'; x.fill();
    x.fillStyle = '#fff'; x.font = '700 52px "Segoe UI", Arial';
    x.textAlign = 'center'; x.textBaseline = 'middle';
    x.fillText(String(user || '?').slice(0, 2).toUpperCase(), cx, cy + 2);
    x.textBaseline = 'alphabetic';
  }
  x.beginPath(); x.arc(cx, cy, r + 2, 0, 7);
  x.lineWidth = 4; x.strokeStyle = '#000'; x.stroke();
  x.fillStyle = '#000';   // initials branch leaves '#fff' — reset for callers
}

// Draws the job, returns the y coordinate just below the last element.
async function drawJob(x, job) {
  x.fillStyle = '#000'; x.textAlign = 'center';
  const MAXW = 520;
  let y = 24;

  const th = THEMES[job.theme] || null;
  if (th) { th.top(x); x.fillStyle = '#000'; x.strokeStyle = '#000'; y = 62; }

  if (!birdImg) birdImg = await loadImg(BIRD);
  if (birdImg) { x.drawImage(birdImg, W / 2 - 55, y, 110, 80); y += 80 + 38; }

  const av = await loadImg(job.avatarData);
  if (job.user) {
    drawAvatar(x, av, job.user, y + 80);
    drawBadge(x, W / 2 + 57, y + 137, job.platform);
    y += 196;
    const s = fitFont(x, job.user, 700, 40, '', MAXW);
    y += s; x.fillText(job.user, W / 2, y); y += 10;
  } else if (PICON[job.platform]) {
    drawBadge(x, W / 2, y + 34, job.platform, 34); y += 84;
  }

  if (job.action) {
    x.font = '400 24px "Segoe UI", Arial';
    y += 24; x.fillText(job.action, W / 2, y); y += 8;
  }

  if (job.banner) {
    y += 14;
    const h = 64;
    const text = String(job.banner).toUpperCase();
    x.fillStyle = '#000';
    x.fillRect(0, y, W, h);
    x.fillStyle = '#fff';
    try { x.letterSpacing = '4px'; } catch (e) {}
    const s = fitFont(x, text, 700, 36, '', MAXW);
    x.fillText(text, W / 2, y + h / 2 + s * 0.36);
    try { x.letterSpacing = '0px'; } catch (e) {}
    x.fillStyle = '#000';
    y += h + 10;
  }

  const gift = await loadImg(job.giftIconData);
  if (gift) {
    y += 12;
    const r = 52, cx = W / 2, cy = y + r;
    x.save(); x.beginPath(); x.arc(cx, cy, r - 6, 0, 7); x.clip();
    x.filter = 'grayscale(1) contrast(1.9) brightness(0.85)';
    x.drawImage(gift, cx - r + 6, cy - r + 6, (r - 6) * 2, (r - 6) * 2);
    x.filter = 'none'; x.restore();
    x.beginPath(); x.arc(cx, cy, r, 0, 7); x.lineWidth = 5; x.strokeStyle = '#000'; x.stroke();
    y += r * 2 + 10;
  }
  if (job.giftLabel) {
    x.font = '600 28px "Segoe UI", Arial';
    y += 28; x.fillText(job.giftLabel, W / 2, y); y += 6;
  }

  if (job.bigNum) {
    y += 16;
    const s = fitFont(x, String(job.bigNum), 700, 72, '', MAXW);
    y += s; x.fillText(String(job.bigNum), W / 2, y);
    if (job.bigNumLabel) {
      x.font = '400 24px "Segoe UI", Arial';
      y += 32; x.fillText(job.bigNumLabel, W / 2, y);
    }
    y += 6;
  }

  if (job.recipients && job.recipients.length) {
    y += 30;
    try { x.letterSpacing = '4px'; } catch (e) {}
    x.font = '600 20px "Segoe UI", Arial';
    x.fillText('WENT TO', W / 2, y);
    try { x.letterSpacing = '0px'; } catch (e) {}
    y += 14;
    x.textAlign = 'left'; x.font = '400 24px "Segoe UI", Arial';
    const names = job.recipients.slice(0, 12);
    for (let i = 0; i < names.length; i += 2) {
      y += 34;
      x.fillText('→ ' + names[i], 90, y);
      if (names[i + 1]) x.fillText('→ ' + names[i + 1], 320, y);
    }
    x.textAlign = 'center';
    y += 6;
  }

  if (job.message) {
    y += 18;
    const lines = wrapText(x, '"' + job.message + '"', 26, 400, 'italic', MAXW);
    for (const ln of lines) { y += 34; x.fillText(ln, W / 2, y); }
  }

  if (job.rows && job.rows.length) {
    y += 16;
    for (const r of job.rows.slice(0, 12)) {
      y += 34;
      x.textAlign = 'left'; x.font = '400 24px "Segoe UI", Arial';
      x.fillText(String(r.label), 70, y);
      x.textAlign = 'right'; x.font = '700 26px "Segoe UI", Arial';
      x.fillText(String(r.value), W - 70, y);
    }
    x.textAlign = 'center';
    y += 6;
  }

  const t = new Date();
  let hh = t.getHours(); const ap = hh >= 12 ? 'pm' : 'am'; hh = hh % 12 || 12;
  const time = hh + ':' + String(t.getMinutes()).padStart(2, '0') + ' ' + ap;
  const footer = job.footer ||
    ('receipt #' + String(job._receiptNo || 0).padStart(4, '0') + ' · ' + time + ' · thank you <3');
  x.font = '400 20px "Segoe UI", Arial';
  y += 40; x.fillText(footer, W / 2, y);
  if (th && th.foot) { th.foot(x, y); x.fillStyle = '#000'; x.strokeStyle = '#000'; }

  return y;
}

// Floyd–Steinberg to 1bpp packed rows (MSB first, 1 = ink), serpentine scan.
function ditherPack(x, height) {
  const d = x.getImageData(0, 0, W, height).data;
  const lum = new Float32Array(W * height);
  for (let i = 0; i < W * height; i++) {
    const a = d[i * 4 + 3] / 255;
    lum[i] = (0.299 * d[i * 4] + 0.587 * d[i * 4 + 1] + 0.114 * d[i * 4 + 2]) * a + 255 * (1 - a);
  }
  const out = new Uint8Array(WIDTH_BYTES * height);
  for (let y = 0; y < height; y++) {
    const ltr = (y % 2 === 0);
    for (let k = 0; k < W; k++) {
      const xx = ltr ? k : W - 1 - k, i = y * W + xx;
      const old = lum[i], nv = old < 128 ? 0 : 255, err = old - nv;
      lum[i] = nv;
      if (nv === 0) out[y * WIDTH_BYTES + (xx >> 3)] |= (0x80 >> (xx & 7));
      const dir = ltr ? 1 : -1;
      if (xx + dir >= 0 && xx + dir < W) lum[i + dir] += err * 7 / 16;
      if (y + 1 < height) {
        if (xx - dir >= 0 && xx - dir < W) lum[i + W - dir] += err * 3 / 16;
        lum[i + W] += err * 5 / 16;
        if (xx + dir >= 0 && xx + dir < W) lum[i + W + dir] += err * 1 / 16;
      }
    }
  }
  return out;
}

// Last row containing any ink — the crop line that guarantees no trailing
// blank paper beyond BOTTOM_PAD.
function lastInkRow(packed, height) {
  for (let y = height - 1; y >= 0; y--) {
    for (let b = 0; b < WIDTH_BYTES; b++) {
      if (packed[y * WIDTH_BYTES + b] !== 0) return y;
    }
  }
  return 0;
}

ipcRenderer.on('printer-render-job', async function (ev, payload) {
  const chan = 'printer-render-done-' + payload.id;
  try {
    const c = document.createElement('canvas');
    c.width = W; c.height = 2400;
    const x = c.getContext('2d', { willReadFrequently: true });
    x.fillStyle = '#fff'; x.fillRect(0, 0, W, c.height);
    const drawnY = await drawJob(x, payload.job || {});
    const roughH = Math.min(c.height, Math.ceil(drawnY + BOTTOM_PAD));
    const packed = ditherPack(x, roughH);
    const height = Math.min(roughH, lastInkRow(packed, roughH) + 1 + BOTTOM_PAD);
    const cropped = packed.slice(0, WIDTH_BYTES * height);
    let bin = '';
    for (let i = 0; i < cropped.length; i++) bin += String.fromCharCode(cropped[i]);
    // Paper-styled PNG of the exact dithered raster — used by the Discord
    // mirror so the channel sees precisely what came out of the printer.
    const vis = document.createElement('canvas');
    vis.width = W; vis.height = height;
    const vx = vis.getContext('2d');
    const vd = vx.createImageData(W, height);
    for (let y = 0; y < height; y++) for (let px = 0; px < W; px++) {
      const on = (cropped[y * WIDTH_BYTES + (px >> 3)] >> (7 - (px & 7))) & 1;
      const o = (y * W + px) * 4;
      vd.data[o] = on ? 40 : 249; vd.data[o + 1] = on ? 36 : 246; vd.data[o + 2] = on ? 30 : 237; vd.data[o + 3] = 255;
    }
    vx.putImageData(vd, 0, 0);
    const pngB64 = vis.toDataURL('image/png').split(',')[1];
    ipcRenderer.send(chan, { ok: true, rasterB64: btoa(bin), widthBytes: WIDTH_BYTES, height: height, pngB64: pngB64 });
  } catch (e) {
    ipcRenderer.send(chan, { ok: false, error: (e && e.message) || 'draw error' });
  }
});
</script>
