<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>StreamFusion — Chat Overlay</title>
<style>
  /* ───────────────────────────────────────────────────────────────────────
     StreamFusion OBS chat overlay — transparent-background browser source.
     Connects to /events?type=chat via SSE.

     1.4.9 design refresh — removed the "Gamer HUD" theme (busy per-msg
     cards with shine sweeps + pulsing borders) in favor of a single
     clean "card" layout inspired by the common multi-chat overlay
     pattern on nutty.gg and similar streamer widgets:
       - each message is a compact rounded card
       - small avatar + platform-colored username head row
       - message text on its own line below, wraps cleanly
       - subtle dark background, platform-tinted left accent
     The alternative "box" theme still exists for streamers who want
     one unified panel with no per-msg chrome.

     TikTok gift floating animation was rewritten to confine itself to
     the TOP half of the canvas — previously it drifted from the
     bottom-right up through the chat feed, covering messages. Now the
     zone is fixed to the upper 50vh so the streamer's chat stays clear.
     ─────────────────────────────────────────────────────────────────── */

  :root {
    --msg-bg-op: 0.85;       /* per-message card bg opacity (card theme) */
    --box-op: 0.8;           /* whole-feed container bg (box theme) */
    --box-color: 20, 20, 24;
    --font-size: 16px;
    --event-size: 13px;
    --accent: #3A86FF;
    --text: #ffffff;
    --mut: #cfd2dc;
    --tw: #a970ff;
    --yt: #ff4545;
    --tt: #fe2c55;
    --kk: #53fc18;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  /* ──────────────────────────────────────────────────────────────────
     Feed. Messages stack upward from the bottom so the newest line
     sits where the streamer's eye tracks. The feed gets out of the
     way of the TT gift zone (top half) by default.
     ────────────────────────────────────────────────────────────────── */
  #feed {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    /* Cap at 55vh so chat never grows into the upper half where the
       gift animations play. Users who disable gift animations can
       reclaim the full height via --feed-max override if needed. */
    max-height: var(--feed-max, 55vh);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    pointer-events: none;
  }

  /* Box theme: gradient container wraps every message. Per-msg chrome
     disappears. Text reads as a flowing transcript inside a single bordered
     panel. The container auto-sizes to the message count (maxMessages
     setting drives content height) so the streamer's overlay isn't a fat
     empty rectangle when chat is quiet. Capped at 95vh as a safety so a
     wildly-high maxMessages can't push the bottom of the box off-screen.
     overflow:hidden ensures messages can never appear *outside* the
     gradient frame mid-animation. */
  body.theme-box #feed {
    left: 10px; right: 10px; bottom: 10px;
    max-height: 95vh;
    padding: 14px 16px 12px;
    background:
      linear-gradient(135deg,
        rgba(58, 134, 255, 0.16),
        rgba(0, 229, 160, 0.10) 55%,
        rgba(58, 134, 255, 0.06)),
      rgba(var(--box-color), var(--box-op));
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.30);
  }

  /* No-background variant: same auto-size and inner flat-message styling
     as theme-box, but no gradient frame. For streamers who want the
     transcript style on a transparent overlay (or layered under a custom
     OBS background source). */
  body.theme-nobg #feed {
    left: 10px; right: 10px; bottom: 10px;
    max-height: 95vh;
    padding: 6px 10px 8px;
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  /* ──────────────────────────────────────────────────────────────────
     Message card — the default "card" theme. One row per message.
     Left column: avatar (if enabled) at card-head height.
     Right column: head row (platform chip + badges + username) then
     message text underneath wrapping naturally.
     ────────────────────────────────────────────────────────────────── */
  .msg {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 12px 8px 14px;
    margin-top: 5px;
    border-radius: 9px;
    background: rgba(14, 14, 16, var(--msg-bg-op));
    border-left: 3px solid var(--accent);
    font-size: var(--font-size);
    line-height: 1.35;
    word-break: break-word;
    opacity: 0;
    transform: translateY(6px);
    animation: msgIn .28s cubic-bezier(.22,.9,.32,1) forwards;
  }
  /* 1.4.9: only messages from the last 400ms animate — a burst of
     back-to-back messages shouldn't all replay the in animation,
     which causes stutter. Older nodes skip the animation and just
     appear. The body class is toggled from JS when messages arrive
     faster than the animation's runtime. */
  body.quiet-anim .msg { animation: none; opacity: 1; transform: none; }

  .msg.tw { border-left-color: var(--tw); }
  .msg.yt { border-left-color: var(--yt); }
  .msg.tt { border-left-color: var(--tt); }
  .msg.kk { border-left-color: var(--kk); }

  body.theme-box .msg,
  body.theme-nobg .msg {
    padding: 3px 2px;
    margin-top: 2px;
    border-radius: 0;
    border-left: none;
    background: transparent !important;
  }
  /* In theme-nobg, restore a thin platform-tint left border so the user
     still has *some* visual separator between platforms when there's no
     wrapper frame to provide context. */
  body.theme-nobg .msg {
    padding-left: 9px;
    border-left: 2px solid rgba(255, 255, 255, 0.18);
  }
  body.theme-nobg .msg.tw { border-left-color: var(--tw); }
  body.theme-nobg .msg.yt { border-left-color: var(--yt); }
  body.theme-nobg .msg.tt { border-left-color: var(--tt); }
  body.theme-nobg .msg.kk { border-left-color: var(--kk); }

  .msg.leaving { animation: msgOut .22s cubic-bezier(.4,0,1,1) forwards; }
  @keyframes msgIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes msgOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-4px); } }

  /* Avatar — round thumbnail at the start of the card. Clean fallback
     chip if the URL fails. Sized with the font so the card geometry
     stays consistent across font-size settings. */
  .pfp {
    width: calc(var(--font-size) + 12px);
    height: calc(var(--font-size) + 12px);
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    margin-top: 1px;
  }
  .pfp-fallback {
    width: calc(var(--font-size) + 12px);
    height: calc(var(--font-size) + 12px);
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--font-size) - 2px);
    font-weight: 900;
    background: rgba(255,255,255,0.06);
    color: var(--mut);
    margin-top: 1px;
  }

  .msg-body {
    flex: 1 1 auto;
    min-width: 0;
  }
  .msg-head {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: nowrap;
    margin-bottom: 2px;
    min-width: 0;
  }
  .msg-head > * { flex-shrink: 0; }
  .msg-head .u {
    flex-shrink: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* Small platform chip sits at the head of every message so the
     streamer can read the source without needing per-message colors. */
  .pi {
    width: calc(var(--font-size) + 2px);
    height: calc(var(--font-size) + 2px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--font-size) - 5px);
    font-weight: 800;
    border-radius: 4px;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .pi.tw { background: var(--tw); }
  .pi.yt { background: var(--yt); }
  .pi.tt { background: var(--tt); }
  .pi.kk { background: var(--kk); color: #0e0e10; }

  /* User badges (mod/sub/vip/broadcaster/member). Short letter chips. */
  .ub {
    display: inline-flex;
    align-items: center;
    height: calc(var(--font-size) + 2px);
    padding: 0 6px;
    font-size: calc(var(--font-size) - 6px);
    font-weight: 800;
    border-radius: 3px;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .ub.mod { background: #00ad03; }
  .ub.vip { background: #e00b8a; }
  .ub.sub { background: #8205b4; }
  .ub.broadcaster { background: #e91916; }
  .ub.member { background: #2ba640; }

  .u {
    font-weight: 800;
    color: var(--accent);
    white-space: nowrap;
    font-size: var(--font-size);
    letter-spacing: -0.005em;
  }
  .u.tw { color: var(--tw); }
  .u.yt { color: var(--yt); }
  .u.tt { color: var(--tt); }
  .u.kk { color: var(--kk); }

  .m {
    color: var(--text);
    font-size: var(--font-size);
    line-height: 1.4;
  }
  .m img.emote {
    height: 1.25em;
    width: auto;
    vertical-align: middle;
    margin: 0 2px;
  }

  /* Gated fallback if entitlement flips off mid-stream. */
  #gated {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(14,14,16,.9);
    color: #ff424d;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: .08em;
    text-transform: uppercase;
    text-align: center;
    padding: 20px;
  }
  #gated.show { display: flex; }

  /* Preview hint — only appears after 10s of silence (in-browser preview
     mode) so streamers know the pipe is alive even when chat is quiet. */
  #hint {
    position: absolute;
    left: 14px; bottom: 14px;
    font-size: 11px;
    color: rgba(207,210,220,.55);
    text-shadow: 0 1px 2px rgba(0,0,0,.7);
    opacity: 0;
    transition: opacity .3s ease;
    pointer-events: none;
  }
  #hint.show { opacity: 1; }

  /* ──────────────────────────────────────────────────────────────────
     Event cards (subs / gifts / cheers / raids / etc.). Three
     placement modes:
       inline  — mixed into #feed alongside chat
       above   — strip pinned to the top of the canvas
       below   — strip pinned just above the chat feed bottom
       off     — never rendered
     Events get a slightly richer card than chat so they stand out.
     ────────────────────────────────────────────────────────────────── */
  .events {
    position: absolute;
    left: 0; right: 0;
    padding: 6px 12px;
    pointer-events: none;
    z-index: 5;
    display: none;
  }
  #events-above { top: 50vh; }         /* just below the gift zone */
  #events-below { bottom: 0; }
  body.placement-above #events-above { display: block; }
  body.placement-below #events-below { display: block; }
  body.placement-above #feed { bottom: auto; top: calc(50vh + 60px); max-height: calc(50vh - 60px); justify-content: flex-end; }
  body.placement-below #feed { bottom: 60px; }

  .ev-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 9px;
    background: rgba(14,14,16,0.88);
    border-left: 3px solid var(--accent);
    font-size: var(--event-size);
    font-weight: 700;
    color: #fff;
    margin-top: 4px;
    max-width: 100%;
    opacity: 0;
    transform: translateY(6px);
    animation: evRowIn .32s cubic-bezier(.22,1.1,.36,1) forwards;
  }
  .ev-row.leaving { animation: evRowOut .25s cubic-bezier(.55,0,.7,.2) forwards; }
  @keyframes evRowIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes evRowOut { from { opacity: 1; transform: translateY(0); }  to { opacity: 0; transform: translateY(-4px); } }

  .ev-row.tw { border-left-color: var(--tw); }
  .ev-row.yt { border-left-color: var(--yt); }
  .ev-row.tt { border-left-color: var(--tt); }
  .ev-row.kk { border-left-color: var(--kk); }
  .ev-row.se { border-left-color: #7cdf21; }

  .ev-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px;
    background: linear-gradient(135deg, #3A86FF, #2AD4B9);
    flex-shrink: 0;
  }
  .ev-row.tw .ev-icon { background: linear-gradient(135deg, #a970ff, #7d3fff); }
  .ev-row.yt .ev-icon { background: linear-gradient(135deg, #ff4545, #ff7373); }
  .ev-row.tt .ev-icon { background: linear-gradient(135deg, #fe2c55, #ff8fae); }
  .ev-row.kk .ev-icon { background: linear-gradient(135deg, #53fc18, #00e573); color: #0e0e10; }
  .ev-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
  .ev-u { font-weight: 900; }
  .ev-u.tw { color: #c8a6ff; } .ev-u.yt { color: #ffb5b5; } .ev-u.tt { color: #ff8fae; } .ev-u.kk { color: #a0ff8b; }
  .ev-amt {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    background: #f0b429;
    color: #0e0e10;
    font-size: calc(var(--event-size) - 1px);
    font-weight: 900;
  }

  /* ──────────────────────────────────────────────────────────────────
     TikTok gift floating layer — 1.5.0 refresh: pop-in overshoot +
     platform glow pulse + sparkle particle trail. Gifts are
     constrained to the TOP HALF of the canvas so they never cover
     the chat feed sitting at the bottom.

     Clustering: when the same user sends the same gift again within
     ~700ms we spawn the new one at an adjacent X so they visually
     "stack" along the drift path instead of scattering randomly.
     The count badge on the lead gift ticks up.
     ────────────────────────────────────────────────────────────────── */
  #gifts {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50vh;
    overflow: hidden;
    pointer-events: none;
    z-index: 10;
    contain: layout paint;  /* isolate to its own compositor layer */
  }

  .gift {
    position: absolute;
    top: var(--spawn-y, 30%);
    right: var(--spawn-right, 0px);
    width: 92px;
    text-align: center;
    opacity: 0;
    animation: giftFloat var(--gift-dur, 5.2s) cubic-bezier(.22,.7,.32,1) forwards;
    will-change: transform, opacity;
  }
  /* Gift artwork. The container does the wobble-rotation animation
     so the image + glow halo stay in register. A separate ::before
     pseudo paints the radial halo, scaled to the image. */
  .gift .g-art {
    position: relative;
    width: 92px;
    height: 92px;
    margin: 0 auto;
    animation: giftWobble 1.8s ease-in-out infinite;
  }
  .gift .g-art::before {
    content: '';
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(254,44,85,.45) 0%, rgba(254,44,85,0.18) 45%, transparent 70%);
    animation: giftHalo 1.4s ease-in-out infinite;
    z-index: -1;
  }
  .gift .g-art img {
    width: 92px;
    height: 92px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,.55));
  }
  /* Sparkle trail dots — three tiny markers that scale-pulse on a
     staggered delay behind the gift. Cheaper than particle emitters
     but reads as "something magical is trailing this". */
  .gift .g-spark {
    position: absolute;
    top: 50%;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff, rgba(255,255,255,0) 70%);
    animation: sparklePulse 1.1s ease-out infinite;
    pointer-events: none;
  }
  .gift .g-spark.s1 { right: 110px; margin-top: -5px; animation-delay: 0s;    opacity: .85; }
  .gift .g-spark.s2 { right: 140px; margin-top: 6px;  animation-delay: .25s;  opacity: .7;  background: radial-gradient(circle, #f0b429, rgba(240,180,41,0) 70%); }
  .gift .g-spark.s3 { right: 170px; margin-top: -8px; animation-delay: .5s;   opacity: .6; }
  .gift .g-count {
    position: absolute;
    top: -4px; right: -4px;
    background: linear-gradient(135deg, #fe2c55, #f0b429);
    color: #0e0e10;
    font-weight: 900;
    font-size: 17px;
    padding: 2px 10px;
    border-radius: 999px;
    border: 2px solid #fff;
    min-width: 30px;
    box-shadow: 0 3px 10px rgba(254,44,85,0.55);
    transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  }
  .gift .g-count.bump { transform: scale(1.35); }
  .gift .g-user {
    margin-top: 4px;
    font-size: 12px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,.9), 0 0 10px rgba(254,44,85,.5);
    white-space: nowrap;
    max-width: 110px;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-left: auto;
    margin-right: auto;
  }
  /* Main drift — overshoot pop-in, then glide left across the zone.
     --mid-x / --end-x let spawning code randomize the flight path;
     --drift-y adds a gentle vertical drift so streaks feel organic. */
  @keyframes giftFloat {
    0%   { opacity: 0; transform: translate(60px, 12px) scale(.3)  rotate(-10deg); }
    10%  { opacity: 1; transform: translate(-18px, -6px) scale(1.18) rotate(4deg); }
    20%  { opacity: 1; transform: translate(-8px, 0)    scale(1)    rotate(0deg); }
    70%  { opacity: 1; transform: translate(var(--mid-x, -50vw), var(--drift-y, 5vh)) scale(.95) rotate(-4deg); }
    100% { opacity: 0; transform: translate(var(--end-x, -100vw), calc(var(--drift-y, 5vh) + 2vh)) scale(.8) rotate(8deg); }
  }
  /* Subtle wobble keeps the gift feeling alive during its long glide. */
  @keyframes giftWobble {
    0%, 100% { transform: rotate(-3deg) scale(1); }
    50%      { transform: rotate(3deg)  scale(1.04); }
  }
  /* Halo pulse — synced slightly off the wobble so the glow feels
     like it's breathing rather than tied to one motion. */
  @keyframes giftHalo {
    0%, 100% { opacity: .55; transform: scale(0.92); }
    50%      { opacity: 1;   transform: scale(1.08); }
  }
  /* Sparkle trail — grows and fades. */
  @keyframes sparklePulse {
    0%   { opacity: 0;   transform: scale(.4); }
    30%  { opacity: 1;   transform: scale(1.3); }
    100% { opacity: 0;   transform: scale(.5); }
  }

  /* ──────────────────────────────────────────────────────────────────
     TikTok combo counter — same spec as 1.4.4. Anchored to a corner
     (tl/tr/bl/br) or the horizontal mid (tm/bm). Multiple simultaneous
     combos stack vertically.
     ────────────────────────────────────────────────────────────────── */
  #combo {
    position: fixed;
    pointer-events: none;
    z-index: 12;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    max-width: 320px;
  }
  #combo[data-anchor="tl"] { top: 0;    left: 0;   align-items: flex-start; }
  #combo[data-anchor="tr"] { top: 0;    right: 0;  align-items: flex-end; }
  #combo[data-anchor="bl"] { bottom: 0; left: 0;   align-items: flex-start; flex-direction: column-reverse; }
  #combo[data-anchor="br"] { bottom: 0; right: 0;  align-items: flex-end;   flex-direction: column-reverse; }
  #combo[data-anchor="tm"] { top: 0;    left: 50%; transform: translateX(-50%); align-items: center; }
  #combo[data-anchor="bm"] { bottom: 0; left: 50%; transform: translateX(-50%); align-items: center; flex-direction: column-reverse; }
  #combo[data-anchor="off"] { display: none; }

  .combo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px 7px 7px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(254,44,85,0.92), rgba(240,180,41,0.88));
    box-shadow: 0 6px 22px rgba(254,44,85,0.4);
    border: 2px solid rgba(255,255,255,0.35);
    color: #0e0e10;
    font-weight: 900;
    animation: comboIn .4s cubic-bezier(.22,1.3,.36,1) forwards;
  }
  .combo.fade { animation: comboOut .55s cubic-bezier(.55,0,.8,.2) forwards; }
  .combo.bump { animation: comboBump .32s cubic-bezier(.34,1.56,.64,1); }
  @keyframes comboIn   { 0%{opacity:0;transform:scale(.5)} 60%{opacity:1;transform:scale(1.1)} 100%{opacity:1;transform:scale(1)} }
  @keyframes comboOut  { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(.5)} }
  @keyframes comboBump { 0%{transform:scale(1)} 35%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .combo .c-img { width: 42px; height: 42px; object-fit: contain; flex-shrink: 0; }
  .combo .c-fallback { width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .combo .c-body { display: flex; flex-direction: column; line-height: 1.1; }
  .combo .c-user { font-size: 11px; font-weight: 800; opacity: 0.85; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .combo .c-name { font-size: 12px; font-weight: 900; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .combo .c-count { font-size: 22px; font-weight: 900; margin-left: 2px; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="events" id="events-above"></div>
<div id="feed"></div>
<div class="events" id="events-below"></div>
<div id="gifts"></div>
<div id="combo" data-anchor="off"></div>
<div id="gated">Patreon Early Access required<br><span style="font-size:11px;color:#adadb8;letter-spacing:.04em;text-transform:none;font-weight:600">Connect in StreamFusion → Settings → Early Access</span></div>
<div id="hint">StreamFusion chat overlay — waiting for messages…</div>

<script>
(function() {
  'use strict';

  var CFG = {
    maxMessages: 30,
    fontSize:    16,
    msgBgOpacity: 0.85,
    boxOpacity:  0.8,
    showPlatformIcon: true,
    showProfilePics:  true,
    showUserBadges:   true,
    showEmotes:       true,
    showPlatforms: { tw: true, yt: true, tt: true, kk: true },
    theme:            'box',           // 'card' | 'box' | 'nobg' (grey-box default 1.5.4+)
    showEvents:       false,
    eventPlacement:   'inline',        // 'inline' | 'above' | 'below' | 'off'
    eventSize:        13,
    eventsHoldMs:     6000,
    showGiftAnimations: false,
    ttGiftCorner:     'off',           // 'tl'|'tr'|'bl'|'br'|'tm'|'bm'|'off'
    ttGiftComboHoldMs: 3000
  };

  var feed      = document.getElementById('feed');
  var evAbove   = document.getElementById('events-above');
  var evBelow   = document.getElementById('events-below');
  var gifts     = document.getElementById('gifts');
  var comboBox  = document.getElementById('combo');
  var gated     = document.getElementById('gated');
  var hint      = document.getElementById('hint');
  var messageCount = 0;

  // Rapid-fire throttle: if >3 messages arrive in <400ms, switch into
  // a quiet-animation mode so we don't thrash the compositor with
  // overlapping keyframes. Body class toggles off ~600ms after the
  // burst subsides.
  var _recentMsgTimes = [];
  var _quietTimer = null;
  function noteMsgTime() {
    var now = Date.now();
    _recentMsgTimes.push(now);
    while (_recentMsgTimes.length && now - _recentMsgTimes[0] > 400) _recentMsgTimes.shift();
    if (_recentMsgTimes.length >= 3) {
      if (!document.body.classList.contains('quiet-anim')) document.body.classList.add('quiet-anim');
      if (_quietTimer) clearTimeout(_quietTimer);
      _quietTimer = setTimeout(function() {
        document.body.classList.remove('quiet-anim');
        _quietTimer = null;
      }, 600);
    }
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function renderMessage(text, emotes) {
    if (!CFG.showEmotes || !emotes || !emotes.length) return escapeHtml(text);
    var byName = Object.create(null);
    emotes.forEach(function(e) { if (e && e.name && e.url) byName[e.name] = e.url; });
    return String(text || '').split(/(\s+)/).map(function(tok) {
      if (byName[tok]) return '<img class="emote" src="' + byName[tok] + '" alt="' + escapeHtml(tok) + '" onerror="this.outerHTML=this.alt">';
      return escapeHtml(tok);
    }).join('');
  }

  function renderBadges(badges) {
    if (!CFG.showUserBadges || !badges || !badges.length) return '';
    return badges.map(function(b) {
      var cls = String(b).toLowerCase();
      if (!/^(mod|vip|sub|broadcaster|member)$/.test(cls)) return '';
      var label = cls === 'broadcaster' ? 'HOST' : cls.toUpperCase();
      return '<span class="ub ' + cls + '">' + label + '</span>';
    }).join('');
  }

  function renderPfp(m) {
    if (!CFG.showProfilePics) return '';
    if (m.avatar) {
      var initial = escapeHtml((m.user || '?').charAt(0).toUpperCase());
      return '<img class="pfp" src="' + escapeHtml(m.avatar) + '" alt="" referrerpolicy="no-referrer" ' +
        'onerror="this.outerHTML=\'<span class=&quot;pfp-fallback&quot;>' + initial + '</span>\'">';
    }
    return '<span class="pfp-fallback">' + escapeHtml((m.user || '?').charAt(0).toUpperCase()) + '</span>';
  }

  function renderPlatIcon(plat) {
    if (!CFG.showPlatformIcon || !plat) return '';
    var label = { tw: 'TW', yt: 'YT', tt: 'TT', kk: 'KK' }[plat] || plat.toUpperCase();
    return '<span class="pi ' + plat + '">' + label + '</span>';
  }

  // ──────────────────────────────────────────────────────────────────
  // Message rendering. The card theme splits user-line (head) from
  // message-line (body) — cleaner than the 1.4.x inline layout that
  // crammed everything onto one row and had to truncate on overflow.
  // ──────────────────────────────────────────────────────────────────
  function addMessage(m) {
    if (!m) return;
    var plat = (m.platform || '').toLowerCase();
    if (!CFG.showPlatforms[plat] && plat) return;
    if (hint) hint.classList.remove('show');

    noteMsgTime();
    var div = document.createElement('div');
    div.className = 'msg ' + plat;

    var userColor = m.userColor ? ('color:' + m.userColor + ';') : '';

    div.innerHTML =
      renderPfp(m) +
      '<div class="msg-body">' +
        '<div class="msg-head">' +
          renderPlatIcon(plat) +
          renderBadges(m.badges) +
          '<span class="u ' + plat + '" style="' + userColor + '">' + escapeHtml(m.user || 'anon') + '</span>' +
        '</div>' +
        '<div class="m">' + renderMessage(m.message || '', m.emotes) + '</div>' +
      '</div>';

    feed.appendChild(div);
    messageCount++;
    trimFeed();
  }

  function trimFeed() {
    while (feed.children.length > CFG.maxMessages) {
      var stale = feed.children[0];
      if (stale.classList.contains('leaving')) break;
      stale.classList.add('leaving');
      setTimeout(function(node) {
        return function() { if (node && node.parentNode) node.parentNode.removeChild(node); };
      }(stale), 240);
    }
  }

  // ──────────────────────────────────────────────────────────────────
  // Event rendering. Matches chat-card styling for visual coherence
  // across surfaces, with slight color accent.
  // ──────────────────────────────────────────────────────────────────
  function eventIcon(ev) {
    if (ev.giftImage) return '<img src="' + ev.giftImage + '" alt="" onerror="this.outerHTML=\'\u2605\'">';
    return {
      follow:'\u2764', sub:'\u2605', resub:'\u2605', gift:'\uD83C\uDF81',
      cheer:'\uD83D\uDC8E', raid:'\u2694\ufe0f', tip:'\uD83D\uDCB0', host:'\uD83D\uDCE1',
      pledge:'P', tier_change:'\u2191', pledge_end:'\u00b7',
      order:'\uD83D\uDECD\ufe0f', donation:'\uD83D\uDCB0'
    }[ev.eventType] || '\u2605';
  }
  function eventText(ev) {
    var u = '<span class="ev-u ' + (ev.platform||'') + '">' + escapeHtml(ev.user||'someone') + '</span>';
    switch (ev.eventType) {
      case 'follow': return u + ' followed!';
      case 'sub':    return u + ' subscribed';
      case 'resub':  return u + ' resubscribed' + (ev.months ? ' (' + ev.months + 'mo)' : '');
      case 'gift':
        if (ev.platform === 'tt') return u + ' sent ' + (ev.giftName ? escapeHtml(ev.giftName) + ' ' : '') + '<span class="ev-amt">\u00d7' + (ev.count || 1) + '</span>';
        return u + ' gifted <span class="ev-amt">' + (ev.amount || 1) + '</span>';
      case 'cheer':  return u + ' cheered <span class="ev-amt">' + (ev.amount || 0) + '</span>';
      case 'raid':   return u + ' raided with <span class="ev-amt">' + (ev.amount || 0) + '</span>';
      case 'tip':    return u + ' tipped <span class="ev-amt">$' + (ev.amount || 0) + '</span>';
      default:       return u + ' ' + escapeHtml(ev.eventType || 'event');
    }
  }
  function addEvent(ev) {
    if (!CFG.showEvents) return;
    var place = CFG.eventPlacement || 'inline';
    if (place === 'off') return;
    var plat = (ev.platform || '').toLowerCase();
    if (plat && CFG.showPlatforms && CFG.showPlatforms[plat] === false) return;
    var row = document.createElement('div');
    row.className = 'ev-row ' + plat;
    row.innerHTML = '<span class="ev-icon">' + eventIcon(ev) + '</span><span>' + eventText(ev) + '</span>';
    var host = place === 'above' ? evAbove : place === 'below' ? evBelow : feed;
    host.appendChild(row);
    if (place === 'inline') { messageCount++; trimFeed(); }
    setTimeout(function() {
      row.classList.add('leaving');
      setTimeout(function() { if (row.parentNode) row.parentNode.removeChild(row); }, 260);
    }, Math.max(2000, CFG.eventsHoldMs || 6000));
  }

  // ──────────────────────────────────────────────────────────────────
  // TikTok gift floating animation (1.5.0 refresh)
  //
  // Visual upgrades:
  //   - Pop-in overshoot at spawn (scale .3 -> 1.18 -> 1) so gifts
  //     feel like they're ARRIVING instead of just appearing.
  //   - Platform-tinted glow halo that breathes behind the image.
  //   - Sparkle trail: 3 tiny white/gold dots pulsing behind the drift.
  //   - Gentle rotation wobble during the long glide.
  //
  // Clustering / stacking:
  //   - Track the most recent gift by (user|giftName). When a new
  //     arrival matches within 700ms, spawn it next to the previous
  //     one (offset X) so rapid streaks visually cluster along the
  //     drift path instead of scattering randomly across the canvas.
  //   - The lead gift's count badge bumps up on each arrival so the
  //     streamer sees the streak accumulate in place too.
  // ──────────────────────────────────────────────────────────────────
  var _recentGifts = Object.create(null);   // key -> { el, time, right }
  var STACK_WINDOW_MS = 700;
  var STACK_OFFSET_PX = 34;  // horizontal spacing between stacked siblings

  function spawnGiftAnimation(ev) {
    if (!CFG.showGiftAnimations) return;
    if (ev.platform !== 'tt') return;
    if (!ev.giftImage) return;

    var key = (ev.user || 'someone') + '|' + (ev.giftName || 'gift');
    var now = Date.now();
    var recent = _recentGifts[key];

    // Stacking: a matching gift arrived recently → bump the existing
    // lead's count AND spawn a small sibling next to it instead of a
    // full new streak. Feels like the gifts are piling up along one
    // trail, which is what users actually do ("Rose spam ×30").
    if (recent && (now - recent.time) < STACK_WINDOW_MS && recent.el && recent.el.parentNode) {
      var lead = recent.el;
      var badge = lead.querySelector('.g-count');
      var curCount = parseInt((badge && badge.textContent || '').replace(/\D+/g, ''), 10) || 1;
      var inc = Math.max(1, ev.count || 1);
      var newCount = curCount + inc;
      if (!badge) {
        var b = document.createElement('div');
        b.className = 'g-count';
        b.textContent = '\u00d7' + newCount;
        lead.appendChild(b);
      } else {
        badge.textContent = '\u00d7' + newCount;
      }
      // Bump animation on the count badge.
      if (badge) {
        badge.classList.remove('bump');
        void badge.offsetWidth;
        badge.classList.add('bump');
        setTimeout(function() { if (badge) badge.classList.remove('bump'); }, 240);
      }
      // Spawn a sibling slightly to the right of the lead so the
      // stack reads as a cluster moving together. The sibling uses
      // the lead's animation settings (same spawn-y / drift path)
      // so they stay visually locked.
      recent.count = newCount;
      recent.time = now;
      var sib = buildGiftElement(ev, {
        spawnY: lead.style.getPropertyValue('--spawn-y') || '30%',
        spawnRight: (recent.right + STACK_OFFSET_PX) + 'px',
        midX:   lead.style.getPropertyValue('--mid-x')  || '-50vw',
        endX:   lead.style.getPropertyValue('--end-x')  || '-100vw',
        driftY: lead.style.getPropertyValue('--drift-y') || '5vh',
        // Slightly shorter duration for followers so they catch up
        // to the lead at the left edge and fade together.
        dur: (parseFloat(lead.style.getPropertyValue('--gift-dur') || '5') - 0.3).toFixed(2) + 's',
        showCount: false,
        showUser: false
      });
      gifts.appendChild(sib);
      recent.right += STACK_OFFSET_PX;
      setTimeout(function() { if (sib.parentNode) sib.parentNode.removeChild(sib); }, parseFloat(lead.style.getPropertyValue('--gift-dur') || '5') * 1000 + 500);
      return;
    }

    // Fresh streak — spawn a full gift with count + user label.
    var spawnYPct = 5 + Math.random() * 30;
    var opts = {
      spawnY: spawnYPct.toFixed(1) + '%',
      spawnRight: '0px',
      midX:   -(window.innerWidth * (0.35 + Math.random() * 0.25)) + 'px',
      endX:   -(window.innerWidth * (0.95 + Math.random() * 0.15)) + 'px',
      driftY: (2 + Math.random() * 6).toFixed(1) + 'vh',
      dur:    (4.4 + Math.random() * 1.2).toFixed(2) + 's',
      showCount: !!(ev.count && ev.count > 1),
      showUser: true
    };
    var el = buildGiftElement(ev, opts);
    gifts.appendChild(el);
    _recentGifts[key] = { el: el, time: now, right: 0, count: Math.max(1, ev.count || 1) };

    // Clean up DOM + recent-gift tracker after the animation ends.
    var lifeMs = parseFloat(opts.dur) * 1000 + 500;
    setTimeout(function() {
      if (el.parentNode) el.parentNode.removeChild(el);
      if (_recentGifts[key] && _recentGifts[key].el === el) delete _recentGifts[key];
    }, lifeMs);
  }

  function buildGiftElement(ev, opts) {
    var el = document.createElement('div');
    el.className = 'gift';
    el.style.setProperty('--spawn-y',     opts.spawnY);
    el.style.setProperty('--spawn-right', opts.spawnRight);
    el.style.setProperty('--mid-x',       opts.midX);
    el.style.setProperty('--end-x',       opts.endX);
    el.style.setProperty('--drift-y',     opts.driftY);
    el.style.setProperty('--gift-dur',    opts.dur);
    var countBadge = opts.showCount ? '<div class="g-count">\u00d7' + (ev.count || 1) + '</div>' : '';
    var userLabel  = opts.showUser  ? '<div class="g-user">' + escapeHtml(ev.user || '') + '</div>' : '';
    el.innerHTML =
      '<div class="g-art">' +
        '<span class="g-spark s1"></span>' +
        '<span class="g-spark s2"></span>' +
        '<span class="g-spark s3"></span>' +
        '<img src="' + escapeHtml(ev.giftImage) + '" alt="" onerror="this.closest(\'.gift\').remove()">' +
        countBadge +
      '</div>' +
      userLabel;
    return el;
  }

  // Combo counter (unchanged from 1.4.4 — aggregates same-user/same-gift
  // streaks into one bump-animated chip).
  var combos = Object.create(null);
  function registerGiftCombo(ev) {
    if (CFG.ttGiftCorner === 'off') return;
    if (ev.platform !== 'tt' || ev.eventType !== 'gift') return;
    comboBox.setAttribute('data-anchor', CFG.ttGiftCorner || 'br');
    var key = (ev.user || 'someone') + '|' + (ev.giftName || 'gift');
    var inc = Math.max(1, ev.count || 1);
    var entry = combos[key];
    if (!entry) {
      entry = { count: 0, el: null, timer: null };
      entry.el = buildComboElement(ev);
      comboBox.appendChild(entry.el);
      combos[key] = entry;
    }
    entry.count += inc;
    var cnt = entry.el.querySelector('.c-count');
    if (cnt) cnt.textContent = '\u00d7' + entry.count;
    entry.el.classList.remove('bump');
    void entry.el.offsetWidth;
    entry.el.classList.add('bump');
    if (entry.timer) clearTimeout(entry.timer);
    entry.timer = setTimeout(function() { fadeCombo(key); }, CFG.ttGiftComboHoldMs || 3000);
  }
  function buildComboElement(ev) {
    var div = document.createElement('div');
    div.className = 'combo';
    var img = ev.giftImage
      ? '<img class="c-img" src="' + escapeHtml(ev.giftImage) + '" alt="" onerror="this.outerHTML=\'<span class=\\\'c-fallback\\\'>\uD83C\uDF81</span>\'">'
      : '<span class="c-fallback">\uD83C\uDF81</span>';
    div.innerHTML =
      img +
      '<div class="c-body"><span class="c-user">' + escapeHtml(ev.user || '') + '</span>' +
      '<span class="c-name">' + escapeHtml(ev.giftName || 'gift') + '</span></div>' +
      '<span class="c-count">\u00d71</span>';
    return div;
  }
  function fadeCombo(key) {
    var entry = combos[key]; if (!entry) return;
    entry.el.classList.add('fade');
    setTimeout(function() {
      if (entry.el && entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
      delete combos[key];
    }, 560);
  }

  function applyConfig(cfg) {
    if (!cfg || typeof cfg !== 'object') return;
    Object.keys(cfg).forEach(function(k) { CFG[k] = cfg[k]; });
    var root = document.documentElement;
    root.style.setProperty('--msg-bg-op', String(CFG.msgBgOpacity != null ? CFG.msgBgOpacity : 0.85));
    root.style.setProperty('--box-op', String(CFG.boxOpacity != null ? CFG.boxOpacity : 0.8));
    root.style.setProperty('--font-size', (CFG.fontSize || 16) + 'px');
    root.style.setProperty('--event-size', (CFG.eventSize || 13) + 'px');
    // Theme is now a 3-way enum: 'card' (default per-message bubbles),
    // 'box' (single gradient container), 'nobg' (transparent transcript).
    // Pre-1.5.3 settings only know 'card'/'box', so unknown values fall
    // back to card.
    document.body.classList.remove('theme-card', 'theme-box', 'theme-nobg');
    var themeName = (CFG.theme === 'box' || CFG.theme === 'nobg') ? CFG.theme : 'card';
    document.body.classList.add('theme-' + themeName);
    // --feed-max ONLY affects theme-card. theme-box and theme-nobg auto-
    // size to content (capped via CSS max-height: 95vh) so maxMessages
    // becomes the de-facto height limit for those themes.
    root.style.setProperty('--feed-max', CFG.showGiftAnimations ? '55vh' : '100vh');
    document.body.classList.remove('placement-above', 'placement-below', 'placement-inline', 'placement-off');
    document.body.classList.add('placement-' + (CFG.showEvents ? (CFG.eventPlacement || 'inline') : 'off'));
    comboBox.setAttribute('data-anchor', CFG.ttGiftCorner || 'off');
  }

  function setEntitled(v) {
    gated.classList.toggle('show', !v);
    feed.style.display = v ? '' : 'none';
  }

  var es = new EventSource('/events?type=chat');
  es.addEventListener('hello', function(e) { try { var d = JSON.parse(e.data); if (d.cfg) applyConfig(d.cfg); setEntitled(!!d.entitled); } catch (err) {} });
  es.addEventListener('chat', function(e) { try { addMessage(JSON.parse(e.data)); } catch (err) {} });
  es.addEventListener('alert', function(e) {
    var ev; try { ev = JSON.parse(e.data); } catch (err) { return; }
    if (!ev) return;
    addEvent(ev); spawnGiftAnimation(ev); registerGiftCombo(ev);
  });
  es.addEventListener('config', function(e) { try { applyConfig(JSON.parse(e.data)); } catch (err) {} });
  es.addEventListener('entitlement', function(e) { try { setEntitled(!!JSON.parse(e.data).entitled); } catch (err) {} });
  es.addEventListener('shutdown', function() { es.close(); });

  setTimeout(function() {
    if (messageCount === 0 && !gated.classList.contains('show')) hint.classList.add('show');
  }, 10000);
})();
</script>
</body>
</html>
