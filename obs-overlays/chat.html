<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>StreamFusion — Chat Overlay</title>
<style>
  /* ───────────────────────────────────────────────────────────────────────
     StreamFusion OBS chat overlay — transparent-background browser source.
     Connects to /events?type=chat via SSE. Receives 'chat' messages for
     each chat line and 'config' messages when the streamer changes
     settings in StreamFusion's Settings → OBS Overlays tab. Also listens
     to 'entitlement' to hide itself instantly if the user's Patreon
     membership lapses mid-stream.

     Themes:
       - 'hud' (default): gamer-HUD, per-message cards with platform
         colored left bar. Original look.
       - 'box':           single grey container wrapping the whole feed,
         no per-message cards, just text. Box opacity adjustable.

     Optional surfaces (all opt-in via settings):
       - Profile pictures next to each message
       - Inline platform icon chip before the username
       - Platform-specific badges (sub / mod / vip / broadcaster)
       - Event placement: inline (mixed with chat), above or below the
         chat as a compact strip, or off entirely
       - TikTok gift combo counter anchored to a configurable corner
         (tl/tr/bl/br) or mid-top / mid-bottom. Grows+shrinks per
         incoming gift, accumulates "x30" until the combo dies down
       - TikTok gift floating animation across the full canvas
     ─────────────────────────────────────────────────────────────────── */

  :root {
    --bg-op: 0;            /* per-message bubble bg (hud theme only) */
    --box-op: 0.8;         /* whole-feed container bg (box theme) */
    --box-color: 20, 20, 24;
    --font-size: 18px;
    --event-size: 13px;
    --accent: #3A86FF;
    --text: #ffffff;
    --mut: #cfd2dc;
    --tw: #a970ff;
    --yt: #ff4545;
    --tt: #fe2c55;
    --kk: #53fc18;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-feature-settings: 'ss01' on, 'cv11' on;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  /* ──────────────────────────────────────────────────────────────────
     Feed layout. The feed stacks messages upward from the bottom —
     newest at the bottom, oldest fade off the top. Matches how most
     on-stream chat overlays read: streamer's eye tracks the bottom
     edge where the newest message lives.
     ────────────────────────────────────────────────────────────────── */
  #feed {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    max-height: 100vh;
    overflow: hidden;
    pointer-events: none;
  }

  /* Single-box theme: wraps the entire #feed in a single translucent
     grey panel. Text floats inside it with no per-message bubbles. */
  body.theme-box #feed {
    left: 10px; right: 10px; bottom: 10px;
    max-height: calc(100vh - 20px);
    padding: 14px 16px 10px;
    background: rgba(var(--box-color), var(--box-op));
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .msg {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 6px 10px 6px 12px;
    margin-top: 4px;
    border-radius: 6px;
    background: rgba(14, 14, 16, calc(var(--bg-op) * 1));
    position: relative;
    font-size: var(--font-size);
    line-height: 1.35;
    word-break: break-word;
    opacity: 0;
    transform: translateX(-20px);
    animation: msgIn .38s cubic-bezier(.22,.9,.32,1) forwards;
    text-shadow: 0 1px 3px rgba(0,0,0,.85), 0 0 2px rgba(0,0,0,.65);
  }

  /* Box theme strips all per-message chrome: no background, no left
     bar, no drop-shadow behind text. The container handles the bg. */
  body.theme-box .msg {
    padding: 3px 2px;
    margin-top: 2px;
    border-radius: 0;
    background: transparent !important;
    text-shadow: none;
  }
  body.theme-box .msg::before { display: none !important; }

  /* Left-edge accent: colored bar per platform. Instant-read of which
     service the message is from. 'hud' theme only. */
  .msg::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: var(--accent);
    box-shadow: 0 0 8px currentColor;
  }
  .msg.tw::before { background: var(--tw); color: var(--tw); }
  .msg.yt::before { background: var(--yt); color: var(--yt); }
  .msg.tt::before { background: var(--tt); color: var(--tt); }
  .msg.kk::before { background: var(--kk); color: var(--kk); }

  .msg.leaving { animation: msgOut .25s cubic-bezier(.42,0,1,1) forwards; }
  @keyframes msgIn {
    0%   { opacity: 0; transform: translateX(-20px) scale(.98); }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes msgOut {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-6px); }
  }

  /* Profile picture. Shown inline before the username when the
     streamer enables it. Falls back to a platform-tinted initial chip
     if the URL fails to load. */
  .pfp {
    width: calc(var(--font-size) + 4px);
    height: calc(var(--font-size) + 4px);
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    margin-right: 2px;
  }

  /* Platform icon chip — same size as the user-badges row. Shown when
     `showPlatformIcon` is on. */
  .pi {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    border-radius: 3px;
    color: #0e0e10;
    text-shadow: none;
    margin-right: 2px;
  }
  .pi.tw { background: var(--tw); color: #fff; }
  .pi.yt { background: var(--yt); color: #fff; }
  .pi.tt { background: var(--tt); color: #fff; }
  .pi.kk { background: var(--kk); color: #0e0e10; }

  .u {
    font-weight: 800;
    color: var(--accent);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .u.tw { color: var(--tw); }
  .u.yt { color: var(--yt); }
  .u.tt { color: var(--tt); }
  .u.kk { color: var(--kk); }

  .sep {
    color: var(--mut);
    opacity: .7;
    margin: 0 2px;
    flex-shrink: 0;
  }

  .m {
    color: var(--text);
    flex: 1 1 auto;
    min-width: 0;
  }

  /* Legacy left-edge platform badge — kept for the old `showPlatformBadge`
     config. The new `showPlatformIcon` uses `.pi` above. */
  .pb {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    border-radius: 3px;
    color: #0e0e10;
    text-shadow: none;
    margin-right: 4px;
  }
  .pb.tw { background: var(--tw); color: #fff; }
  .pb.yt { background: var(--yt); color: #fff; }
  .pb.tt { background: var(--tt); color: #fff; }
  .pb.kk { background: var(--kk); color: #0e0e10; }

  /* User badges (sub/mod/vip/broadcaster). Compact letter chips. */
  .ub {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    padding: 1px 5px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: 2px;
    text-shadow: none;
  }
  .ub.mod { background: #00ad03; color: #fff; }
  .ub.vip { background: #e00b8a; color: #fff; }
  .ub.sub { background: #8205b4; color: #fff; }
  .ub.broadcaster { background: #e91916; color: #fff; }

  /* Emote inline image. height:1.15em keeps it aligned with text. */
  .m img.emote { height: 1.15em; width: auto; vertical-align: middle; margin: 0 1px; }

  /* Gated page shown if entitlement flips off mid-stream. */
  #gated {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(14,14,16,.9);
    color: #ff424d;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: .08em;
    text-transform: uppercase;
    text-align: center;
    padding: 20px;
  }
  #gated.show { display: flex; }

  /* Setup hint — only in browser preview if no messages after ~10s. */
  #hint {
    position: absolute;
    left: 14px; bottom: 14px;
    font-size: 11px;
    color: rgba(207,210,220,.55);
    text-shadow: 0 1px 2px rgba(0,0,0,.7);
    opacity: 0;
    transition: opacity .3s ease;
    pointer-events: none;
  }
  #hint.show { opacity: 1; }

  /* ──────────────────────────────────────────────────────────────────
     Events strips. Two independent containers let the streamer pick
     where events render — above the chat, below it, or inline (mixed
     into the #feed). The inline variant re-uses event-card DOM nodes
     appended directly to #feed.
     ────────────────────────────────────────────────────────────────── */
  .events {
    position: absolute;
    left: 0; right: 0;
    padding: 6px 12px;
    pointer-events: none;
    z-index: 5;
    display: none;
  }
  #events-above { top: 0; }
  #events-below { bottom: 0; }
  body.placement-above #events-above { display: block; }
  body.placement-below #events-below { display: block; }
  body.placement-above #feed { top: 60px; bottom: auto; height: calc(100vh - 60px); justify-content: flex-end; }
  body.placement-below #feed { bottom: 60px; }

  .ev-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 11px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(14,14,16,.9), rgba(24,24,27,.85));
    border: 1px solid rgba(255,255,255,.12);
    backdrop-filter: blur(8px);
    font-size: var(--event-size);
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.7);
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    opacity: 0;
    transform: translateY(14px);
    animation: evRowIn .45s cubic-bezier(.22,1.2,.36,1) forwards;
    margin-top: 4px;
    max-width: 94%;
  }
  .ev-row.inline {
    /* When placed inline inside #feed, events stretch naturally. */
    display: flex;
    margin-top: 4px;
  }
  .ev-row.leaving { animation: evRowOut .35s cubic-bezier(.55,0,.7,.2) forwards; }
  @keyframes evRowIn  { 0%{opacity:0;transform:translateY(14px) scale(.96)} 60%{opacity:1;transform:translateY(-2px) scale(1.02)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes evRowOut { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-6px) scale(.95)} }

  .ev-row.tw { border-color: rgba(169,112,255,.55); }
  .ev-row.yt { border-color: rgba(255,69,69,.55); }
  .ev-row.tt { border-color: rgba(254,44,85,.55); }
  .ev-row.kk { border-color: rgba(83,252,24,.55); }
  .ev-row.se { border-color: rgba(124,223,33,.55); }

  .ev-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: linear-gradient(135deg, #3A86FF, #2AD4B9);
    flex-shrink: 0;
  }
  .ev-row.tw .ev-icon { background: linear-gradient(135deg, #a970ff, #7d3fff); }
  .ev-row.yt .ev-icon { background: linear-gradient(135deg, #ff4545, #ff7373); }
  .ev-row.tt .ev-icon { background: linear-gradient(135deg, #fe2c55, #25f4ee); }
  .ev-row.kk .ev-icon { background: linear-gradient(135deg, #53fc18, #00e573); color: #0e0e10; }
  .ev-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
  .ev-u { font-weight: 900; }
  .ev-u.tw { color: #c8a6ff; }
  .ev-u.yt { color: #ffb5b5; }
  .ev-u.tt { color: #ff8fae; }
  .ev-u.kk { color: #a0ff8b; }
  .ev-amt {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    background: #f0b429;
    color: #0e0e10;
    font-size: calc(var(--event-size) - 1px);
    font-weight: 900;
  }

  /* ──────────────────────────────────────────────────────────────────
     TikTok gift floating rain — fires on every TT gift when
     `showGiftAnimations` is on. Whole-canvas effect, lets the real
     gift artwork travel from bottom-right up and left.
     ────────────────────────────────────────────────────────────────── */
  #gifts {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 10;
  }

  .gift {
    position: absolute;
    bottom: -120px;
    right: 0;
    width: 92px;
    text-align: center;
    opacity: 0;
    animation: giftFloat var(--gift-dur, 4.6s) cubic-bezier(.22,.8,.32,1) forwards;
    filter: drop-shadow(0 4px 12px rgba(254,44,85,.5)) drop-shadow(0 0 20px rgba(254,44,85,.35));
  }
  .gift img { width: 92px; height: 92px; object-fit: contain; display: block; }
  .gift .g-count {
    position: absolute;
    top: -6px; right: -6px;
    background: linear-gradient(135deg, #fe2c55, #f0b429);
    color: #0e0e10;
    font-weight: 900;
    font-size: 18px;
    padding: 2px 10px;
    border-radius: 999px;
    border: 2px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
    min-width: 28px;
  }
  .gift .g-user {
    margin-top: 6px;
    font-size: 13px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,.9), 0 0 4px rgba(254,44,85,.7);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @keyframes giftFloat {
    0%   { opacity: 0; transform: translate(var(--start-x, 20px),   0) scale(.3) rotate(-8deg); }
    12%  { opacity: 1; transform: translate(var(--start-x, 20px), -120px) scale(1.1) rotate(4deg); }
    70%  { opacity: 1; transform: translate(var(--mid-x, -100px), -55vh) scale(1)   rotate(-6deg); }
    100% { opacity: 0; transform: translate(var(--end-x, -220px), -80vh) scale(.85) rotate(8deg); }
  }

  /* ──────────────────────────────────────────────────────────────────
     TikTok gift combo counter — anchored to a configurable corner
     (tl/tr/bl/br) or the horizontal midline (tm/bm). When a streamer
     receives multiple of the SAME gift from the SAME user in quick
     succession (the TikTok "Rose x30" pattern), we accumulate into a
     single chip that grows+shrinks on each new arrival and displays
     the running count. Dies out 3s after the last arrival.

     Multiple simultaneous combos (different users / different gifts)
     stack vertically from their anchor.
     ────────────────────────────────────────────────────────────────── */
  #combo {
    position: fixed;
    pointer-events: none;
    z-index: 12;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    max-width: 340px;
  }
  #combo[data-anchor="tl"] { top: 0;    left: 0;    align-items: flex-start; }
  #combo[data-anchor="tr"] { top: 0;    right: 0;   align-items: flex-end; }
  #combo[data-anchor="bl"] { bottom: 0; left: 0;    align-items: flex-start; flex-direction: column-reverse; }
  #combo[data-anchor="br"] { bottom: 0; right: 0;   align-items: flex-end;   flex-direction: column-reverse; }
  #combo[data-anchor="tm"] { top: 0;    left: 50%;  transform: translateX(-50%); align-items: center; }
  #combo[data-anchor="bm"] { bottom: 0; left: 50%;  transform: translateX(-50%); align-items: center; flex-direction: column-reverse; }
  #combo[data-anchor="off"] { display: none; }

  .combo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px 8px 8px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(254,44,85,0.92), rgba(240,180,41,0.88));
    box-shadow: 0 8px 30px rgba(254,44,85,0.45), 0 0 16px rgba(240,180,41,0.35);
    border: 2px solid rgba(255,255,255,0.35);
    color: #0e0e10;
    font-weight: 900;
    animation: comboIn .45s cubic-bezier(.22,1.3,.36,1) forwards;
  }
  .combo.fade { animation: comboOut .6s cubic-bezier(.55,0,.8,.2) forwards; }
  .combo.bump { animation: comboBump .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes comboIn   { 0%{opacity:0;transform:scale(.4) translateY(12px)} 60%{opacity:1;transform:scale(1.12) translateY(-2px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes comboOut  { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(.4) translateY(18px)} }
  @keyframes comboBump {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.25); filter: drop-shadow(0 0 12px rgba(255,255,255,0.85)); }
    70%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  .combo .c-img {
    width: 48px; height: 48px;
    flex-shrink: 0;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
  }
  .combo .c-fallback {
    width: 48px; height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .combo .c-body {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .combo .c-user {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.3px;
    opacity: 0.85;
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .combo .c-name {
    font-size: 13px;
    font-weight: 900;
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .combo .c-count {
    font-size: 24px;
    font-weight: 900;
    margin-left: 4px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.25);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="events" id="events-above"></div>
<div id="feed"></div>
<div class="events" id="events-below"></div>
<div id="gifts"></div>
<div id="combo" data-anchor="off"></div>
<div id="gated">Patreon Early Access required<br><span style="font-size:11px;color:#adadb8;letter-spacing:.04em;text-transform:none;font-weight:600">Connect in StreamFusion → Settings → Early Access</span></div>
<div id="hint">StreamFusion chat overlay — waiting for messages…</div>

<script>
(function() {
  'use strict';

  // ──────────────────────────────────────────────────────────────────
  // Config. Defaults tuned so existing streamers see no behavior
  // change unless they flip on the new 1.4.4 options (themes, pfps,
  // event placement, gift combo counter).
  // ──────────────────────────────────────────────────────────────────
  var CFG = {
    maxMessages: 20,
    fontSize:    18,
    bgOpacity:   0,
    showPlatformBadge: false,
    showUserBadges:    true,
    showEmotes:        true,
    showPlatforms: { tw: true, yt: true, tt: true, kk: true },
    fadeOutAfterMs: 0,
    showEvents:         false,
    eventsHoldMs:       6000,
    showGiftAnimations: false,

    // New in 1.4.4
    theme:              'hud',            // 'hud' | 'box'
    boxOpacity:         0.8,              // for 'box' theme (0–1)
    showProfilePics:    false,
    showPlatformIcon:   false,
    eventPlacement:     'inline',         // 'inline' | 'above' | 'below' | 'off'
    eventSize:          13,
    ttGiftCorner:       'br',             // 'tl'|'tr'|'bl'|'br'|'tm'|'bm'|'off'
    ttGiftComboHoldMs:  3000              // time since last gift before combo dies
  };

  var feed      = document.getElementById('feed');
  var evAbove   = document.getElementById('events-above');
  var evBelow   = document.getElementById('events-below');
  var gifts     = document.getElementById('gifts');
  var comboBox  = document.getElementById('combo');
  var gated     = document.getElementById('gated');
  var hint      = document.getElementById('hint');
  var messageCount = 0;

  // ──────────────────────────────────────────────────────────────────
  // Helpers
  // ──────────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  // Emote swap by whole-word match. Server-side extraction stuffs every
  // <img class="emote"> it finds in the rendered message into the
  // `emotes` array (see sendObsChat in index.html), so OBS just
  // rebuilds inline <img>s by token lookup.
  function renderMessage(text, emotes) {
    if (!CFG.showEmotes || !emotes || !emotes.length) {
      return escapeHtml(text);
    }
    var byName = Object.create(null);
    emotes.forEach(function(e) { if (e && e.name && e.url) byName[e.name] = e.url; });
    return String(text || '').split(/(\s+)/).map(function(tok) {
      if (byName[tok]) {
        return '<img class="emote" src="' + byName[tok] + '" alt="' + escapeHtml(tok) + '" onerror="this.outerHTML=this.alt">';
      }
      return escapeHtml(tok);
    }).join('');
  }

  function renderBadges(badges) {
    if (!CFG.showUserBadges || !badges || !badges.length) return '';
    return badges.map(function(b) {
      var cls = String(b).toLowerCase();
      if (!/^(mod|vip|sub|broadcaster)$/.test(cls)) return '';
      var label = cls === 'broadcaster' ? 'HOST' : cls.toUpperCase();
      return '<span class="ub ' + cls + '">' + label + '</span>';
    }).join('');
  }

  function renderPfp(m) {
    if (!CFG.showProfilePics || !m.avatar) return '';
    var alt = escapeHtml(m.user || 'u');
    return '<img class="pfp" src="' + escapeHtml(m.avatar) + '" alt="' + alt + '" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">';
  }

  function renderPlatIcon(plat) {
    if (!CFG.showPlatformIcon || !plat) return '';
    return '<span class="pi ' + plat + '">' + plat.toUpperCase() + '</span>';
  }

  // ──────────────────────────────────────────────────────────────────
  // Chat message rendering
  // ──────────────────────────────────────────────────────────────────
  function addMessage(m) {
    if (!m) return;
    var plat = (m.platform || '').toLowerCase();
    if (!CFG.showPlatforms[plat] && plat) return;
    if (hint) hint.classList.remove('show');

    var div = document.createElement('div');
    div.className = 'msg ' + plat;

    // Legacy platform badge remains available so existing streamers'
    // settings keep working. New code prefers showPlatformIcon.
    var platBadge = CFG.showPlatformBadge && plat
      ? '<span class="pb ' + plat + '">' + plat.toUpperCase() + '</span>'
      : '';

    var userColor = m.userColor ? ('color:' + m.userColor + ';') : '';
    var uCls = 'u ' + plat;

    div.innerHTML =
      renderPfp(m) +
      platBadge +
      renderPlatIcon(plat) +
      renderBadges(m.badges) +
      '<span class="' + uCls + '" style="' + userColor + '">' + escapeHtml(m.user || 'anon') + '</span>' +
      '<span class="sep">:</span>' +
      '<span class="m">' + renderMessage(m.message || '', m.emotes) + '</span>';

    feed.appendChild(div);
    messageCount++;
    trimFeed();
  }

  function trimFeed() {
    // Trim oldest off the top with an animation pass. We keep the node
    // around an extra 260ms so the slide-out reads visually.
    while (feed.children.length > CFG.maxMessages) {
      var stale = feed.children[0];
      if (stale.classList.contains('leaving') || stale.classList.contains('ev-row')) {
        // event rows inside the feed (inline placement) self-remove on timeout
        if (feed.children.length > CFG.maxMessages + 6) {
          if (stale.parentNode) stale.parentNode.removeChild(stale);
          continue;
        }
        break;
      }
      stale.classList.add('leaving');
      setTimeout(function(node) {
        return function() { if (node && node.parentNode) node.parentNode.removeChild(node); };
      }(stale), 260);
    }
  }

  // ──────────────────────────────────────────────────────────────────
  // Event rendering. Three placement modes:
  //   'inline'  — event cards mix into #feed alongside chat
  //   'above'   — fixed strip at the top of the canvas
  //   'below'   — fixed strip at the bottom (the original behavior)
  //   'off'     — events are dropped
  // ──────────────────────────────────────────────────────────────────
  function eventIcon(ev) {
    if (ev.giftImage) return '<img src="' + ev.giftImage + '" alt="" onerror="this.outerHTML=\'\u2605\'">';
    return {
      follow:'\u2764', sub:'\u2605', resub:'\u2605', gift:'\uD83C\uDF81',
      cheer:'\uD83D\uDC8E', raid:'\u2694\ufe0f', tip:'\uD83D\uDCB0', host:'\uD83D\uDCE1',
      pledge:'P', tier_change:'\u2191', pledge_end:'\u00b7',
      order:'\uD83D\uDECD\ufe0f', donation:'\uD83D\uDCB0'
    }[ev.eventType] || '\u2605';
  }
  function eventText(ev) {
    var u = '<span class="ev-u ' + (ev.platform||'') + '">' + escapeHtml(ev.user||'someone') + '</span>';
    switch (ev.eventType) {
      case 'follow': return u + ' followed!';
      case 'sub':    return u + ' subscribed';
      case 'resub':  return u + ' resubscribed' + (ev.months ? ' (' + ev.months + 'mo)' : '');
      case 'gift':
        if (ev.platform === 'tt') return u + ' sent ' + (ev.giftName ? escapeHtml(ev.giftName) + ' ' : '') + '<span class="ev-amt">\u00d7' + (ev.count || 1) + '</span>';
        return u + ' gifted <span class="ev-amt">' + (ev.amount || 1) + '</span>';
      case 'cheer':  return u + ' cheered <span class="ev-amt">' + (ev.amount || 0) + '</span>';
      case 'raid':   return u + ' raided with <span class="ev-amt">' + (ev.amount || 0) + '</span>';
      case 'tip':    return u + ' tipped <span class="ev-amt">$' + (ev.amount || 0) + '</span>';
      default:       return u + ' ' + escapeHtml(ev.eventType || 'event');
    }
  }
  function addEvent(ev) {
    if (!CFG.showEvents) return;
    var place = CFG.eventPlacement || 'inline';
    if (place === 'off') return;
    var plat = (ev.platform || '').toLowerCase();
    if (plat && CFG.showPlatforms && CFG.showPlatforms[plat] === false) return;
    var row = document.createElement('div');
    row.className = 'ev-row ' + plat + (place === 'inline' ? ' inline' : '');
    row.innerHTML =
      '<span class="ev-icon">' + eventIcon(ev) + '</span>' +
      '<span>' + eventText(ev) + '</span>';
    var host =
      place === 'above' ? evAbove :
      place === 'below' ? evBelow :
      feed;
    host.appendChild(row);
    if (place === 'inline') {
      messageCount++;
      trimFeed();
    }
    setTimeout(function() {
      row.classList.add('leaving');
      setTimeout(function() { if (row.parentNode) row.parentNode.removeChild(row); }, 360);
    }, Math.max(2000, CFG.eventsHoldMs || 6000));
  }

  // ──────────────────────────────────────────────────────────────────
  // TikTok gift floating animation — unchanged from 1.4.3. Fires on
  // every TT gift, multiple gifts in flight at once.
  // ──────────────────────────────────────────────────────────────────
  function spawnGiftAnimation(ev) {
    if (!CFG.showGiftAnimations) return;
    if (ev.platform !== 'tt') return;
    if (!ev.giftImage) return;
    var el = document.createElement('div');
    el.className = 'gift';
    var startX = 20 + Math.random() * 60;
    var midX   = -(window.innerWidth * (0.25 + Math.random() * 0.35));
    var endX   = -(window.innerWidth * (0.55 + Math.random() * 0.25));
    var dur    = (4.2 + Math.random() * 1.6).toFixed(2) + 's';
    el.style.setProperty('--start-x', startX + 'px');
    el.style.setProperty('--mid-x',   midX   + 'px');
    el.style.setProperty('--end-x',   endX   + 'px');
    el.style.setProperty('--gift-dur', dur);
    var countBadge = (ev.count && ev.count > 1) ? '<div class="g-count">\u00d7' + ev.count + '</div>' : '';
    el.innerHTML =
      '<img src="' + escapeHtml(ev.giftImage) + '" alt="" onerror="this.parentNode.parentNode.removeChild(this.parentNode)">' +
      countBadge +
      '<div class="g-user">' + escapeHtml(ev.user || '') + '</div>';
    gifts.appendChild(el);
    var ms = parseFloat(dur) * 1000 + 500;
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, ms);
  }

  // ──────────────────────────────────────────────────────────────────
  // TikTok gift combo counter. Aggregates multiple same-user + same-
  // gift events into one chip that grows+shrinks on every new arrival
  // and displays a running count. Each combo times out CFG.ttGiftCombo
  // HoldMs after its last increment.
  //
  // Key is `user|giftName` so two users sending Rose x5 each render as
  // two separate chips that stack vertically from the configured
  // anchor corner.
  // ──────────────────────────────────────────────────────────────────
  var combos = Object.create(null);

  function registerGiftCombo(ev) {
    if (CFG.ttGiftCorner === 'off') return;
    if (ev.platform !== 'tt') return;
    if (ev.eventType !== 'gift') return;
    comboBox.setAttribute('data-anchor', CFG.ttGiftCorner || 'br');

    var key = (ev.user || 'someone') + '|' + (ev.giftName || 'gift');
    var inc = Math.max(1, ev.count || 1);
    var entry = combos[key];
    if (!entry) {
      entry = { count: 0, el: null, timer: null, ev: ev };
      entry.el = buildComboElement(ev);
      comboBox.appendChild(entry.el);
      combos[key] = entry;
    }
    entry.count += inc;
    entry.ev = ev;
    updateComboElement(entry);
    // Bump animation — re-apply the class after a tick so it re-triggers
    entry.el.classList.remove('bump');
    // Force reflow so the class removal takes effect before re-add
    void entry.el.offsetWidth;
    entry.el.classList.add('bump');

    if (entry.timer) clearTimeout(entry.timer);
    entry.timer = setTimeout(function() { fadeCombo(key); }, CFG.ttGiftComboHoldMs || 3000);
  }

  function buildComboElement(ev) {
    var div = document.createElement('div');
    div.className = 'combo';
    var img = ev.giftImage
      ? '<img class="c-img" src="' + escapeHtml(ev.giftImage) + '" alt="" onerror="this.outerHTML=\'<span class=\\\'c-fallback\\\'>\uD83C\uDF81</span>\'">'
      : '<span class="c-fallback">\uD83C\uDF81</span>';
    div.innerHTML =
      img +
      '<div class="c-body">' +
        '<span class="c-user">' + escapeHtml(ev.user || '') + '</span>' +
        '<span class="c-name">' + escapeHtml(ev.giftName || 'gift') + '</span>' +
      '</div>' +
      '<span class="c-count">\u00d71</span>';
    return div;
  }

  function updateComboElement(entry) {
    var cnt = entry.el.querySelector('.c-count');
    if (cnt) cnt.textContent = '\u00d7' + entry.count;
  }

  function fadeCombo(key) {
    var entry = combos[key];
    if (!entry) return;
    entry.el.classList.add('fade');
    setTimeout(function() {
      if (entry.el && entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
      delete combos[key];
    }, 600);
  }

  // ──────────────────────────────────────────────────────────────────
  // Config application. Most settings are reactive — flipping the
  // placement mode instantly re-homes the events-above/events-below
  // strips, box/hud theme flip is just a body class, etc.
  // ──────────────────────────────────────────────────────────────────
  function applyConfig(cfg) {
    if (!cfg || typeof cfg !== 'object') return;
    Object.keys(cfg).forEach(function(k) { CFG[k] = cfg[k]; });
    document.documentElement.style.setProperty('--bg-op', String(CFG.bgOpacity || 0));
    document.documentElement.style.setProperty('--box-op', String(CFG.boxOpacity != null ? CFG.boxOpacity : 0.8));
    document.documentElement.style.setProperty('--font-size', (CFG.fontSize || 18) + 'px');
    document.documentElement.style.setProperty('--event-size', (CFG.eventSize || 13) + 'px');

    document.body.classList.toggle('theme-box', CFG.theme === 'box');
    document.body.classList.toggle('theme-hud', CFG.theme !== 'box');

    document.body.classList.remove('placement-above', 'placement-below', 'placement-inline', 'placement-off');
    var p = CFG.showEvents ? (CFG.eventPlacement || 'inline') : 'off';
    document.body.classList.add('placement-' + p);

    comboBox.setAttribute('data-anchor', CFG.ttGiftCorner || 'br');
  }

  function setEntitled(v) {
    gated.classList.toggle('show', !v);
    feed.style.display = v ? '' : 'none';
  }

  // ──────────────────────────────────────────────────────────────────
  // SSE
  // ──────────────────────────────────────────────────────────────────
  var es = new EventSource('/events?type=chat');

  es.addEventListener('hello', function(e) {
    try {
      var d = JSON.parse(e.data);
      if (d.cfg) applyConfig(d.cfg);
      setEntitled(!!d.entitled);
    } catch (err) {}
  });

  es.addEventListener('chat', function(e) {
    try { addMessage(JSON.parse(e.data)); } catch (err) {}
  });

  es.addEventListener('alert', function(e) {
    var ev;
    try { ev = JSON.parse(e.data); } catch (err) { return; }
    if (!ev) return;
    addEvent(ev);
    spawnGiftAnimation(ev);
    registerGiftCombo(ev);
  });

  es.addEventListener('config', function(e) {
    try { applyConfig(JSON.parse(e.data)); } catch (err) {}
  });

  es.addEventListener('entitlement', function(e) {
    try { setEntitled(!!JSON.parse(e.data).entitled); } catch (err) {}
  });

  es.addEventListener('shutdown', function() { es.close(); });

  setTimeout(function() {
    if (messageCount === 0 && !gated.classList.contains('show')) hint.classList.add('show');
  }, 10000);
})();
</script>
</body>
</html>
