<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>StreamFusion — Shoutout</title>
<style>
  /* ───────────────────────────────────────────────────────────────────────
     StreamFusion OBS shoutout overlay. Triggered by the streamer clicking
     a Shoutout button in StreamFusion (or via Streamer.bot command). A
     large card zooms in with the viewer's profile photo, a thank-you
     message, and — crucially — auto-detected context: if they just
     subbed, gifted, cheered, raided, or tipped in the last few minutes,
     that event is surfaced in the card so the streamer doesn't have to
     remember.

     Data contract (event: shoutout):
       { user, platform, avatarUrl, recentEvent: { type, amount, text },
         thankMessage, duration }
     ─────────────────────────────────────────────────────────────────── */

  :root {
    --tw: #a970ff;
    --yt: #ff4545;
    --tt: #fe2c55;
    --kk: #53fc18;
    --accent: #3A86FF;
    --accent2: #2AD4B9;
    --gold: #f0b429;
    --text: #ffffff;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5vh 4vw;
  }

  .card {
    position: relative;
    min-width: 520px;
    max-width: 720px;
    padding: 30px 40px;
    border-radius: 18px;
    background:
      linear-gradient(135deg, rgba(14,14,16,.94), rgba(24,24,27,.92));
    border: 1px solid rgba(255,255,255,.1);
    backdrop-filter: blur(14px);
    box-shadow:
      0 30px 80px rgba(0,0,0,.6),
      0 0 60px rgba(58,134,255,.35),
      inset 0 1px 0 rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    gap: 28px;
    opacity: 0;
    transform: scale(.8) translateY(20px);
    overflow: visible;
  }

  .card.tw { box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(169,112,255,.5), inset 0 1px 0 rgba(255,255,255,.08); }
  .card.yt { box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(255,69,69,.5),  inset 0 1px 0 rgba(255,255,255,.08); }
  .card.tt { box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(254,44,85,.5),  inset 0 1px 0 rgba(255,255,255,.08); }
  .card.kk { box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(83,252,24,.5),  inset 0 1px 0 rgba(255,255,255,.08); }

  .card.in  { animation: cardIn 0.65s cubic-bezier(.22,1.4,.36,1) forwards, float 4s ease-in-out 0.7s infinite; }
  .card.out { animation: cardOut 0.45s cubic-bezier(.55,0,.7,.2) forwards; }

  @keyframes cardIn {
    0%   { opacity: 0; transform: scale(.6)  translateY(20px) rotate(-2deg); }
    55%  { opacity: 1; transform: scale(1.04) translateY(-4px) rotate(1deg); }
    100% { opacity: 1; transform: scale(1)    translateY(0)    rotate(0deg); }
  }
  @keyframes cardOut {
    0%   { opacity: 1; transform: scale(1)   translateY(0); }
    100% { opacity: 0; transform: scale(.94) translateY(-16px); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }

  /* Rotating gradient ring behind the avatar. Sells the "spotlight"
     feeling without stealing from the user's identity. */
  .avatar-wrap {
    position: relative;
    width: 120px; height: 120px;
    flex-shrink: 0;
  }
  .avatar-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--gold), var(--accent));
    animation: ringSpin 4s linear infinite;
    filter: blur(2px);
  }
  .card.tw .avatar-ring { background: conic-gradient(from 0deg, var(--tw), #e5d4ff, var(--gold), var(--tw)); }
  .card.yt .avatar-ring { background: conic-gradient(from 0deg, var(--yt), #ffb5b5, var(--gold), var(--yt)); }
  .card.tt .avatar-ring { background: conic-gradient(from 0deg, var(--tt), #25f4ee, var(--gold), var(--tt)); }
  .card.kk .avatar-ring { background: conic-gradient(from 0deg, var(--kk), #a0ff8b, var(--gold), var(--kk)); }

  @keyframes ringSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .avatar {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: 4px solid #0e0e10;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .avatar .fallback {
    font-size: 52px;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 2px 6px rgba(0,0,0,.5);
  }

  /* Small platform chip bottom-right of avatar, similar to Discord's
     presence indicator. Tells us instantly which platform the user
     came from without reading a line of text. */
  .plat-chip {
    position: absolute;
    right: -2px; bottom: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: #fff;
    border: 3px solid #0e0e10;
    z-index: 2;
  }
  .card.tw .plat-chip { background: var(--tw); }
  .card.yt .plat-chip { background: var(--yt); }
  .card.tt .plat-chip { background: var(--tt); }
  .card.kk .plat-chip { background: var(--kk); color: #0e0e10; }

  .body {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .kicker {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .kicker::before,
  .kicker::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240,180,41,.5), transparent);
  }
  .kicker::before { max-width: 24px; }
  .kicker::after  { max-width: 999px; }

  .name {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.05;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card.tw .name { background: linear-gradient(135deg, var(--tw), #e5d4ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card.yt .name { background: linear-gradient(135deg, var(--yt), #ffb5b5); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card.tt .name { background: linear-gradient(135deg, var(--tt), #25f4ee); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card.kk .name { background: linear-gradient(135deg, var(--kk), #a0ff8b); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  .thank {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,.85);
    line-height: 1.4;
    margin-top: 2px;
  }

  /* Context chip — appears only when we have recent-event data. Shows
     e.g. "just gifted 5 subs!" with an emoji prefix matching the type. */
  .ctx {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 100px;
    background: linear-gradient(135deg, rgba(240,180,41,.15), rgba(240,180,41,.08));
    border: 1px solid rgba(240,180,41,.35);
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    margin-top: 6px;
    align-self: flex-start;
    box-shadow: 0 2px 8px rgba(240,180,41,.15);
  }
  .ctx.sub,
  .ctx.gift  { background: linear-gradient(135deg, rgba(240,180,41,.15), rgba(240,180,41,.08)); border-color: rgba(240,180,41,.35); color: var(--gold); }
  .ctx.cheer { background: linear-gradient(135deg, rgba(145,70,255,.15), rgba(145,70,255,.08)); border-color: rgba(145,70,255,.35); color: #c8a6ff; }
  .ctx.tip   { background: linear-gradient(135deg, rgba(42,212,185,.15), rgba(42,212,185,.08)); border-color: rgba(42,212,185,.35); color: var(--accent2); }
  .ctx.raid  { background: linear-gradient(135deg, rgba(255,69,85,.15), rgba(255,69,85,.08)); border-color: rgba(255,69,85,.35); color: #ff8a95; }
  .ctx.follow { background: linear-gradient(135deg, rgba(58,134,255,.15), rgba(58,134,255,.08)); border-color: rgba(58,134,255,.35); color: var(--accent); }

  /* Sparkle burst — firing once when the card appears. */
  .sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
  }
  .sparkles .s {
    position: absolute;
    width: 8px; height: 8px;
    top: 50%; left: 50%;
    transform-origin: center;
    opacity: 0;
    animation: sparkle 1.2s cubic-bezier(.22,.9,.3,1) forwards;
  }
  .sparkles .s::before {
    content: '';
    display: block;
    width: 100%; height: 100%;
    background: var(--gold);
    clip-path: polygon(50% 0, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0 50%, 40% 40%);
    box-shadow: 0 0 8px currentColor;
  }
  @keyframes sparkle {
    0%   { opacity: 0; transform: translate(0,0) scale(0)  rotate(0deg); }
    50%  { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1) rotate(90deg); }
    100% { opacity: 0; transform: translate(var(--tx2), var(--ty2)) scale(.4) rotate(180deg); }
  }
</style>
</head>
<body>
<div id="stage"></div>

<script>
(function() {
  'use strict';

  var CFG = {
    duration:      8000,
    thankMessage:  'Thanks so much for supporting the stream!',
    showRecentEvent: true
  };
  var entitled = true;
  var stage = document.getElementById('stage');
  var current = null;

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  // Compose a natural-sounding context string from the recentEvent payload.
  // If the renderer pre-formatted a .text field use it verbatim so the
  // sender controls wording; otherwise we build a sensible default.
  function ctxForEvent(re) {
    if (!re) return null;
    if (re.text) return { type: re.type || 'follow', emoji: emojiFor(re.type), text: re.text };
    var t = String(re.type || '').toLowerCase();
    var amt = re.amount;
    switch (t) {
      case 'gift':   return { type: t, emoji: '🎁', text: 'just gifted ' + amt + (amt === 1 ? ' sub' : ' subs') + '!' };
      case 'sub':    return { type: t, emoji: '★',  text: 'just subscribed!' };
      case 'resub':  return { type: t, emoji: '★',  text: 'just resubscribed' + (re.months ? ' (' + re.months + ' mo)!' : '!') };
      case 'cheer':  return { type: t, emoji: '💎', text: 'just cheered ' + amt + ' bits!' };
      case 'raid':   return { type: t, emoji: '⚔️', text: 'raided with ' + amt + ' viewers!' };
      case 'tip':    return { type: t, emoji: '💰', text: 'tipped $' + amt + '!' };
      case 'follow': return { type: t, emoji: '♥',  text: 'recently followed!' };
      default: return null;
    }
  }
  function emojiFor(t) {
    return { gift:'🎁', sub:'★', resub:'★', cheer:'💎', raid:'⚔️', tip:'💰', follow:'♥' }[t] || '★';
  }

  function platformBadge(p) {
    return { tw:'T', yt:'Y', tt:'T', kk:'K' }[p] || '·';
  }

  function spawnSparkles(root) {
    var s = document.createElement('div');
    s.className = 'sparkles';
    for (var i = 0; i < 14; i++) {
      var el = document.createElement('div');
      el.className = 's';
      var a = Math.random() * Math.PI * 2;
      var d = 80 + Math.random() * 120;
      var d2 = d + 40 + Math.random() * 80;
      el.style.setProperty('--tx',  Math.cos(a) * d  + 'px');
      el.style.setProperty('--ty',  Math.sin(a) * d  + 'px');
      el.style.setProperty('--tx2', Math.cos(a) * d2 + 'px');
      el.style.setProperty('--ty2', Math.sin(a) * d2 + 'px');
      el.style.animationDelay = (Math.random() * 0.3) + 's';
      el.style.color = ['#f0b429','#3A86FF','#2AD4B9','#ec4899'][i % 4];
      s.appendChild(el);
    }
    root.appendChild(s);
    setTimeout(function() { if (s.parentNode) s.parentNode.removeChild(s); }, 1600);
  }

  function showShoutout(d) {
    if (!entitled || !d) return;

    // If a shoutout is already on screen, gracefully boot it before the
    // new one lands. This prevents stacking while still respecting
    // rapid-fire shoutouts (rare, but happens with gift bombs).
    if (current && current.parentNode) {
      current.classList.remove('in');
      current.classList.add('out');
      setTimeout(function(c) { return function() { if (c.parentNode) c.parentNode.removeChild(c); }; }(current), 420);
      current = null;
    }

    var card = document.createElement('div');
    card.className = 'card ' + (d.platform || '');
    current = card;

    var first = (d.user || '?').charAt(0).toUpperCase();
    var imgHtml = d.avatarUrl
      ? '<img src="' + escapeHtml(d.avatarUrl) + '" alt="" onerror="this.style.display=&quot;none&quot;;this.nextElementSibling.style.display=&quot;flex&quot;">' +
        '<div class="fallback" style="display:none">' + escapeHtml(first) + '</div>'
      : '<div class="fallback" style="display:flex">' + escapeHtml(first) + '</div>';

    var ctx = (CFG.showRecentEvent && d.recentEvent) ? ctxForEvent(d.recentEvent) : null;
    var ctxHtml = ctx
      ? '<div class="ctx ' + ctx.type + '"><span>' + ctx.emoji + '</span><span>' + escapeHtml(ctx.text) + '</span></div>'
      : '';

    card.innerHTML =
      '<div class="avatar-wrap">' +
        '<div class="avatar-ring"></div>' +
        '<div class="avatar">' + imgHtml + '</div>' +
        '<div class="plat-chip">' + platformBadge(d.platform) + '</div>' +
      '</div>' +
      '<div class="body">' +
        '<div class="kicker">Shoutout</div>' +
        '<div class="name">' + escapeHtml(d.user || 'friend') + '</div>' +
        '<div class="thank">' + escapeHtml(d.thankMessage || CFG.thankMessage) + '</div>' +
        ctxHtml +
      '</div>';

    stage.appendChild(card);
    requestAnimationFrame(function() {
      card.classList.add('in');
      spawnSparkles(card);
    });

    var dur = Math.max(3000, d.duration || CFG.duration);
    setTimeout(function() {
      if (card.parentNode) {
        card.classList.remove('in');
        card.classList.add('out');
        setTimeout(function() {
          if (card.parentNode) card.parentNode.removeChild(card);
          if (current === card) current = null;
        }, 460);
      }
    }, dur);
  }

  function applyConfig(cfg) {
    if (!cfg) return;
    Object.keys(cfg).forEach(function(k) { CFG[k] = cfg[k]; });
  }

  var es = new EventSource('/events?type=shoutout');
  es.addEventListener('hello',    function(e) { try { var d = JSON.parse(e.data); entitled = !!d.entitled; if (d.cfg) applyConfig(d.cfg); } catch(_){} });
  es.addEventListener('shoutout', function(e) { try { showShoutout(JSON.parse(e.data)); } catch(_){} });
  es.addEventListener('config',   function(e) { try { applyConfig(JSON.parse(e.data)); } catch(_){} });
  es.addEventListener('entitlement', function(e) { try { entitled = !!JSON.parse(e.data).entitled; } catch(_){} });
  es.addEventListener('shutdown', function() { es.close(); });
})();
</script>
</body>
</html>
