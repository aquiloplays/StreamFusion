<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>StreamFusion — Alerts</title>
<style>
  /* ───────────────────────────────────────────────────────────────────────
     StreamFusion OBS alerts overlay. Transparent, hidden by default.
     When an event arrives over SSE (/events?type=alerts) the alert card
     animates in, sits for a configurable duration, then animates out.
     Multiple events in flight queue up and fire sequentially — no two
     alerts overlap.

     Design goals:
       - Reads instantly from across a room (primary text big + bold)
       - Secondary line carries the specifics (name, amount, tier, etc.)
       - Distinct per-platform tint so a streamer glancing at stream
         knows where the alert came from before reading the text
       - Polished but restrained motion — spring-in, confetti for the
         biggest paid events, clean fade-slide out
     ─────────────────────────────────────────────────────────────────── */

  :root {
    --tw: #a970ff;
    --yt: #ff4545;
    --tt: #fe2c55;
    --kk: #53fc18;
    --se: #7cdf21;
    --pa: #ff424d;
    --fw: #f0b429;
    --kf: #29abe0;
    --accent: #3A86FF;
    --accent2: #2AD4B9;
    --gold: #f0b429;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,.85);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  /* Stage: centered container where the alert card renders.
     Positioned top-center by default — streamers typically paste this
     source across the top third of the canvas. Resize / reposition the
     browser source in OBS to move it. */
  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 6vh;
  }

  .alert {
    position: relative;
    min-width: 420px;
    max-width: 720px;
    padding: 20px 28px 20px 24px;
    border-radius: 14px;
    background:
      linear-gradient(135deg, rgba(14,14,16,.92), rgba(24,24,27,.92));
    border: 1px solid rgba(255,255,255,.08);
    box-shadow:
      0 20px 60px rgba(0,0,0,.5),
      0 0 0 1px rgba(58,134,255,.15),
      0 0 40px rgba(58,134,255,.25);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    gap: 18px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(-30px) scale(.96);
  }

  /* Accent bar along the top of the card tinted per platform. The bar
     is what "sells" the platform identity at a glance. */
  .alert::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 0; height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 14px 14px 0 0;
  }
  .alert.tw::before { background: linear-gradient(90deg, var(--tw), #7d3fff); }
  .alert.yt::before { background: linear-gradient(90deg, var(--yt), #ff7373); }
  .alert.tt::before { background: linear-gradient(90deg, var(--tt), #25f4ee); }
  .alert.kk::before { background: linear-gradient(90deg, var(--kk), #00e573); }
  .alert.se::before { background: linear-gradient(90deg, var(--se), #a0ff8b); }
  .alert.pa::before { background: linear-gradient(90deg, var(--pa), #ff8a95); }
  .alert.fw::before { background: linear-gradient(90deg, var(--fw), #f5c860); }
  .alert.kf::before { background: linear-gradient(90deg, var(--kf), #5bd0ff); }

  /* Ambient glow matching the platform. Mixed softly into the card. */
  .alert.tw { box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(169,112,255,.35); }
  .alert.yt { box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(255,69,69,.35); }
  .alert.tt { box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(254,44,85,.35); }
  .alert.kk { box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(83,252,24,.35); }

  .alert.in  { animation: alertIn  .55s cubic-bezier(.22,1.2,.36,1)    forwards; }
  .alert.out { animation: alertOut .40s cubic-bezier(.55,0,.7,.2)     forwards; }

  @keyframes alertIn {
    0%   { opacity: 0; transform: translateY(-30px) scale(.96); }
    60%  { opacity: 1; transform: translateY(4px)   scale(1.01); }
    100% { opacity: 1; transform: translateY(0)     scale(1); }
  }
  @keyframes alertOut {
    0%   { opacity: 1; transform: translateY(0)    scale(1); }
    100% { opacity: 0; transform: translateY(-12px) scale(.98); }
  }

  /* Icon — big circular chip with the event emoji. Uses a subtle
     gradient matching the accent bar for consistency. */
  .icon {
    flex-shrink: 0;
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 8px 20px rgba(58,134,255,.4), inset 0 1px 0 rgba(255,255,255,.2);
    position: relative;
  }
  .alert.tw .icon { background: linear-gradient(135deg, var(--tw), #7d3fff); box-shadow: 0 8px 20px rgba(169,112,255,.5), inset 0 1px 0 rgba(255,255,255,.2); }
  .alert.yt .icon { background: linear-gradient(135deg, var(--yt), #ff7373); box-shadow: 0 8px 20px rgba(255,69,69,.5), inset 0 1px 0 rgba(255,255,255,.2); }
  .alert.tt .icon { background: linear-gradient(135deg, var(--tt), #25f4ee); box-shadow: 0 8px 20px rgba(254,44,85,.5), inset 0 1px 0 rgba(255,255,255,.2); }
  .alert.kk .icon { background: linear-gradient(135deg, var(--kk), #00e573); color: #0e0e10; box-shadow: 0 8px 20px rgba(83,252,24,.5), inset 0 1px 0 rgba(255,255,255,.3); }

  /* Pulsing ring around the icon for high-value events (big gift, raid,
     large tip, large cheer). */
  .icon.pulse::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.5);
    animation: pulseRing 1.4s ease-out infinite;
  }
  @keyframes pulseRing {
    0%   { transform: scale(.9);  opacity: .9; }
    100% { transform: scale(1.5); opacity: 0;  }
  }

  .body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 2px; }

  .kicker {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .alert.tw .kicker { color: var(--tw); }
  .alert.yt .kicker { color: var(--yt); }
  .alert.tt .kicker { color: var(--tt); }
  .alert.kk .kicker { color: var(--kk); }

  .primary {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.1;
    color: var(--text);
    text-shadow: 0 2px 8px rgba(0,0,0,.5);
    margin-top: 2px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .primary .u {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
  }
  .alert.tw .primary .u { background: linear-gradient(135deg, var(--tw), #e5d4ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .alert.yt .primary .u { background: linear-gradient(135deg, var(--yt), #ffb5b5); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .alert.tt .primary .u { background: linear-gradient(135deg, var(--tt), #25f4ee); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .alert.kk .primary .u { background: linear-gradient(135deg, var(--kk), #a0ff8b); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  .secondary {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    margin-top: 3px;
    line-height: 1.4;
  }
  .secondary .msg {
    font-style: italic;
    opacity: .75;
  }

  /* Amount chip — for sub counts, bits, tips. Sits inline in the
     primary line with a colored pill. */
  .amt {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 18px;
    font-weight: 900;
    background: var(--gold);
    color: #0e0e10;
    box-shadow: 0 2px 8px rgba(240,180,41,.5);
  }
  .amt.tip { background: linear-gradient(135deg, #00e573, #2AD4B9); color: #0e0e10; box-shadow: 0 2px 8px rgba(42,212,185,.5); }
  .amt.bits { background: linear-gradient(135deg, #9146ff, #c398ff); color: #fff; box-shadow: 0 2px 8px rgba(145,70,255,.5); }

  /* Named gift chip — sits inline in the primary line for TikTok gifts
     (e.g. "sent [Galaxy] 1,000 coins"). Subtle pink tint so it reads as
     a gift-specific label without stealing attention from the amount. */
  .primary .giftname {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 100px;
    background: rgba(254,44,85,.18);
    color: #ff8fae;
    font-size: 15px;
    font-weight: 800;
    border: 1px solid rgba(254,44,85,.35);
  }

  /* When the icon chip holds an <img> (TikTok gift artwork), drop the
     default gradient background so the real gift art shows through
     with its own transparent PNG. */
  .icon img {
    background: transparent;
  }

  /* Confetti burst container — only populated for "big" paid events. */
  .confetti {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
  }
  .confetti .p {
    position: absolute;
    width: 6px; height: 12px;
    background: var(--accent);
    top: 50%; left: 50%;
    opacity: 0;
    animation: confettiFly 1.4s cubic-bezier(.2,.9,.3,1) forwards;
    border-radius: 1px;
  }
  @keyframes confettiFly {
    0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(var(--r)) scale(.5); }
  }
</style>
</head>
<body>
<div id="stage"></div>

<script>
(function() {
  'use strict';

  var CFG = {
    enabled: {
      follow: true,
      sub:    true,
      resub:  true,
      gift:   true,
      cheer:  true,
      raid:   true,
      tip:    true,
      host:   true
    },
    duration: 6000,
    bigGiftThreshold: 5,    // gift count that triggers confetti + pulse ring
    bigCheerThreshold: 500, // bits
    bigTipThreshold:   10,  // USD
    showEmotes:        true // render <img> emotes in the secondary message line
  };

  var stage = document.getElementById('stage');
  var queue = [];
  var showing = false;
  var entitled = true;

  // Mapping of event types to display details. `amtClass` selects the
  // color pill (gold for subs/gifts, teal for tips, purple for bits).
  var EVENT_META = {
    follow:      { kicker: 'NEW FOLLOW',   icon: '♥',  pulse: false, confetti: false },
    sub:         { kicker: 'NEW SUB',      icon: '★',  pulse: false, confetti: true,  amtClass: '' },
    resub:       { kicker: 'RE-SUB',       icon: '★',  pulse: false, confetti: true,  amtClass: '' },
    gift:        { kicker: 'GIFT SUBS',    icon: '🎁', pulse: true,  confetti: true,  amtClass: '' },
    cheer:       { kicker: 'BITS',         icon: '💎', pulse: false, confetti: true,  amtClass: 'bits' },
    raid:        { kicker: 'INCOMING RAID',icon: '⚔️', pulse: true,  confetti: true,  amtClass: '' },
    tip:         { kicker: 'TIP RECEIVED', icon: '💰', pulse: true,  confetti: true,  amtClass: 'tip' },
    host:        { kicker: 'HOST',         icon: '📡', pulse: false, confetti: false },
    // SB integration event types (EA only — fire only when the streamer
    // has the matching toggle on in Settings → Discord+)
    pledge:      { kicker: 'PATREON',      icon: 'P',  pulse: true,  confetti: true,  amtClass: 'tip' },
    tier_change: { kicker: 'TIER UP',      icon: '↑',  pulse: true,  confetti: true,  amtClass: 'tip' },
    pledge_end:  { kicker: 'PLEDGE ENDED', icon: '·',  pulse: false, confetti: false },
    order:       { kicker: 'MERCH ORDER',  icon: '🛍️', pulse: true,  confetti: true,  amtClass: 'tip' },
    donation:    { kicker: 'DONATION',     icon: '💰', pulse: true,  confetti: true,  amtClass: 'tip' }
  };

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  // Emote swap for the secondary message line. Alerts carrying a
  // viewer message (sub msg, resub msg, cheer msg, etc.) get the
  // same `emotes: [{name, url}]` array the chat overlay uses, so we
  // can render Twitch/Kick/YouTube/BTTV/7TV emote images inline.
  // Falls back to plain escaped text if emotes aren't supplied or the
  // streamer disabled emote rendering in the chat config (mirrored
  // here via CFG.showEmotes).
  function renderMessageWithEmotes(text, emotes) {
    if (CFG.showEmotes === false || !emotes || !emotes.length) return escapeHtml(text);
    var byName = Object.create(null);
    emotes.forEach(function(e) { if (e && e.name && e.url) byName[e.name] = e.url; });
    return String(text || '').split(/(\s+)/).map(function(tok) {
      if (byName[tok]) {
        return '<img class="emote" src="' + byName[tok] + '" alt="' + escapeHtml(tok) + '" style="height:1.1em;width:auto;vertical-align:middle;margin:0 1px" onerror="this.outerHTML=this.alt">';
      }
      return escapeHtml(tok);
    }).join('');
  }

  function formatPrimary(ev, meta) {
    var u = '<span class="u">' + escapeHtml(ev.user || 'someone') + '</span>';
    switch (ev.eventType) {
      case 'follow':      return u + ' followed!';
      case 'sub':         return u + ' subscribed';
      case 'resub':       return u + ' resubscribed' + (ev.months ? ' (' + ev.months + ' mo)' : '');
      case 'gift':
        // TikTok gifts speak in coins + a named gift ("Galaxy", "Rose");
        // Twitch/Kick gifts speak in "N subs". Detect by platform so the
        // primary line reads naturally for each.
        if (ev.platform === 'tt') {
          var giftName = ev.giftName ? ' <span class="giftname">' + escapeHtml(ev.giftName) + '</span>' : '';
          return u + ' sent' + giftName + ' <span class="amt bits">' + (ev.amount || 0) + ' coins</span>';
        }
        return u + ' gifted <span class="amt ' + (meta.amtClass||'') + '">' + (ev.amount || 1) + '</span>';
      case 'cheer':       return u + ' cheered <span class="amt bits">' + (ev.amount || 0) + '</span>';
      case 'raid':        return u + ' raided with <span class="amt">' + (ev.amount || 0) + '</span>';
      case 'tip':         return u + ' tipped <span class="amt tip">$' + (ev.amount || 0) + '</span>';
      case 'host':        return u + ' hosted!';
      case 'pledge':      return u + ' pledged on Patreon' + (ev.amount ? ' <span class="amt tip">$' + ev.amount + '</span>' : '!');
      case 'tier_change': return u + ' upgraded their tier!';
      case 'pledge_end':  return u + ' ended their pledge';
      case 'order':       return u + ' ordered' + (ev.message ? ' ' + escapeHtml(ev.message) : ' merch') + (ev.amount ? ' <span class="amt tip">$' + ev.amount + '</span>' : '!');
      case 'donation':    return u + ' donated <span class="amt tip">$' + (ev.amount || 0) + '</span>';
      default:            return u;
    }
  }

  function spawnConfetti(root, colors) {
    var c = document.createElement('div');
    c.className = 'confetti';
    var palette = colors && colors.length ? colors : ['#3A86FF','#2AD4B9','#f0b429','#ec4899'];
    for (var i = 0; i < 22; i++) {
      var p = document.createElement('div');
      p.className = 'p';
      var angle = (Math.random() * Math.PI * 2);
      var dist  = 110 + Math.random() * 140;
      p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      p.style.setProperty('--r',  (Math.random() * 720 - 360) + 'deg');
      p.style.background = palette[i % palette.length];
      p.style.animationDelay = (Math.random() * 0.15) + 's';
      c.appendChild(p);
    }
    root.appendChild(c);
    setTimeout(function() { if (c && c.parentNode) c.parentNode.removeChild(c); }, 1800);
  }

  function isBig(ev) {
    if (ev.eventType === 'gift')  return (ev.amount || 0) >= CFG.bigGiftThreshold;
    if (ev.eventType === 'cheer') return (ev.amount || 0) >= CFG.bigCheerThreshold;
    if (ev.eventType === 'tip')   return (ev.amount || 0) >= CFG.bigTipThreshold;
    if (ev.eventType === 'raid')  return (ev.amount || 0) >= 5;
    return false;
  }

  function showAlert(ev) {
    if (!entitled) { nextInQueue(); return; }
    var meta = EVENT_META[ev.eventType];
    if (!meta) { nextInQueue(); return; }
    if (CFG.enabled[ev.eventType] === false) { nextInQueue(); return; }
    // Small TikTok gifts are dispatched too so the chat overlay's
    // floating animation can fire; skip the banner for those so a
    // stream of 50 Roses doesn't produce 50 banners. The threshold
    // lives on the client (renderer's `bigGift` = coins >= 1000).
    if (ev.eventType === 'gift' && ev.platform === 'tt' && ev.isBig === false) {
      nextInQueue();
      return;
    }

    var card = document.createElement('div');
    card.className = 'alert ' + (ev.platform || '');

    var iconCls = 'icon' + (meta.pulse || isBig(ev) ? ' pulse' : '');
    // If the event carries a gift image (TikTok gifts do), render the
    // actual artwork inside the icon chip. Falls back to the emoji meta
    // icon if the CDN URL fails to load.
    var iconInner = ev.giftImage
      ? '<img src="' + escapeHtml(ev.giftImage) + '" alt="" style="width:70%;height:70%;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))" onerror="this.outerHTML=' + JSON.stringify(meta.icon) + '">'
      : meta.icon;
    var secondary = ev.message
      ? '<div class="secondary"><span class="msg">"' + renderMessageWithEmotes(ev.message, ev.emotes) + '"</span></div>'
      : (ev.tier ? '<div class="secondary">' + escapeHtml(ev.tier) + '</div>' : '');

    card.innerHTML =
      '<div class="' + iconCls + '">' + iconInner + '</div>' +
      '<div class="body">' +
        '<div class="kicker">' + meta.kicker + '</div>' +
        '<div class="primary">' + formatPrimary(ev, meta) + '</div>' +
        secondary +
      '</div>';

    stage.appendChild(card);

    // Trigger the in animation on the next frame so the initial
    // transform sticks before the class flip.
    requestAnimationFrame(function() { card.classList.add('in'); });

    if (meta.confetti || isBig(ev)) {
      spawnConfetti(card, ev.colors);
    }

    var dur = Math.max(2000, ev.duration || CFG.duration || 6000);
    setTimeout(function() {
      card.classList.remove('in');
      card.classList.add('out');
      setTimeout(function() {
        if (card.parentNode) card.parentNode.removeChild(card);
        nextInQueue();
      }, 420);
    }, dur);
  }

  function nextInQueue() {
    showing = false;
    if (queue.length > 0) {
      var next = queue.shift();
      showing = true;
      showAlert(next);
    }
  }

  function enqueue(ev) {
    if (!ev || !ev.eventType) return;
    if (showing) { queue.push(ev); }
    else { showing = true; showAlert(ev); }
  }

  function applyConfig(cfg) {
    if (!cfg) return;
    Object.keys(cfg).forEach(function(k) { CFG[k] = cfg[k]; });
  }

  // ──────────────────────────────────────────────────────────────────
  // SSE
  // ──────────────────────────────────────────────────────────────────
  var es = new EventSource('/events?type=alerts');

  es.addEventListener('hello', function(e) {
    try {
      var d = JSON.parse(e.data);
      entitled = !!d.entitled;
      if (d.cfg) applyConfig(d.cfg);
    } catch (err) {}
  });
  es.addEventListener('alert', function(e) {
    try { enqueue(JSON.parse(e.data)); } catch (err) {}
  });
  es.addEventListener('config', function(e) {
    try { applyConfig(JSON.parse(e.data)); } catch (err) {}
  });
  es.addEventListener('entitlement', function(e) {
    try { entitled = !!JSON.parse(e.data).entitled; } catch (err) {}
  });
  es.addEventListener('shutdown', function() { es.close(); });
})();
</script>
</body>
</html>
