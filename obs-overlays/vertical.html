<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>StreamFusion — Vertical Chat Bar</title>
<style>
  /* ───────────────────────────────────────────────────────────────────────
     Vertical-stream chat bar overlay. Built for phones-in-portrait streams
     (TikTok LIVE, YT Shorts Live, Twitch vertical). Renders one message
     or event at a time along the bottom edge of the canvas: slides up,
     holds for a few seconds, slides back down.

     Unlike the main chat.html overlay (which stacks messages), this is
     a serialized queue so a single focal moment is legible on a narrow
     canvas where stacked messages would overlap the streamer or UI.

     1.4.4 updates:
       - Long messages marquee (scroll right→left) instead of getting
         cut off with an ellipsis. The animation duration scales with
         content length so fast readers aren't forced to wait.
       - Emote support: server sends `emotes: [{name, url}]` and we
         swap matching tokens inline as <img>.
       - Optional profile pictures, platform icon chips, and badges —
         same toggles as the horizontal chat overlay.
     ─────────────────────────────────────────────────────────────────── */

  :root {
    --bg-op: 0.55;
    --font-size: 20px;
    --tw: #a970ff;
    --yt: #ff4545;
    --tt: #fe2c55;
    --kk: #53fc18;
    --se: #7cdf21;
    --pa: #ff424d;
    --fw: #f0b429;
    --kf: #29abe0;
    --accent: #3A86FF;
    --accent2: #2AD4B9;
    --text: #ffffff;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  #stage {
    position: absolute;
    inset: 0;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 10px;
  }

  .bar {
    position: relative;
    width: 100%;
    max-width: 960px;
    min-height: 48px;
    padding: 12px 18px;
    border-radius: 12px;
    background: rgba(14, 14, 16, var(--bg-op));
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,.4);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: var(--font-size);
    line-height: 1.3;
    opacity: 0;
    transform: translateY(100%);
  }

  .bar.in  { animation: barIn  .45s cubic-bezier(.22,1.1,.36,1) forwards; }
  .bar.out { animation: barOut .35s cubic-bezier(.55,0,.7,.2) forwards; }

  @keyframes barIn {
    0%   { opacity: 0; transform: translateY(100%); }
    60%  { opacity: 1; transform: translateY(-4%); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes barOut {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(100%); }
  }

  .bar::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 4px;
    border-radius: 0 3px 3px 0;
    background: var(--accent);
    box-shadow: 0 0 10px currentColor;
  }
  .bar.tw { color: var(--tw); } .bar.tw::before { background: var(--tw); }
  .bar.yt { color: var(--yt); } .bar.yt::before { background: var(--yt); }
  .bar.tt { color: var(--tt); } .bar.tt::before { background: var(--tt); }
  .bar.kk { color: var(--kk); } .bar.kk::before { background: var(--kk); }
  .bar.se { color: var(--se); } .bar.se::before { background: var(--se); }
  .bar.pa { color: var(--pa); } .bar.pa::before { background: var(--pa); }
  .bar.fw { color: var(--fw); } .bar.fw::before { background: var(--fw); }
  .bar.kf { color: var(--kf); } .bar.kf::before { background: var(--kf); }

  /* Alerts get a thicker highlight + pulsing ring. */
  .bar.is-alert {
    background: linear-gradient(90deg, rgba(14,14,16,.92), rgba(24,24,27,.92));
    border-color: rgba(255,255,255,.15);
  }
  .bar.is-alert::before { width: 6px; box-shadow: 0 0 20px currentColor; }
  .bar.is-alert::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border: 1px solid currentColor;
    opacity: .6;
    animation: alertPulse 1.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes alertPulse {
    0%, 100% { opacity: .3; }
    50%      { opacity: .8; }
  }

  .pfp {
    width: calc(var(--font-size) + 8px);
    height: calc(var(--font-size) + 8px);
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
  }
  .pi {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    border-radius: 4px;
    color: #0e0e10;
  }
  .pi.tw { background: var(--tw); color: #fff; }
  .pi.yt { background: var(--yt); color: #fff; }
  .pi.tt { background: var(--tt); color: #fff; }
  .pi.kk { background: var(--kk); color: #0e0e10; }

  .ub {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 4px;
    vertical-align: 2px;
    color: #fff;
  }
  .ub.mod { background: #00ad03; }
  .ub.vip { background: #e00b8a; }
  .ub.sub { background: #8205b4; }
  .ub.broadcaster { background: #e91916; }

  .user {
    font-weight: 900;
    flex-shrink: 0;
    white-space: nowrap;
    color: currentColor;
  }
  .sep { color: rgba(255,255,255,.6); flex-shrink: 0; }

  /* Message text viewport. When content fits the bar, stays static.
     When it overflows, the `.scrolling` class swaps the inner span
     to a marquee-style right→left slide so the whole line is
     readable within the bar's hold time. */
  /* 1.4.9 fix: the old mask-image had a 14px fade on the LEFT edge which
     chopped the first letter of every message. Text starts at the left
     of the container AND doesn't scroll past it (marquee scrolls right
     -> left, so the left edge is always the "already-read" side), so
     the left fade was gratuitous and actively destructive. Kept the
     right fade so text scrolling out looks smooth, not cliff-cut. */
  .text {
    color: var(--text);
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-shadow: 0 2px 6px rgba(0,0,0,.5);
    mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 18px), rgba(0,0,0,0) 100%);
    -webkit-mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 18px), rgba(0,0,0,0) 100%);
    padding-right: 4px;
  }
  .text .inner {
    display: inline-block;
    padding-left: 0;
    white-space: nowrap;
    will-change: transform;
  }
  .text.scrolling .inner {
    animation: marquee var(--marquee-dur, 8s) linear forwards;
    padding-left: 0;
  }
  @keyframes marquee {
    /* Start offscreen to the right so the first character enters
       smoothly after the bar finishes sliding up. End offscreen to
       the left so the last character has fully cleared before the
       bar slides back down. */
    0%   { transform: translateX(var(--start-x, 0)); }
    12%  { transform: translateX(0); }
    100% { transform: translateX(var(--end-x, -100%)); }
  }

  .text img.emote { height: 1.1em; width: auto; vertical-align: middle; margin: 0 2px; }

  .kicker {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 100px;
    background: currentColor;
    color: #0e0e10;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-right: 4px;
    flex-shrink: 0;
  }

  #gated {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(14,14,16,.9);
    color: #ff424d;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  #gated.show { display: flex; }
</style>
</head>
<body>
<div id="stage"></div>
<div id="gated">Early Access required</div>

<script>
(function() {
  'use strict';

  var CFG = {
    bgOpacity:    0.55,
    fontSize:     20,
    holdMs:       4500,
    showPlatforms: { tw: true, yt: true, tt: true, kk: true, se: true, pa: true, fw: true, kf: true },
    showEvents:   true,
    showChat:     true,
    showEmotes:   true,
    showProfilePics: false,
    showPlatformIcon: false,
    showUserBadges:  true
  };

  var stage = document.getElementById('stage');
  var gated = document.getElementById('gated');
  var queue = [];
  var showing = false;
  var entitled = true;

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  // Emote swap — same shape as the horizontal chat overlay. Called
  // only for chat items; alerts render their named gift separately.
  function renderMessage(text, emotes) {
    if (!CFG.showEmotes || !emotes || !emotes.length) return escapeHtml(text);
    var byName = Object.create(null);
    emotes.forEach(function(e) { if (e && e.name && e.url) byName[e.name] = e.url; });
    return String(text || '').split(/(\s+)/).map(function(tok) {
      if (byName[tok]) {
        return '<img class="emote" src="' + byName[tok] + '" alt="' + escapeHtml(tok) + '" onerror="this.outerHTML=this.alt">';
      }
      return escapeHtml(tok);
    }).join('');
  }

  function renderBadges(badges) {
    if (!CFG.showUserBadges || !badges || !badges.length) return '';
    return badges.map(function(b) {
      var cls = String(b).toLowerCase();
      if (!/^(mod|vip|sub|broadcaster)$/.test(cls)) return '';
      var label = cls === 'broadcaster' ? 'HOST' : cls.toUpperCase();
      return '<span class="ub ' + cls + '">' + label + '</span>';
    }).join('');
  }

  function renderPfp(item) {
    if (!CFG.showProfilePics || !item.avatar) return '';
    return '<img class="pfp" src="' + escapeHtml(item.avatar) + '" alt="" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">';
  }

  function renderPlatIcon(plat) {
    if (!CFG.showPlatformIcon || !plat) return '';
    return '<span class="pi ' + plat + '">' + plat.toUpperCase() + '</span>';
  }

  function kickerFor(eventType) {
    return {
      follow: 'FOLLOW',  sub:   'SUB',    resub: 'RE-SUB',
      gift:   'GIFT',    cheer: 'BITS',   raid:  'RAID',
      tip:    'TIP',     host:  'HOST',
      pledge: 'PATREON', tier_change: 'TIER UP',
      order:  'ORDER',   donation: 'DONATION'
    }[eventType] || 'EVENT';
  }

  // After a bar lands in the DOM, measure its .text inner width vs.
  // the available text-column width; if the inner overflows, enable
  // the marquee animation scaled to the hold time + overflow amount.
  function maybeStartMarquee(bar, holdMs) {
    var text = bar.querySelector('.text');
    var inner = text && text.querySelector('.inner');
    if (!text || !inner) return;
    // Wait a frame so layout settles before measuring.
    requestAnimationFrame(function() {
      var textW  = text.clientWidth;
      var innerW = inner.scrollWidth;
      if (innerW <= textW + 2) return;
      var overflow = innerW - textW;
      // Animation cycle covers the full bar hold time with a short
      // pause at the start so readers can recognize the first words
      // before the scroll begins. Speed floors at ~60px/s so even
      // huge overflows never crawl.
      var secs = Math.max(4, Math.min((holdMs / 1000) - 0.5, overflow / 60));
      text.style.setProperty('--start-x', '0px');
      text.style.setProperty('--end-x',   -(overflow + 24) + 'px');
      text.style.setProperty('--marquee-dur', secs + 's');
      text.classList.add('scrolling');
    });
  }

  function showItem(item) {
    if (!entitled) { nextInQueue(); return; }
    var plat = (item.platform || '').toLowerCase();

    if (item._kind === 'chat' && !CFG.showChat) { nextInQueue(); return; }
    if (item._kind === 'alert' && !CFG.showEvents) { nextInQueue(); return; }
    if (plat && CFG.showPlatforms && CFG.showPlatforms[plat] === false) { nextInQueue(); return; }
    // Suppress the vertical bar for small TT gifts — they get the chat
    // overlay's floating animation instead. Spammy gift drops shouldn't
    // flood a single-line bar.
    if (item._kind === 'alert' && item.eventType === 'gift' && item.platform === 'tt' && item.isBig === false) {
      nextInQueue();
      return;
    }

    var bar = document.createElement('div');
    bar.className = 'bar ' + plat + (item._kind === 'alert' ? ' is-alert' : '');

    var inner;
    if (item._kind === 'alert') {
      var kicker = kickerFor(item.eventType);
      var primary;
      if (item.eventType === 'gift' && item.platform === 'tt') {
        primary = (item.user || 'someone') + ' sent ' + (item.giftName ? item.giftName + ' ' : '') + '(' + (item.amount || 0) + ' coins)';
      } else if (item.eventType === 'gift')  primary = (item.user || 'someone') + ' gifted ' + (item.amount || 1) + ' subs!';
      else if (item.eventType === 'cheer') primary = (item.user || 'someone') + ' cheered ' + (item.amount || 0) + ' bits!';
      else if (item.eventType === 'raid')  primary = (item.user || 'someone') + ' raided with ' + (item.amount || 0) + ' viewers';
      else if (item.eventType === 'tip')   primary = (item.user || 'someone') + ' tipped $' + (item.amount || 0);
      else if (item.eventType === 'follow') primary = (item.user || 'someone') + ' followed';
      else primary = (item.user || 'someone') + ' ' + (item.eventType || 'event');

      var kickerHtml = item.giftImage
        ? '<span class="kicker" style="padding:0;background:transparent;box-shadow:none"><img src="' + escapeHtml(item.giftImage) + '" alt="" style="height:28px;width:28px;object-fit:contain;vertical-align:middle" onerror="this.replaceWith(Object.assign(document.createElement(&quot;span&quot;),{textContent:&quot;' + escapeHtml(kicker) + '&quot;,className:&quot;kicker&quot;}))"></span>'
        : '<span class="kicker">' + escapeHtml(kicker) + '</span>';

      inner =
        renderPfp(item) +
        kickerHtml +
        '<div class="text"><span class="inner">' + escapeHtml(primary) + '</span></div>';
    } else {
      inner =
        renderPfp(item) +
        renderPlatIcon(plat) +
        renderBadges(item.badges) +
        '<span class="user">' + escapeHtml(item.user || 'anon') + '</span>' +
        '<span class="sep">\u00b7</span>' +
        '<div class="text"><span class="inner">' + renderMessage(item.message || '', item.emotes) + '</span></div>';
    }

    bar.innerHTML = inner;
    stage.appendChild(bar);

    requestAnimationFrame(function() {
      bar.classList.add('in');
      maybeStartMarquee(bar, Math.max(1500, CFG.holdMs));
    });

    setTimeout(function() {
      bar.classList.remove('in');
      bar.classList.add('out');
      setTimeout(function() {
        if (bar.parentNode) bar.parentNode.removeChild(bar);
        nextInQueue();
      }, 360);
    }, Math.max(1500, CFG.holdMs));
  }

  function nextInQueue() {
    showing = false;
    if (queue.length > 0) {
      showing = true;
      while (queue.length > 20) queue.shift();
      showItem(queue.shift());
    }
  }

  function enqueue(kind, data) {
    if (!data) return;
    data._kind = kind;
    if (showing) queue.push(data);
    else { showing = true; showItem(data); }
  }

  function applyConfig(cfg) {
    if (!cfg) return;
    Object.keys(cfg).forEach(function(k) { CFG[k] = cfg[k]; });
    document.documentElement.style.setProperty('--bg-op', String(CFG.bgOpacity != null ? CFG.bgOpacity : 0.55));
    document.documentElement.style.setProperty('--font-size', (CFG.fontSize || 20) + 'px');
  }

  var es = new EventSource('/events?type=vertical');
  es.addEventListener('hello', function(e) {
    try {
      var d = JSON.parse(e.data);
      entitled = !!d.entitled;
      if (d.cfg) applyConfig(d.cfg);
      gated.classList.toggle('show', !entitled);
    } catch (err) {}
  });
  es.addEventListener('chat',  function(e) { try { enqueue('chat',  JSON.parse(e.data)); } catch (err) {} });
  es.addEventListener('alert', function(e) { try { enqueue('alert', JSON.parse(e.data)); } catch (err) {} });
  es.addEventListener('config', function(e) { try { applyConfig(JSON.parse(e.data)); } catch (err) {} });
  es.addEventListener('entitlement', function(e) {
    try { entitled = !!JSON.parse(e.data).entitled; gated.classList.toggle('show', !entitled); } catch (err) {}
  });
  es.addEventListener('shutdown', function() { es.close(); });
})();
</script>
</body>
</html>
