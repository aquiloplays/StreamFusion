<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreamFusion Overlay</title>
<style>
:root{
  --surf:rgba(14,14,16,.82);--surf2:rgba(14,14,16,.65);--bdr:rgba(42,42,48,.5);
  --txt:#efeff1;--mut:#adadb8;
  --tw:#9147ff;--yt:#ff0000;--tt:#00f2ea;--kk:#53fc18;--cc:#f5a524;--ev:#f0b429;
  --grn:#3fb950;--org:#f0883e;--red:#f85149;--se:#7cdf21;
  --r:6px;--chat-size:13px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent}
body{color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;padding-bottom:72px;box-sizing:border-box}

/* ── Drag bar ─────────────────────────────────────────────────── */
.ov-drag{height:28px;background:var(--surf);display:flex;align-items:center;padding:0 8px;flex-shrink:0;-webkit-app-region:drag;user-select:none;border-bottom:1px solid var(--bdr);gap:6px;border-radius:8px 8px 0 0}
.ov-drag-title{font-size:10px;font-weight:700;color:var(--mut);flex:1;letter-spacing:.6px;text-transform:uppercase}
.ov-drag-btn{width:22px;height:18px;border:none;border-radius:3px;background:rgba(255,255,255,.08);color:var(--mut);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-app-region:no-drag;transition:all .15s}
.ov-drag-btn:hover{background:rgba(255,255,255,.18);color:var(--txt)}
.ov-drag-btn.close:hover{background:#c42b1c;color:#fff}
.ov-ctrl-hint{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.3px;flex-shrink:0;display:none;font-weight:600}
body.clickthrough .ov-ctrl-hint{display:block}
body.clickthrough.interactive .ov-ctrl-hint{color:#3A86FF}

/* Click-through mode: all non-interactive unless temporarily unlocked */
body.clickthrough{pointer-events:none}
body.clickthrough.interactive{pointer-events:auto}
body.clickthrough.interactive .ov-drag{border-bottom-color:#3A86FF;box-shadow:0 0 12px rgba(58,134,255,.4)}
body.clickthrough.interactive .ov-drag-title{color:#3A86FF}

/* ── Settings panel ───────────────────────────────────────────── */
.ov-settings{background:var(--surf);border-bottom:1px solid var(--bdr);padding:8px 10px;display:none;flex-direction:column;gap:6px;flex-shrink:0;max-height:80vh;overflow-y:auto}
.ov-drag-btn.lock-on{background:#3A86FF;color:#fff}
.ov-drag-btn.lock-on:hover{background:#5CA3FF}
.ov-settings.show{display:flex}
.ov-settings::-webkit-scrollbar{width:3px}.ov-settings::-webkit-scrollbar-thumb{background:var(--bdr)}
.ov-s-hd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mut)}
.ov-s-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--txt);padding:2px 0}
.ov-s-row input[type=checkbox]{accent-color:#3A86FF;width:13px;height:13px;cursor:pointer}
.ov-s-row input[type=range]{flex:1;max-width:100px;accent-color:#3A86FF;cursor:pointer;margin:0 6px}
.ov-s-val{font-size:10px;color:var(--mut);min-width:28px;text-align:right}

/* ── Live-on bar ──────────────────────────────────────────────── */
.ov-live{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;white-space:nowrap;overflow-x:auto}
.ov-live::-webkit-scrollbar{height:3px}.ov-live::-webkit-scrollbar-thumb{background:var(--bdr)}
.ov-live-lbl{font-size:10px;font-weight:900;letter-spacing:1.4px;color:var(--mut);text-transform:uppercase;padding-right:2px;flex-shrink:0}
.ov-live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);animation:livePulse 1.3s ease-in-out infinite;flex-shrink:0}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.85)}}
.ov-live-chip{font-size:12px;font-weight:800;padding:4px 8px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mut);letter-spacing:.5px;flex-shrink:0;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.ov-live-chip svg{display:block;flex-shrink:0}
.ov-live-chip.on.tw{color:var(--tw);border-color:var(--tw);background:rgba(145,71,255,.15);box-shadow:0 0 10px rgba(145,71,255,.3)}
.ov-live-chip.on.yt{color:var(--yt);border-color:var(--yt);background:rgba(255,0,0,.15);box-shadow:0 0 10px rgba(255,0,0,.3)}
.ov-live-chip.on.tt{color:var(--tt);border-color:var(--tt);background:rgba(0,242,234,.15);box-shadow:0 0 10px rgba(0,242,234,.3)}
.ov-live-chip.on.kk{color:var(--kk);border-color:var(--kk);background:rgba(83,252,24,.15);box-shadow:0 0 10px rgba(83,252,24,.3)}
.ov-live-timer{margin-left:auto;font-size:14px;font-weight:900;color:var(--txt);font-variant-numeric:tabular-nums;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:10px;padding:4px 10px;flex-shrink:0;letter-spacing:1px}
.ov-live-timer.off{color:var(--mut);opacity:.55}

/* ── Stats bar ─────────────────────────────────────────────────── */
.ov-stats{display:flex;flex-wrap:wrap;gap:10px;padding:11px 14px;background:var(--surf2);border-bottom:1px solid var(--bdr);flex-shrink:0;align-items:center;overflow-x:auto;white-space:nowrap;row-gap:8px}
.ov-stats::-webkit-scrollbar{height:3px}.ov-stats::-webkit-scrollbar-thumb{background:var(--bdr)}
.ov-stats.show{display:flex}
.ov-stats.hidden{display:none}
.ov-st{font-size:13px;font-weight:700;padding:6px 14px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
.ov-st .ov-st-num{font-size:15px;font-weight:900;color:var(--txt);margin-left:5px}
.ov-st.tw{color:var(--tw);border-color:rgba(145,71,255,.45)}
.ov-st.yt{color:var(--yt);border-color:rgba(255,0,0,.45)}
.ov-st.tt{color:var(--tt);border-color:rgba(0,242,234,.45)}
.ov-st.kk{color:var(--kk);border-color:rgba(83,252,24,.45)}
.ov-st.bits{color:#bf94ff;border-color:rgba(191,148,255,.45)}
.ov-st.coins{color:#ffd54a;border-color:rgba(255,213,74,.45)}
.ov-st.rev{color:#ffd700;border-color:rgba(255,215,0,.45);background:rgba(255,215,0,.08);font-size:14px;padding:6px 16px}
.ov-st.likes{position:relative}
.ov-fly-heart{position:absolute;bottom:100%;left:50%;pointer-events:none;font-size:13px;opacity:1;animation:ovFlyHeart 1.2s ease-out forwards;z-index:10}
@keyframes ovFlyHeart{0%{opacity:1;transform:translate(-50%,0) scale(.7)}40%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--hx)),calc(-34px + var(--hy))) scale(1.1)}}
.ov-st.rev .ov-st-num{color:#ffd700;font-size:16px}
.ov-stats-lbl{font-size:10px;font-weight:900;color:var(--mut);text-transform:uppercase;letter-spacing:1.2px;padding:0 6px 0 4px}
.ov-stats-div{width:1px;height:22px;background:var(--bdr);margin:0 8px;flex-shrink:0}

/* ── Goals bar ────────────────────────────────────────────────── */
.ov-goals{display:none;padding:4px 8px;background:var(--surf2);border-bottom:1px solid var(--bdr);flex-shrink:0;gap:6px;flex-wrap:wrap}
.ov-goals.show{display:flex}
.ov-goal{flex:1;min-width:80px}
.ov-goal-hd{display:flex;align-items:center;justify-content:space-between;font-size:8px;font-weight:700;color:var(--mut);letter-spacing:.3px;margin-bottom:1px}
.ov-goal-hd .ov-goal-ct{color:var(--txt);font-size:9px;font-weight:800}
.ov-goal-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.ov-goal-fill{height:100%;border-radius:3px;transition:width .5s ease;min-width:0}
.ov-goal-fill.followers{background:linear-gradient(90deg,#3fb950,#7af2a1)}
.ov-goal-fill.subs{background:linear-gradient(90deg,#3A86FF,#7BB8FF)}
.ov-goal-fill.bits{background:linear-gradient(90deg,#bf94ff,#e2c4ff)}
.ov-goal-fill.revenue{background:linear-gradient(90deg,#ffd700,#ffe680)}
.ov-goal.done .ov-goal-fill{filter:brightness(1.3)}.ov-goal.done .ov-goal-hd{color:var(--grn)}

/* ── Hype train ───────────────────────────────────────────────── */
.ov-hype{display:none;padding:4px 8px;background:var(--surf2);border-bottom:1px solid var(--bdr);flex-shrink:0}
.ov-hype.show{display:block}
.ov-hype-hd{display:flex;align-items:center;justify-content:space-between;font-size:9px;font-weight:700;color:var(--org);text-transform:uppercase;margin-bottom:2px}
.ov-hype-lv{background:var(--org);color:#000;font-size:8px;font-weight:900;border-radius:3px;padding:0 5px;margin-left:4px}
.ov-hype-timer{color:var(--mut);font-variant-numeric:tabular-nums;margin-left:auto}
.ov-hype-track{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;position:relative}
.ov-hype-fill{height:100%;background:linear-gradient(90deg,#c85a00,#f0883e,#ffd700);border-radius:3px;transition:width .5s ease;min-width:3px;position:relative;overflow:hidden}
.ov-hype-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:ovShimmer 1.8s ease-in-out infinite}
@keyframes ovShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes ovHypeSlide{0%{transform:translateX(-100%);opacity:0}15%{opacity:1}85%{opacity:1}100%{transform:translateX(100%);opacity:0}}
.ov-hype-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;text-shadow:0 0 6px rgba(255,200,0,.8);animation:ovHypeSlide 2s ease-in-out forwards;pointer-events:none;z-index:5;letter-spacing:2px}

/* ── Poll / Prediction panels ─────────────────────────────────── */
.ov-poll,.ov-pred{display:none;padding:5px 8px;background:var(--surf2);border-bottom:1px solid var(--bdr);flex-shrink:0}
.ov-poll:not(.hidden),.ov-pred:not(.hidden){display:block}
.ov-poll-hd,.ov-pred-hd{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.ov-poll-hd{color:#9b59b6} .ov-pred-hd{color:#e67e22}
.ov-poll-status,.ov-pred-status{margin-left:auto;font-size:8px;font-weight:900;border-radius:3px;padding:1px 5px;letter-spacing:.5px}
.ov-poll-status{background:#9b59b6;color:#fff} .ov-pred-status{background:#e67e22;color:#fff}
.ov-poll-status.ended{background:var(--mut);opacity:.7} .ov-pred-status.ended{background:var(--mut);opacity:.7}
.ov-poll-status.resolved{background:#27ae60} .ov-pred-status.resolved{background:#27ae60}
.ov-pred-status.locked{background:#e74c3c}
.ov-poll-choice,.ov-pred-outcome{display:flex;align-items:center;gap:5px;font-size:10px;margin:2px 0;position:relative}
.ov-poll-choice-bar,.ov-pred-outcome-bar{position:absolute;left:0;top:0;bottom:0;border-radius:3px;opacity:.18;transition:width .4s ease}
.ov-poll-choice-bar{background:#9b59b6} .ov-pred-outcome-bar{background:#e67e22}
.ov-poll-choice-name,.ov-pred-outcome-name{position:relative;z-index:1;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:2px 4px}
.ov-poll-choice-val,.ov-pred-outcome-val{position:relative;z-index:1;font-variant-numeric:tabular-nums;color:var(--mut);font-size:9px;padding-right:4px}
.ov-poll-choice.winner .ov-poll-choice-name,.ov-pred-outcome.winner .ov-pred-outcome-name{color:#2ecc71;font-weight:700}

/* ── Chat feed ────────────────────────────────────────────────── */
.ov-feed{flex:1;overflow-y:auto;padding:4px 6px;display:flex;flex-direction:column-reverse;gap:1px;background:var(--surf2)}
.ov-feed::-webkit-scrollbar{width:3px}
.ov-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes ovMsgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Flat row: avatar on the left, then a flex:1 body column (name/badges row,
   badge-line row if first-msg/first-words, text row). Using a column body
   instead of flex-wrap lets the username stay compact while the message text
   always gets the full remaining width — no more one-word-per-line when the
   overlay is narrow. */
.ov-msg{display:flex;gap:5px;padding:3px 5px;border-radius:4px;border-left:2px solid transparent;font-size:var(--chat-size);animation:ovMsgInPop .35s cubic-bezier(.16,1,.3,1) both;line-height:1.5;word-break:break-word;transition:background .25s ease;position:relative;align-items:flex-start}
.ov-mbody{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.ov-mhead{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px;min-width:0}
.ov-msg.tw{border-color:var(--tw)}.ov-msg.yt{border-color:var(--yt)}.ov-msg.tt{border-color:var(--tt)}.ov-msg.kk{border-color:var(--kk)}
.ov-msg:hover{background:rgba(255,255,255,.04)}
/* Mod menu (Twitch only) — hidden until msg is hovered or menu is open */
.ov-mod-wrap{position:absolute;top:2px;right:4px;opacity:0;transition:opacity .15s ease;z-index:20}
.ov-msg:hover .ov-mod-wrap,.ov-mod-wrap.open{opacity:1}
.ov-mod-btn{background:rgba(0,0,0,.55);border:1px solid var(--bdr);border-radius:4px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut);padding:0}
.ov-mod-btn:hover{color:var(--txt);background:rgba(145,71,255,.3);border-color:var(--tw)}
.ov-mod-btn svg{width:12px;height:12px}
.ov-mod-menu{display:none;position:absolute;top:22px;right:0;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:3px;min-width:120px;box-shadow:0 4px 14px rgba(0,0,0,.55);z-index:30}
.ov-mod-menu.show{display:flex;flex-direction:column;gap:1px}
.ov-mod-item{padding:4px 8px;font-size:11px;border-radius:4px;cursor:pointer;color:var(--txt);white-space:nowrap;transition:background .12s,padding-left .15s}
.ov-mod-item:hover{background:rgba(255,255,255,.08);padding-left:12px}
.ov-mod-item.danger{color:var(--red)}
.ov-mod-item.danger:hover{background:rgba(248,81,73,.15)}
.ov-user{font-weight:700;flex-shrink:0;white-space:nowrap}
.ov-user.tw{color:var(--tw)}.ov-user.yt{color:var(--yt)}.ov-user.tt{color:var(--tt)}.ov-user.kk{color:var(--kk)}
.ov-text{color:var(--txt);min-width:0}
.ov-badge{width:14px;height:14px;vertical-align:middle;margin:0 1px;border-radius:2px}
.ov-avatar{width:20px;height:20px;border-radius:50%;flex-shrink:0;object-fit:cover;margin-top:1px;border:1px solid rgba(255,255,255,.1)}
.ov-pico{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.ov-pico svg{width:8px;height:8px}
.ov-pico.tw{background:var(--tw);color:#fff}.ov-pico.yt{background:var(--yt);color:#fff}.ov-pico.tt{background:var(--tt);color:#000}.ov-pico.kk{background:var(--kk);color:#000}
.ov-fmsg-badge,.ov-fwords-badge{display:inline-block;font-size:8px;font-weight:900;padding:1px 5px;border-radius:8px;letter-spacing:.5px;vertical-align:middle;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.ov-fmsg-badge{background:linear-gradient(135deg,#ffd700,#f0883e);color:#1a1a1f;box-shadow:0 0 6px rgba(255,200,0,.5)}
.ov-fwords-badge{background:linear-gradient(135deg,#53fc18,#2fa80d);color:#041c00;box-shadow:0 0 6px rgba(83,252,24,.55);animation:ovFwordsBadgePulse 1.8s ease-out 2}
/* Badge line sits on its OWN row UNDER the username — keeps narrow overlay
   columns from vertically stacking the badge letters or pushing text off. */
.ov-fbadge-row{display:flex;gap:4px;margin:1px 0 2px;flex-wrap:wrap}
.ov-text{display:block;width:100%}
.ov-ev-gift{display:flex;align-items:center;gap:5px;margin-top:4px;padding:3px 6px;background:rgba(255,255,255,.06);border-radius:6px;font-size:11px;max-width:100%;overflow:hidden;flex-wrap:wrap}
.ov-ev-gift img{width:24px;height:24px;border-radius:4px;object-fit:contain;flex-shrink:0}
.ov-ev-gift .hidden{display:none}
/* gift-count / gift-diamonds come from index.html's buildGiftHTML output.
   TikTok gift thumbnails only render when Tikfinity supplies a CDN URL —
   no bundled fallback art, so no inline-SVG sizing rules needed here. */
.ov-ev-gift .gift-count{background:var(--tt);color:#000;font-size:10px;font-weight:900;border-radius:8px;padding:1px 5px;white-space:nowrap;flex-shrink:0}
.ov-ev-gift .gift-diamonds{color:var(--mut);font-size:10px;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;flex-shrink:0}
.ov-ev-gift .gift-diamonds svg{width:10px;height:10px;flex-shrink:0}
.ov-msg.first-msg{background:linear-gradient(90deg,rgba(255,200,0,.18),transparent);border-left-color:#ffd700!important}
.ov-msg.first-words{background:linear-gradient(90deg,rgba(83,252,24,.14),transparent);border-left-color:#53fc18!important}
.ov-msg.first-words .ov-user{position:relative;padding:1px 5px;border-radius:4px;animation:ovFwordsNamePulse 2.4s ease-out 1 both}
.ov-msg.first-words .ov-user::before{content:"";position:absolute;inset:-2px;border-radius:6px;border:2px solid #53fc18;opacity:0;animation:ovFwordsRing 1.6s ease-out 2 both;pointer-events:none}
@keyframes ovFwordsNamePulse{
  0%{box-shadow:0 0 0 0 rgba(83,252,24,.7),0 0 14px 2px rgba(83,252,24,.55);background:rgba(83,252,24,.22)}
  40%{box-shadow:0 0 0 6px rgba(83,252,24,0),0 0 18px 4px rgba(83,252,24,.35);background:rgba(83,252,24,.12)}
  100%{box-shadow:0 0 0 0 rgba(83,252,24,0),0 0 0 0 rgba(83,252,24,0);background:rgba(83,252,24,.05)}
}
@keyframes ovFwordsRing{
  0%{opacity:.95;transform:scale(.88)}
  60%{opacity:.55;transform:scale(1.14)}
  100%{opacity:0;transform:scale(1.28)}
}
@keyframes ovFwordsBadgePulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.14)}
}

/* ── Event toast (compact, below feed) ────────────────────────── */
@keyframes evToastIn{
  0%{opacity:0;transform:translateY(-8px) scale(.95)}
  60%{opacity:1;transform:translateY(1px) scale(1.01)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes evToastOut{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(6px) scale(.95)}
}
@keyframes evToastShine{
  0%{transform:translateX(-120%) skewX(-18deg)}
  100%{transform:translateX(220%) skewX(-18deg)}
}
/* Event area is fixed at the bottom inside the reserved padding-bottom space
   so it never covers chat and never shifts the flex layout. Height auto-
   expands upward for tall events (e.g. gift+message toasts) so the bottom
   row never gets clipped — min-height keeps the empty-state reservation. */
.ov-event-area{position:fixed;bottom:0;left:0;right:0;min-height:64px;display:flex;align-items:flex-end;justify-content:center;z-index:180;pointer-events:none;padding:6px 10px 10px;box-sizing:border-box;overflow:visible}
.ov-event-area .ov-event{pointer-events:auto}
.ov-event{
  position:relative;
  padding:10px 18px;
  border-radius:12px;
  font-size:15px;
  font-weight:700;
  line-height:1.35;
  animation:evToastIn .45s cubic-bezier(.34,1.56,.64,1) both;
  border:2px solid var(--ev);
  border-left-width:5px;
  background:linear-gradient(135deg,rgba(240,180,41,.22),rgba(240,180,41,.08));
  box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 16px rgba(240,180,41,.35);
  text-align:center;
  min-width:min(300px,92%);
  max-width:97%;
  width:max-content;
  overflow:hidden;
  backdrop-filter:blur(10px);
  color:#fff;
  text-shadow:0 1px 6px rgba(0,0,0,.7);
}
.ov-event::after{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.2) 50%,transparent 65%);
  pointer-events:none;
  animation:evToastShine 2.2s ease-in-out infinite;
}
.ov-event.tw{border-color:var(--tw);background:linear-gradient(135deg,rgba(145,71,255,.2),rgba(145,71,255,.06));box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 8px rgba(145,71,255,.25)}
.ov-event.yt{border-color:var(--yt);background:linear-gradient(135deg,rgba(255,0,0,.2),rgba(255,0,0,.06));box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 8px rgba(255,0,0,.25)}
.ov-event.tt{border-color:var(--tt);background:linear-gradient(135deg,rgba(0,242,234,.2),rgba(0,242,234,.06));box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 8px rgba(0,242,234,.25)}
.ov-event.kk{border-color:var(--kk);background:linear-gradient(135deg,rgba(83,252,24,.2),rgba(83,252,24,.06));box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 8px rgba(83,252,24,.25)}
.ov-event.se{border-color:var(--se);background:linear-gradient(135deg,rgba(124,223,33,.18),rgba(124,223,33,.06));box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 8px rgba(124,223,33,.25)}
.ov-event.cc{border-color:var(--cc);background:linear-gradient(135deg,rgba(245,165,36,.18),rgba(245,165,36,.06));box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 8px rgba(245,165,36,.25)}
.ov-event.out{animation:evToastOut .35s cubic-bezier(.4,0,.6,1) forwards}
.ov-ev-head{display:block}
.ov-ev-user{color:var(--ev);font-weight:900;font-size:16px;text-shadow:0 0 10px currentColor;margin-right:5px}
.ov-ev-msg{margin-top:5px;padding:5px 10px;font-size:12px;font-style:italic;color:#e9e9ef;background:rgba(255,255,255,.06);border-left:2px solid rgba(255,255,255,.35);border-radius:4px;line-height:1.4;word-break:break-word;animation:ovEvMsgIn .35s .1s ease-out both}
.ov-ev-msg::before{content:'\201C';opacity:.55;margin-right:2px}
.ov-ev-msg::after{content:'\201D';opacity:.55;margin-left:2px}
@keyframes ovEvMsgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ov-event.tw .ov-ev-user{color:var(--tw)}.ov-event.yt .ov-ev-user{color:var(--yt)}
.ov-event.tt .ov-ev-user{color:var(--tt)}.ov-event.kk .ov-ev-user{color:var(--kk)}

/* ── Big Banner (subs, gifts, cheers) ──────────────────────────── */
/* Multi-stage spring entry: drops in big with a small overshoot, settles, then a tiny re-bounce */
@keyframes ovBnrIn{
  0%{opacity:0;transform:translateY(-50%) scale(.35) translateX(40px) rotate(-6deg);filter:blur(6px)}
  35%{opacity:1;transform:translateY(-50%) scale(1.18) translateX(-8px) rotate(2deg);filter:blur(0)}
  55%{transform:translateY(-50%) scale(.96) translateX(4px) rotate(-1deg)}
  75%{transform:translateY(-50%) scale(1.04) translateX(-2px) rotate(.5deg)}
  100%{opacity:1;transform:translateY(-50%) scale(1) translateX(0) rotate(0)}
}
@keyframes ovBnrOut{
  0%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) scale(.78) translateY(40px);filter:blur(4px)}
}
/* Multi-color glow halo cycling around the banner */
@keyframes ovBnrGlow{
  0%,100%{box-shadow:0 0 38px rgba(255,200,80,.65),0 0 80px rgba(255,200,80,.35),inset 0 0 22px rgba(255,200,80,.12)}
  25%{box-shadow:0 0 46px rgba(58,134,255,.75),0 0 96px rgba(58,134,255,.45),inset 0 0 24px rgba(58,134,255,.16)}
  50%{box-shadow:0 0 50px rgba(255,80,180,.78),0 0 100px rgba(255,80,180,.48),inset 0 0 26px rgba(255,80,180,.18)}
  75%{box-shadow:0 0 46px rgba(80,200,255,.75),0 0 96px rgba(80,200,255,.45),inset 0 0 24px rgba(80,200,255,.16)}
}
/* Conic gradient ring rotating behind the banner */
@keyframes ovBnrRing{to{transform:rotate(360deg)}}
/* Diagonal shimmer sweep across the banner surface */
@keyframes ovBnrSweep{
  0%{transform:translateX(-150%) skewX(-22deg);opacity:0}
  20%{opacity:.9}
  80%{opacity:.9}
  100%{transform:translateX(260%) skewX(-22deg);opacity:0}
}
/* Border color cycling for paid events */
@keyframes ovBnrBorder{
  0%,100%{border-color:#ffd700}
  25%{border-color:#3A86FF}
  50%{border-color:#ff66cc}
  75%{border-color:#00E5A0}
}
/* Halo ring that expands outward continuously */
@keyframes ovBnrHalo{
  0%{transform:translate(-50%,-50%) scale(.6);opacity:.85}
  100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}
}
.ov-banner{
  position:fixed;
  top:50%;left:auto;right:auto;bottom:auto;
  transform:translateY(-50%);
  background:linear-gradient(135deg,#1a1a1f 0%,#1a2440 50%,#1a1a1f 100%);
  border:3px solid var(--ev);
  border-radius:clamp(14px,1.8vw,22px);
  padding:clamp(14px,2.4vw,26px) clamp(18px,3vw,36px);
  display:none;
  flex-direction:column;
  align-items:center;
  z-index:200;
  min-width:0;
  width:clamp(220px,70vw,400px);
  max-width:min(88vw,480px);
  pointer-events:none;
  overflow:visible;
  isolation:isolate;
}
/* Side-anchor: if the overlay is on the left half of the screen the banner
   hugs the right edge; if on the right half it hugs the left edge. The JS
   toggles these classes dynamically before each show. */
.ov-banner.side-right{right:6px}
.ov-banner.side-left{left:6px}
.ov-banner::before{
  /* Conic rainbow ring rotating around the banner */
  content:'';
  position:absolute;
  inset:-4px;
  border-radius:20px;
  padding:3px;
  background:conic-gradient(from 0deg,#ffd700,#3A86FF,#ff66cc,#00E5A0,#53fc18,#ffd700);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  mask-composite:exclude;
  animation:ovBnrRing 4s linear infinite;
  pointer-events:none;
  z-index:-1;
  opacity:.85;
}
.ov-banner::after{
  /* Diagonal shine sweep */
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);
  border-radius:18px;
  pointer-events:none;
  animation:ovBnrSweep 2.6s ease-in-out infinite;
  mix-blend-mode:overlay;
}
.ov-banner.show{
  display:flex;
  animation:ovBnrIn .85s cubic-bezier(.34,1.56,.64,1) both,ovBnrGlow 3.2s ease-in-out 0.85s infinite,ovBnrBorder 4s ease-in-out 0.85s infinite;
}
.ov-banner.out{animation:ovBnrOut .45s cubic-bezier(.4,0,.6,1) forwards!important}
.ov-banner.tw{background:linear-gradient(135deg,#1a1a1f 0%,#2a1f3d 50%,#1a1a1f 100%)}
.ov-banner.yt{background:linear-gradient(135deg,#1a1a1f 0%,#3d1f1f 50%,#1a1a1f 100%)}
.ov-banner.kk{background:linear-gradient(135deg,#1a1a1f 0%,#1f3d1f 50%,#1a1a1f 100%)}
.ov-banner.tt{background:linear-gradient(135deg,#1a1a1f 0%,#1f3d3a 50%,#1a1a1f 100%)}
.ov-bn-icon{
  width:clamp(44px,6vw,80px);
  height:clamp(44px,6vw,80px);
  line-height:1;
  margin-bottom:8px;
  color:#ffd700;
  fill:currentColor;
  animation:ovBnrIcon 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 14px rgba(255,215,0,.75)) drop-shadow(0 0 26px rgba(255,200,80,.4));
  transform-origin:center center;
}
.ov-banner.tw .ov-bn-icon{color:#e2c4ff;filter:drop-shadow(0 0 14px rgba(145,71,255,.8)) drop-shadow(0 0 26px rgba(145,71,255,.4))}
.ov-banner.yt .ov-bn-icon{color:#ffb3b3;filter:drop-shadow(0 0 14px rgba(255,0,0,.8)) drop-shadow(0 0 26px rgba(255,0,0,.4))}
.ov-banner.tt .ov-bn-icon{color:#b3faf6;filter:drop-shadow(0 0 14px rgba(0,242,234,.8)) drop-shadow(0 0 26px rgba(0,242,234,.4))}
.ov-banner.kk .ov-bn-icon{color:#cff7b3;filter:drop-shadow(0 0 14px rgba(83,252,24,.8)) drop-shadow(0 0 26px rgba(83,252,24,.4))}
/* Bit cheer tier colors — overrides platform color when banner is a cheer */
@keyframes ovBnBitSpin{0%{transform:scale(0) rotate(-540deg);opacity:0}60%{transform:scale(1.25) rotate(20deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes ovBnBitPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes ovBnBitSparkle{0%{transform:translate(0,0) scale(.2);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1);opacity:0}}
.ov-banner.cheer .ov-bn-icon{animation:ovBnBitSpin .75s cubic-bezier(.34,1.56,.64,1) both,ovBnBitPulse 1.2s ease-in-out .75s infinite}
.ov-banner.bit-tier-gray .ov-bn-icon{color:#c8c8c8;filter:drop-shadow(0 0 14px rgba(200,200,200,.9)) drop-shadow(0 0 28px rgba(200,200,200,.5))!important}
.ov-banner.bit-tier-purple .ov-bn-icon{color:#c39dff;filter:drop-shadow(0 0 14px rgba(145,71,255,.95)) drop-shadow(0 0 28px rgba(145,71,255,.5))!important}
.ov-banner.bit-tier-green .ov-bn-icon{color:#7af2a1;filter:drop-shadow(0 0 14px rgba(31,191,85,.95)) drop-shadow(0 0 28px rgba(31,191,85,.5))!important}
.ov-banner.bit-tier-blue .ov-bn-icon{color:#9ed2ff;filter:drop-shadow(0 0 14px rgba(43,155,255,.95)) drop-shadow(0 0 28px rgba(43,155,255,.5))!important}
.ov-banner.bit-tier-red .ov-bn-icon{color:#ff9aa8;filter:drop-shadow(0 0 14px rgba(255,51,85,.95)) drop-shadow(0 0 28px rgba(255,51,85,.5))!important}
.ov-banner.bit-tier-orange .ov-bn-icon{color:#ffd195;filter:drop-shadow(0 0 14px rgba(255,138,31,.95)) drop-shadow(0 0 28px rgba(255,138,31,.5))!important}
.ov-bn-sparkles{position:absolute;top:40px;left:50%;width:0;height:0;pointer-events:none;z-index:5}
.ov-bn-sparkles i{position:absolute;top:0;left:0;width:7px;height:7px;margin:-3px 0 0 -3px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor,0 0 16px currentColor;animation:ovBnBitSparkle .85s cubic-bezier(.2,.8,.4,1) both}
@keyframes ovBnrIcon{
  0%,100%{transform:scale(1) rotate(0deg)}
  20%{transform:scale(1.32) rotate(-12deg)}
  40%{transform:scale(1.14) rotate(0deg)}
  60%{transform:scale(1.28) rotate(12deg)}
  80%{transform:scale(1.1) rotate(0deg)}
}
@keyframes ovBnrTextIn{
  0%{opacity:0;transform:translateY(14px);filter:blur(4px)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}
}
.ov-bn-title{
  font-size:clamp(20px,2.6vw,34px);

  text-shadow:0 2px 12px rgba(0,0,0,.8),0 0 18px rgba(255,215,0,.45);

}
@keyframes ovBnrAmtPop{
  0%{opacity:0;transform:scale(0) rotate(-200deg)}
  55%{opacity:1;transform:scale(1.45) rotate(10deg)}

}

}

/* ── Raid Splash (full overlay takeover) ────────────────────────── */
@keyframes ovRaidIn{0%{opacity:0;transform:scale(.4) rotate(-12deg)}60%{transform:scale(1.1) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes ovRaidOut{from{opacity:1}to{opacity:0;transform:scale(.85)}}
@keyframes ovRaidGlow{0%,100%{box-shadow:0 0 40px rgba(145,71,255,.7),inset 0 0 40px rgba(145,71,255,.2)}50%{box-shadow:0 0 80px rgba(145,71,255,1),inset 0 0 60px rgba(145,71,255,.4)}}
@keyframes ovRaidShake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-3px)}20%,40%,60%,80%{transform:translateX(3px)}}
.ov-raid{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:300;background:radial-gradient(ellipse at center,rgba(145,71,255,.3) 0%,rgba(0,0,0,.85) 70%);animation:ovBnrIn .4s ease-out both;pointer-events:none}
.ov-raid.show{display:flex}
.ov-raid.out{animation:ovRaidOut .4s ease-in forwards}
.ov-raid.kk{background:radial-gradient(ellipse at center,rgba(83,252,24,.3) 0%,rgba(0,0,0,.85) 70%)}
.ov-raid-card{background:linear-gradient(135deg,#1a1a1f 0%,#2a1a3d 100%);border:3px solid var(--tw);border-radius:16px;padding:18px 26px;text-align:center;animation:ovRaidIn .8s cubic-bezier(.34,1.56,.64,1) both,ovRaidGlow 1.8s ease-in-out 0.8s infinite;max-width:90%}
.ov-raid.kk .ov-raid-card{border-color:var(--kk)}
.ov-raid.kk .ov-raid-card{background:linear-gradient(135deg,#1a1a1f 0%,#1a3d1a 100%)}
.ov-raid-icon{font-size:42px;line-height:1;margin-bottom:6px;animation:ovRaidShake .5s ease-in-out infinite}
.ov-raid-title{font-size:11px;font-weight:900;color:var(--tw);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.ov-raid.kk .ov-raid-title{color:var(--kk)}
.ov-raid-name{font-size:20px;font-weight:900;color:#fff;text-shadow:0 2px 12px rgba(145,71,255,.7);margin-bottom:2px;word-break:break-word}
.ov-raid.kk .ov-raid-name{text-shadow:0 2px 12px rgba(83,252,24,.7)}
.ov-raid-cnt{font-size:13px;font-weight:700;color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.5);margin-top:4px}

/* ── Hype Train LEVEL UP (full overlay takeover) ──────────────── */
@keyframes ovHluFade{from{opacity:0}to{opacity:1}}
@keyframes ovHluFadeOut{from{opacity:1}to{opacity:0}}
@keyframes ovHluCardSpin{0%{transform:scale(0) rotate(-720deg);opacity:0;filter:blur(8px)}55%{transform:scale(1.22) rotate(15deg);opacity:1;filter:blur(0)}80%{transform:scale(.95) rotate(-4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes ovHluCardPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes ovHluLabelShift{0%,100%{letter-spacing:6px}50%{letter-spacing:10px}}
@keyframes ovHluNumPop{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
@keyframes ovHluRaySpin{from{transform:rotate(var(--a,0deg))}to{transform:rotate(calc(var(--a,0deg) + 360deg))}}
@keyframes ovHluRayFade{0%{opacity:0}30%{opacity:.85}100%{opacity:.4}}
#ovHypeLevelUp{position:fixed;inset:0;z-index:305;pointer-events:none;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(240,136,62,.42) 0%,rgba(0,0,0,.88) 72%);opacity:0}
#ovHypeLevelUp.show{display:flex;animation:ovHluFade .55s ease-out forwards}
#ovHypeLevelUp.out{animation:ovHluFadeOut .45s ease-in forwards}
.ov-hlu-card{position:relative;text-align:center;color:#fff;animation:ovHluCardSpin 1.1s cubic-bezier(.34,1.56,.64,1) both,ovHluCardPulse 1.4s ease-in-out 1.1s infinite}
.ov-hlu-label{font-size:12px;font-weight:900;color:#ffd700;letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 14px rgba(255,215,0,.85),0 0 28px rgba(240,136,62,.6);margin-bottom:4px;animation:ovHluLabelShift 2.4s ease-in-out infinite}
.ov-hlu-title{font-size:clamp(40px,9vw,78px);font-weight:900;line-height:1;background:linear-gradient(180deg,#fff 0%,#ffd700 35%,#f0883e 65%,#c85a00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 16px rgba(240,136,62,.9)) drop-shadow(0 0 36px rgba(255,215,0,.55));margin:0;letter-spacing:-2px}
.ov-hlu-level{margin-top:6px;font-size:clamp(16px,2.4vw,22px);font-weight:900;color:#fff;text-shadow:0 0 12px rgba(240,136,62,.9)}
.ov-hlu-level b{color:#ffd700;font-size:clamp(22px,3vw,32px);display:inline-block;margin-left:8px;animation:ovHluNumPop 1.4s ease-in-out infinite}
.ov-hlu-rays{position:absolute;left:50%;top:50%;width:0;height:0;pointer-events:none;z-index:-1}
.ov-hlu-rays i{position:absolute;left:0;top:0;width:2px;height:420px;margin:-210px 0 0 -1px;background:linear-gradient(180deg,rgba(255,215,0,0),rgba(255,215,0,.55) 20%,rgba(240,136,62,.85) 50%,rgba(255,215,0,.55) 80%,rgba(255,215,0,0));transform-origin:0 210px;animation:ovHluRaySpin 4s linear infinite,ovHluRayFade 1.1s ease-out both}

/* ── Chat input ───────────────────────────────────────────────── */
.ov-chat-bar{display:flex;align-items:flex-end;gap:6px;padding:6px 8px;background:var(--surf);border-top:1px solid var(--bdr);flex-shrink:0}
.ov-chat-bar.hidden{display:none}
.ov-chat-input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:inherit;font-size:12px;padding:6px 8px;resize:none;outline:none;max-height:90px;min-height:28px;line-height:1.4}
.ov-chat-input:focus{border-color:#3A86FF;background:rgba(58,134,255,.08)}
.ov-chat-input::placeholder{color:var(--mut);opacity:.7}
.ov-chat-send{background:#3A86FF;color:#fff;border:none;border-radius:6px;font-weight:700;font-size:11px;padding:0 12px;height:28px;cursor:pointer;flex-shrink:0;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.ov-chat-send:hover{background:#5CA3FF}
.ov-chat-send:disabled{background:rgba(255,255,255,.08);color:var(--mut);cursor:not-allowed}

/* ── Quick-actions hotbar (mirrors the main app's SB actions hotbar) ── */
.ov-hotbar{display:flex;gap:5px;padding:6px 8px;background:var(--surf);border-top:1px solid var(--bdr);flex-shrink:0;flex-wrap:wrap;align-items:center;border-radius:0 0 8px 8px}
.ov-hotbar.hidden{display:none}
.ov-hotbar-lbl{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--mut);text-transform:uppercase;padding-right:2px;flex-shrink:0}
.ov-hbtn{background:linear-gradient(180deg,rgba(58,134,255,.22),rgba(58,134,255,.12));border:1px solid rgba(58,134,255,.45);color:#efeff1;font-size:11px;font-weight:700;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.3px;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.ov-hbtn:hover{background:linear-gradient(180deg,rgba(58,134,255,.38),rgba(58,134,255,.22));border-color:rgba(58,134,255,.75);transform:translateY(-1px);box-shadow:0 3px 10px rgba(58,134,255,.35)}
.ov-hbtn:active{transform:translateY(0)}
.ov-hbtn-firing{animation:ovHbtnFire .55s ease}
@keyframes ovHbtnFire{0%{box-shadow:0 0 0 0 rgba(58,134,255,.9)}50%{box-shadow:0 0 0 8px rgba(58,134,255,0)}100%{box-shadow:0 0 0 0 rgba(58,134,255,0)}}
.ov-hotbar-empty{font-size:10px;color:var(--mut);font-style:italic;padding:4px 0}

/* ── Window shake for big paid events ──────────────────────────── */
@keyframes ovShake{
  0%,100%{transform:translate(0,0) rotate(0)}
  10%{transform:translate(-6px,3px) rotate(-.4deg)}
  20%{transform:translate(7px,-3px) rotate(.5deg)}
  30%{transform:translate(-5px,4px) rotate(-.3deg)}
  40%{transform:translate(6px,-2px) rotate(.4deg)}
  50%{transform:translate(-4px,3px) rotate(-.2deg)}
  60%{transform:translate(4px,-3px) rotate(.2deg)}
  70%{transform:translate(-3px,2px) rotate(-.15deg)}
  80%{transform:translate(3px,-2px) rotate(.1deg)}

}
body.ov-shake > *:not(.ov-raid):not(.ov-confetti-canvas):not(svg):not(#ovHypeLevelUp):not(.ov-banner){animation:ovShake .55s cubic-bezier(.36,.07,.19,.97) both}

/* ── Confetti ────────────────────────────────────────────────── */
.ov-confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:250}

/* ── Activity color shift ─────────────────────────────────────
   When chat or events come in we briefly tint the overlay surface
   with the platform colour. The pulse decays quickly so the
   overlay never stays loud unless activity is continuous. */
@keyframes ovActivityPulse{
  0%{box-shadow:inset 0 0 0 0 transparent}
  20%{box-shadow:inset 0 0 60px 6px var(--pulse-col,rgba(255,255,255,.18))}
  100%{box-shadow:inset 0 0 0 0 transparent}
}
@keyframes ovActivityBorder{
  0%{border-color:var(--bdr)}
  25%{border-color:var(--pulse-col,rgba(255,255,255,.4))}
  100%{border-color:var(--bdr)}
}
body{position:relative;--pulse-col:rgba(255,255,255,.18)}
/* Activity pulse glow stops above the bottom event area (72px reserve). The
   event toast has its own pop animation; we don't want the chat-pulse halo
   bleeding down behind it. */
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:72px;
  pointer-events:none;
  z-index:180;
  border-radius:8px;
  box-shadow:inset 0 0 0 0 transparent;
  transition:box-shadow .25s ease;
}
body.activity-pulse::before{
  animation:ovActivityPulse 1.1s cubic-bezier(.16,1,.3,1) forwards;
}
body.activity-pulse .ov-drag,
body.activity-pulse .ov-live,
body.activity-pulse .ov-stats,
body.activity-pulse .ov-chat-bar{
  animation:ovActivityBorder 1.1s ease forwards;
}
body.pulse-tw{--pulse-col:rgba(145,71,255,.35)}
body.pulse-yt{--pulse-col:rgba(255,0,0,.35)}
body.pulse-tt{--pulse-col:rgba(0,242,234,.35)}
body.pulse-kk{--pulse-col:rgba(83,252,24,.35)}
body.pulse-se{--pulse-col:rgba(124,223,33,.4)}
body.pulse-ev{--pulse-col:rgba(255,215,0,.45)}

/* New chat row pop — replaces the old fade so messages feel alive */
@keyframes ovMsgInPop{
  0%{opacity:0;transform:translateY(14px) scale(.96);filter:blur(2px)}
  60%{opacity:1;transform:translateY(-2px) scale(1.01);filter:blur(0)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}

/* Reduced motion fallback */
@media (prefers-reduced-motion:reduce){
  .ov-banner.show,.ov-banner.out,.ov-event,.ov-event.out,
  .ov-banner::before,.ov-banner::after,.ov-event::after,
  body.activity-pulse::before,
  body.activity-pulse .ov-drag,body.activity-pulse .ov-live,
  body.activity-pulse .ov-stats,body.activity-pulse .ov-chat-bar{
    animation-duration:.001s!important;
    animation-iteration-count:1!important;
  }
}

/* (stats bar styles consolidated above) */

/* ═══════════════════════════════════════════════════════════════════════
   Pop-out layout presets (EA-only) — applied via body class switches from
   the 'popout-layout' IPC handler. Each preset makes targeted tweaks to
   spacing / chrome / typography; nothing restructures the DOM, so any
   feature that works in Default works in every preset.

   .layout-compact — denser text, thinner padding, stats bar collapsed.
                     For streamers who want more chat history on screen.
   .layout-minimal — strips borders, avatars shrink, stats bar hidden.
                     Lean "pure chat" feel.
   .layout-hud     — tightens chrome, brightens accents, adds scan-line
                     noise. Reads as a gamer HUD without feeling busy.
   ═══════════════════════════════════════════════════════════════════════ */

body.layout-compact .msg { padding: 2px 4px; font-size: 12px; gap: 4px; }
body.layout-compact .msg .mavatar { width: 18px; height: 18px; }
body.layout-compact .mbody { gap: 0; }
body.layout-compact .mmeta { font-size: 10px; }
body.layout-compact .ov-stats { padding: 4px 8px; font-size: 10px; }

body.layout-minimal .msg { background: transparent !important; border: 0 !important; padding: 3px 6px; }
body.layout-minimal .mavatar { display: none; }
body.layout-minimal .ov-stats { display: none; }
body.layout-minimal .ov-header { opacity: .5; }
body.layout-minimal .mbody .mmeta .mtime { display: none; }

body.layout-hud { background: transparent; }
body.layout-hud .msg {
  border-left: 2px solid currentColor;
  padding-left: 8px;
  background: linear-gradient(90deg, rgba(58,134,255,.08), transparent 60%) !important;
}
body.layout-hud .msg.tw { color: #a970ff; }
body.layout-hud .msg.yt { color: #ff4545; }
body.layout-hud .msg.tt { color: #fe2c55; }
body.layout-hud .msg.kk { color: #53fc18; }
body.layout-hud .msg .mname { text-transform: uppercase; letter-spacing: .04em; font-size: .95em; }
body.layout-hud::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 3px);
  z-index: 9998;
}
</style>

<script>
"use strict";
var api = window.electronAPI || {};

// ── State ──────────────────────────────────────────────────────
// All settings are owned by the main app and pushed via the 'config' IPC
// message. The overlay is a pure renderer of pushed config + stream data.
var cfg = {
  showChat: true, showViewers: true, showRevenue: true, showHype: true, showEvents: true,
  showAvatars: true, showBadges: true, showHotbar: true, hideAnimations: false,
  platTw: true, platYt: true, platTt: true, platKk: true,
  bgOpacity: 0.80, winOpacity: 1.00, textSize: 13, maxMsgs: 40, clickThrough: false,
  hotbar: []
};
var feed = document.getElementById('ovFeed');
var eventArea = document.getElementById('ovEventArea');
var _evTimer = null, _evQueue = [];

// ── Activity pulse — briefly tints the overlay surface when chat
// or events arrive. Single shared timer so rapid messages don't
// stack and the pulse never gets stuck on. The "kind" param picks
// which colour the pulse uses (platform key or 'ev' / 'se').
var _pulseTimer = null;
var PULSE_CLASSES = ['pulse-tw','pulse-yt','pulse-tt','pulse-kk','pulse-se','pulse-ev'];
function triggerActivityPulse(kind) {
  var body = document.body;
  PULSE_CLASSES.forEach(function(c) { body.classList.remove(c); });
  if (kind && PULSE_CLASSES.indexOf('pulse-' + kind) !== -1) {
    body.classList.add('pulse-' + kind);
  }
  body.classList.remove('activity-pulse');
  // force reflow so the animation re-fires
  void body.offsetWidth;
  body.classList.add('activity-pulse');
  if (_pulseTimer) clearTimeout(_pulseTimer);
  _pulseTimer = setTimeout(function() {
    body.classList.remove('activity-pulse');
    PULSE_CLASSES.forEach(function(c) { body.classList.remove(c); });
  }, 1150);
}

// ── Load saved overlay settings ──────────────────────────────
function loadCfg() {
  try {
    var d = JSON.parse(localStorage.getItem('sf_overlay_cfg') || '{}');
    Object.keys(cfg).forEach(function(k) { if (d[k] !== undefined) cfg[k] = d[k]; });
  } catch(e) {}
}
function saveCfg() {
  localStorage.setItem('sf_overlay_cfg', JSON.stringify(cfg));
}
loadCfg();
// Always open the pop-out in a clickable state. If the user previously saved
// clickThrough:true, we still start unlocked so they can interact with the
// window immediately. They can re-lock via the header lock button or the
// main app lock icon.
cfg.clickThrough = false;

// ── Opacity helper — sets CSS custom properties for surface backgrounds ──
function applyBgOpacity() {
  var a = cfg.bgOpacity;
  document.documentElement.style.setProperty('--surf', 'rgba(14,14,16,' + a + ')');
  document.documentElement.style.setProperty('--surf2', 'rgba(14,14,16,' + (a * 0.8) + ')');
}

// ── Apply config to UI ──────────────────────────────────────
function applyConfig() {
  document.documentElement.style.setProperty('--chat-size', cfg.textSize + 'px');
  applyBgOpacity();
  applyWinOpacity();
  applyClickThrough(cfg.clickThrough);
  renderHotbar();
}

// ── Quick-action hotbar ─────────────────────────────────────
// Buttons mirror the main app's SB actions hotbar. Clicks send the index
// back to main via IPC, which routes to fireHotbarAction(idx) in the main
// renderer. Overlay never touches the SB websocket directly.
function renderHotbar() {
  var bar = document.getElementById('ovHotbar');
  var btns = document.getElementById('ovHotbarBtns');
  if (!bar || !btns) return;
  var list = Array.isArray(cfg.hotbar) ? cfg.hotbar : [];
  if (!cfg.showHotbar || !list.length) {
    bar.classList.add('hidden');
    btns.innerHTML = '';
    return;
  }
  bar.classList.remove('hidden');
  btns.innerHTML = list.map(function(a, i) {
    var label = esc(a.label || a.name || ('Action ' + (i + 1)));
    var title = 'Run SB action: ' + esc(a.name || label);
    return '<button class="ov-hbtn" data-idx="' + i + '" title="' + title + '">' + label + '</button>';
  }).join('');
  // Delegate clicks so we don't need to rewire on every render
  btns.querySelectorAll('.ov-hbtn').forEach(function(b) {
    b.addEventListener('click', function() {
      var idx = parseInt(b.getAttribute('data-idx'), 10);
      if (isNaN(idx)) return;
      b.classList.add('ov-hbtn-firing');
      setTimeout(function() { b.classList.remove('ov-hbtn-firing'); }, 600);
      if (api.overlayFireHotbar) api.overlayFireHotbar(idx);
    });
  });
}

// ── Window-level opacity (Electron setOpacity via IPC) ──────
function applyWinOpacity() {
  if (api.overlaySetOpacity) api.overlaySetOpacity(cfg.winOpacity);
}

applyConfig();

// ── Click-through mode ─────────────────────────────────────
function applyClickThrough(enabled) {
  document.body.classList.toggle('clickthrough', enabled);
  if (enabled) document.body.classList.remove('interactive');
  if (api.overlayClickThrough) api.overlayClickThrough(enabled);
  var btn = document.getElementById('ovLockBtn');
  if (btn) {
    btn.classList.toggle('lock-on', enabled);
    btn.innerHTML = enabled ? '&#128274;' : '&#128275;';
    btn.title = enabled ? 'Locked — click to unlock' : 'Lock overlay (mouse passes through)';
  }
  // Notify main process so the main app header lock icon stays in sync
  if (api.overlayLockChanged) api.overlayLockChanged(enabled);
}

if (api.onOverlayToggleInteract) {
  api.onOverlayToggleInteract(function() {
    // Full lock/unlock toggle so the hotkey is a true escape hatch
    cfg.clickThrough = !cfg.clickThrough;
    applyClickThrough(cfg.clickThrough);
    saveCfg();
  });
}

// Hold-Ctrl-to-interact: while the overlay is locked (click-through),
// holding the global Ctrl key temporarily makes the overlay interactive.
// Releasing Ctrl returns it to click-through. The Ctrl state is detected
// by a PowerShell child process in the main process — this works even
// when the overlay window has no focus (fullscreen game scenario).
var _holdActive = false;
if (api.onOverlayHoldKey) {
  api.onOverlayHoldKey(function(down) {
    if (!cfg.clickThrough) return; // Only meaningful while locked
    if (down && !_holdActive) {
      _holdActive = true;
      document.body.classList.add('interactive');
      if (api.overlayClickThrough) api.overlayClickThrough(false);
    } else if (!down && _holdActive) {
      _holdActive = false;
      document.body.classList.remove('interactive');
      if (api.overlayClickThrough) api.overlayClickThrough(true);
    }
  });
}

// ── Window controls ─────────────────────────────────────────
document.getElementById('ovCloseBtn').addEventListener('click', function() {
  if (api.closeOverlay) api.closeOverlay();
  else window.close();
});
document.getElementById('ovLockBtn').addEventListener('click', function() {
  cfg.clickThrough = !cfg.clickThrough;
  applyClickThrough(cfg.clickThrough);
  saveCfg();
});

// ── Chat send ───────────────────────────────────────────────
// The overlay never owns platform credentials. We hand the text off to the
// main app via IPC and it routes through whichever platforms the user has
// enabled in the in-app composer.
(function() {
  var input = document.getElementById('ovChatInput');
  var btn = document.getElementById('ovChatSend');
  if (!input || !btn) return;
  function autosize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 90) + 'px';
  }
  function doSend() {
    var text = (input.value || '').trim();
    if (!text) return;
    if (api.sendOverlayChat) api.sendOverlayChat({ text: text });
    input.value = '';
    autosize();
    input.focus();
  }
  input.addEventListener('input', autosize);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });
  btn.addEventListener('click', doSend);
})();

// ── Helpers ──────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function platAllowed(p) {
  var m = {tw:'platTw',yt:'platYt',tt:'platTt',kk:'platKk'};
  return m[p] ? cfg[m[p]] : true;
}

// ── Chat messages ───────────────────────────────────────────
function addMsg(d) {
  if (!cfg.showChat) return;
  if (!platAllowed(d.plat)) return;
  var el = document.createElement('div');
  var fc = d.isFirstMsg ? ' first-msg' : (d.isFirstWords ? ' first-words' : '');
  el.className = 'ov-msg ' + (d.plat || '') + fc;

  var parts = '';

var _confCanvas = document.getElementById('ovConfetti');

function fireConfetti(count) {
  if (cfg.hideAnimations) return;
  var colors = ['#3A86FF','#ff0000','#00E5A0','#53fc18','#ffd700','#ff66cc','#ffffff'];
  var w = _confCanvas.width;
  for (var i = 0; i < count; i++) {
    _confParticles.push({
      x: w / 2 + (Math.random() - 0.5) * 80,
      y: 60,
      vx: (Math.random() - 0.5) * 10,
      vy: -Math.random() * 12 - 4,
      g: 0.35,
      size: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.3,
      life: 0,
      max: 180 + Math.random() * 80
    });
  }
  if (!_confRaf) _confRaf = requestAnimationFrame(_confTick);
}
function _confTick() {
  _confCtx.clearRect(0, 0, _confCanvas.width, _confCanvas.height);
  for (var i = _confParticles.length - 1; i >= 0; i--) {
    var p = _confParticles[i];
    p.vy += p.g;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life++;
    if (p.life > p.max || p.y > _confCanvas.height + 20) {
      _confParticles.splice(i, 1);
      continue;
    }
    _confCtx.save();
    _confCtx.translate(p.x, p.y);
    _confCtx.rotate(p.rot);
    _confCtx.globalAlpha = Math.max(0, 1 - p.life / p.max);
    _confCtx.fillStyle = p.color;
    _confCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    _confCtx.restore();
  }
  if (_confParticles.length) {
    _confRaf = requestAnimationFrame(_confTick);
  } else {
    _confRaf = null;
  }
}

    el.classList.remove('show');
    el.classList.add('out');
    setTimeout(function() { el.classList.remove('out'); }, 450);
  }, 3400);
}
var _ovHypeAC = null;
function _ovPlayHypeFanfare() {
  try {
    if (!_ovHypeAC) _ovHypeAC = new (window.AudioContext || window.webkitAudioContext)();
    var ac = _ovHypeAC;
    if (ac.state === 'suspended') ac.resume();
    var now = ac.currentTime;
    var notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
    var start = now + 0.02;
    notes.forEach(function(f, i) {
      var t0 = start + i * 0.12;
      var t1 = t0 + (i === notes.length - 1 ? 0.9 : 0.16);
      var o = ac.createOscillator();
      var g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(f, t0);
      o.frequency.exponentialRampToValueAtTime(f * 1.01, t1);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.15, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t1);
      var bp = ac.createBiquadFilter();
      bp.type = 'lowpass';
      bp.frequency.setValueAtTime(2400, t0);
      bp.Q.value = 0.7;
      o.connect(bp).connect(g).connect(ac.destination);
      o.start(t0);
      o.stop(t1 + 0.02);
    });
    var sub = ac.createOscillator();
    var subG = ac.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(82.41, start);
    sub.frequency.exponentialRampToValueAtTime(130.81, start + 0.7);
    subG.gain.setValueAtTime(0.0001, start);
    subG.gain.exponentialRampToValueAtTime(0.2, start + 0.08);
    subG.gain.exponentialRampToValueAtTime(0.0001, start + 1.4);
    sub.connect(subG).connect(ac.destination);
    sub.start(start);
    sub.stop(start + 1.45);
  } catch (e) {}
}

// ── Poll display ────────────────────────────────────────────
var _pollTimer = null;
function updatePoll(d) {
  var el = document.getElementById('ovPoll');
  if (!d || d.status === 'ended') {
    // show winner briefly then hide
    if (d && d.winner) {
      _renderPollChoices(d.choices || [], d.winner);
      var st = document.getElementById('ovPollStatus');
      st.textContent = 'ENDED'; st.className = 'ov-poll-status ended';
      document.getElementById('ovPollTitle').textContent = d.title || 'Poll';
      el.classList.remove('hidden');
      if (_pollTimer) clearTimeout(_pollTimer);
      _pollTimer = setTimeout(function() { el.classList.add('hidden'); }, 8000);
    } else { el.classList.add('hidden'); }
    return;
  }
  if (_pollTimer) { clearTimeout(_pollTimer); _pollTimer = null; }
  el.classList.remove('hidden');
  document.getElementById('ovPollTitle').textContent = d.title || 'Poll';
  var st = document.getElementById('ovPollStatus');
  st.textContent = 'ACTIVE'; st.className = 'ov-poll-status';
  _renderPollChoices(d.choices || [], '');
}
function _renderPollChoices(choices, winner) {
  var box = document.getElementById('ovPollChoices'); box.innerHTML = '';
  var total = 0;
  for (var i = 0; i < choices.length; i++) total += (choices[i].votes || 0);
  for (var i = 0; i < choices.length; i++) {
    var c = choices[i], pct = total > 0 ? Math.round((c.votes || 0) / total * 100) : 0;
    var row = document.createElement('div'); row.className = 'ov-poll-choice';
    if (winner && (c.title || '').toLowerCase() === winner.toLowerCase()) row.classList.add('winner');
    var bar = document.createElement('div'); bar.className = 'ov-poll-choice-bar'; bar.style.width = pct + '%';
    var name = document.createElement('span'); name.className = 'ov-poll-choice-name'; name.textContent = c.title || '?';
    var val = document.createElement('span'); val.className = 'ov-poll-choice-val'; val.textContent = (c.votes || 0) + ' (' + pct + '%)';
    row.appendChild(bar); row.appendChild(name); row.appendChild(val);
    box.appendChild(row);
  }
}

// ── Prediction display ──────────────────────────────────────
var _predTimer = null;
function updatePrediction(d) {
  var el = document.getElementById('ovPred');
  if (!d || d.status === 'ended') {
    el.classList.add('hidden'); return;
  }
  if (_predTimer) { clearTimeout(_predTimer); _predTimer = null; }
  el.classList.remove('hidden');
  document.getElementById('ovPredTitle').textContent = d.title || 'Prediction';
  var st = document.getElementById('ovPredStatus');
  if (d.status === 'locked') { st.textContent = 'LOCKED'; st.className = 'ov-pred-status locked'; }
  else if (d.status === 'resolved') {
    st.textContent = 'RESOLVED'; st.className = 'ov-pred-status resolved';
    _predTimer = setTimeout(function() { el.classList.add('hidden'); }, 8000);
  } else { st.textContent = 'ACTIVE'; st.className = 'ov-pred-status'; }
  _renderPredOutcomes(d.outcomes || [], d.winner || '');
}
function _renderPredOutcomes(outcomes, winner) {
  var box = document.getElementById('ovPredOutcomes'); box.innerHTML = '';
  var totalPts = 0;
  for (var i = 0; i < outcomes.length; i++) totalPts += (outcomes[i].points || 0);
  for (var i = 0; i < outcomes.length; i++) {
    var o = outcomes[i], pct = totalPts > 0 ? Math.round((o.points || 0) / totalPts * 100) : 0;
    var row = document.createElement('div'); row.className = 'ov-pred-outcome';
    if (winner && (o.title || '').toLowerCase() === winner.toLowerCase()) row.classList.add('winner');
    var bar = document.createElement('div'); bar.className = 'ov-pred-outcome-bar';
    if (o.color) bar.style.background = o.color;
    bar.style.width = pct + '%';
    var name = document.createElement('span'); name.className = 'ov-pred-outcome-name'; name.textContent = o.title || '?';
    var val = document.createElement('span'); val.className = 'ov-pred-outcome-val';
    val.textContent = (o.users || 0) + ' \u00B7 ' + _fmtPts(o.points || 0) + (totalPts > 0 ? ' (' + pct + '%)' : '');
    row.appendChild(bar); row.appendChild(name); row.appendChild(val);
    box.appendChild(row);
  }
}
function _fmtPts(n) { return n >= 1000 ? (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K' : String(n); }

// ── Receive data from main window ───────────────────────────
if (api.onOverlayData) {
  api.onOverlayData(function(d) {
    if (!d || !d.type) return;
    if (d.type === 'chat') addMsg(d);
    else if (d.type === 'event') showEvent(d);
    else if (d.type === 'stats') updateStats(d);
    else if (d.type === 'goals') updateGoals(d);
    else if (d.type === 'live') updateLive(d);
    else if (d.type === 'hype') updateHype(d);
    else if (d.type === 'hype-level-up') { triggerHypeAnim(); triggerHypeLevelUpOverlay(d.level); }
    else if (d.type === 'banner') showBigBanner(d);
    else if (d.type === 'raid') showRaidSplash(d);
    else if (d.type === 'poll') updatePoll(d);
    else if (d.type === 'prediction') updatePrediction(d);
    else if (d.type === 'config' && d.cfg) {
      // Config pushed from main app — merge & re-apply.
      // The 'clickThrough' lock state is owned by the lock button + main app
      // lock toggle, NOT by the pushed config (so toggling the lock from the
      // overlay header isn't immediately overwritten).
      Object.keys(d.cfg).forEach(function(k) {
        if (k === 'clickThrough') return;
        if (cfg.hasOwnProperty(k)) cfg[k] = d.cfg[k];
      });
      saveCfg();
      applyConfig();
      // Re-render anything that depends on platform/show toggles
      renderStatsBar();
      renderHotbar();
    }
    else if (d.type === 'shake') {
      shakeOverlayContents();
    }
    else if (d.type === 'popout-layout') {
      // EA-only layout preset. Swap body class; CSS below the current
      // styles defines .layout-compact / .layout-minimal / .layout-hud
      // variants. Falls back to default if an unknown value arrives.
      var valid = { 'default': 1, 'compact': 1, 'minimal': 1, 'hud': 1 };
      var layout = valid[d.layout] ? d.layout : 'default';
      document.body.classList.remove('layout-compact', 'layout-minimal', 'layout-hud');
      if (layout !== 'default') document.body.classList.add('layout-' + layout);
      try { localStorage.setItem('sf_popout_layout', layout); } catch (e) {}
    }
  });
}

// Restore last layout on load so the pop-out opens with the streamer's
// preference instead of flashing the default first.
(function() {
  try {
    var saved = localStorage.getItem('sf_popout_layout');
    if (saved && saved !== 'default') document.body.classList.add('layout-' + saved);
  } catch (e) {}
})();

// Tell main window we're ready
if (api.overlayReady) api.overlayReady();
</script>
