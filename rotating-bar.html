<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreamFusion — Rotating Info Bar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

.bar{
  position:fixed;left:0;right:0;bottom:0;
  height:56px;
  display:flex;align-items:center;
  padding:0 20px;gap:18px;
  background:linear-gradient(180deg,rgba(14,14,16,.86),rgba(14,14,16,.96));
  border-top:1px solid rgba(58,134,255,.35);
  box-shadow:0 -4px 30px rgba(0,0,0,.5),0 -2px 20px rgba(58,134,255,.12);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  isolation:isolate;
}
/* Animated gradient glow line along the top edge */
.bar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,#3A86FF 20%,#00E5A0 50%,#9147ff 80%,transparent 100%);
  background-size:200% 100%;
  animation:scanGlow 6s linear infinite;
  opacity:.85;
  pointer-events:none;
}
@keyframes scanGlow{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}

/* Left brand badge */
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-icon{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#3A86FF,#00E5A0);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(58,134,255,.4);
  flex-shrink:0;
}
.brand-icon svg{width:17px;height:17px;color:#fff;filter:drop-shadow(0 0 3px rgba(255,255,255,.5))}
.brand-name{
  font-size:14px;font-weight:900;letter-spacing:.4px;
  background:linear-gradient(135deg,#3A86FF,#00E5A0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 6px rgba(58,134,255,.4));
}

/* Vertical separator */
.sep{
  width:1px;height:28px;flex-shrink:0;
  background:linear-gradient(to bottom,transparent,rgba(255,255,255,.18),transparent);
}

/* Rotating message area */
.stage{
  flex:1;position:relative;height:100%;
  display:flex;align-items:center;justify-content:center;
  min-width:0;
}
.msg{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  display:flex;align-items:center;gap:9px;
  font-size:16px;font-weight:600;color:#efeff1;
  letter-spacing:.2px;white-space:nowrap;
  text-shadow:0 1px 6px rgba(0,0,0,.6);
  opacity:0;
  transition:opacity .55s ease-in-out,transform .55s ease-in-out;
  will-change:opacity,transform;
  max-width:100%;
  padding:0 8px;
}
.msg.in{opacity:1;transform:translate(-50%,-50%)}
.msg.out{opacity:0;transform:translate(-50%,calc(-50% - 8px))}
.msg.pre{opacity:0;transform:translate(-50%,calc(-50% + 8px))}

.msg .hi{
  background:linear-gradient(135deg,#3A86FF,#00E5A0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  font-weight:900;
  filter:drop-shadow(0 0 6px rgba(58,134,255,.4));
}
.msg .coins{
  color:#ffd700;font-weight:900;
  text-shadow:0 0 10px rgba(255,215,0,.5);
}
.msg .pink{color:#ff66cc;font-weight:800;text-shadow:0 0 10px rgba(255,102,204,.45)}
.msg .galaxy{color:#c39dff;font-weight:900;text-shadow:0 0 10px rgba(145,71,255,.55)}
.msg .burpees{color:#00E5A0;font-weight:900;text-shadow:0 0 10px rgba(0,229,160,.45)}

.gift-icon{
  width:30px;height:30px;object-fit:contain;flex-shrink:0;
  filter:drop-shadow(0 0 6px rgba(255,255,255,.25));
  animation:giftFloat 2.4s ease-in-out infinite;
}
@keyframes giftFloat{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-2px) rotate(3deg)}
}

/* Right brand */
.right{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:700;letter-spacing:.4px;
  color:rgba(255,255,255,.5);
}
.right .dot{
  width:6px;height:6px;border-radius:50%;
  background:#00E5A0;
  box-shadow:0 0 8px rgba(0,229,160,.8);
  animation:pulseDot 2s ease-in-out infinite;
}
@keyframes pulseDot{
  0%,100%{opacity:.6;transform:scale(.85)}
  50%{opacity:1;transform:scale(1.1)}
}
.right .url{
  background:linear-gradient(135deg,#3A86FF,#00E5A0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  font-weight:900;
}

/* Progress indicator */
.progress{
  position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,#3A86FF,#00E5A0);
  box-shadow:0 0 8px rgba(0,229,160,.6);
  width:0%;
  pointer-events:none;
}
.progress.run{animation:progFill 10s linear forwards}
@keyframes progFill{
  from{width:0%}
  to{width:100%}
}
</style>
</head>
<body>

<div class="bar" role="status" aria-live="polite">
  <div class="brand">
    <div class="brand-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
    </div>
    <div class="brand-name">StreamFusion</div>
  </div>

  <div class="sep"></div>

  <div class="stage" id="stage"></div>

  <div class="sep"></div>

  <div class="right">
    <span class="dot"></span>
    <span class="url">aquilo.gg</span>
  </div>

  <div class="progress" id="progress"></div>
</div>

<script>
"use strict";

var HEART_ME_ICON = 'https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/d56945782445b0b8c8658ed44f894c7b~tplv-obj.webp';
var GALAXY_ICON   = 'https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/resource/79a02148079526539f7599150da9fd28.png~tplv-obj.webp';

var messages = [
  'Go to <span class="hi">aquilo.gg</span> to get free TikTok Live streaming tools',
  'Join the fan club with a <img class="gift-icon" src="' + HEART_ME_ICON + '" alt=""><span class="pink">Heart Me</span> to get added to the wall!',
  'Gifts over <span class="coins">500 coins</span> get printed out and put on the wall',
  '<img class="gift-icon" src="' + GALAXY_ICON + '" alt=""><span class="galaxy">Galaxy</span> = <span class="burpees">10 Burpees</span>',
  'Go to <span class="hi">aquilo.gg</span> to join our Discord!'
];

var INTERVAL_MS = 10000;
var CROSSFADE_MS = 550;

// Preload gift icons so the first reveal doesn't flicker
[HEART_ME_ICON, GALAXY_ICON].forEach(function(src){
  var i = new Image(); i.src = src;
});

var stage = document.getElementById('stage');
var progress = document.getElementById('progress');
var nodes = messages.map(function(html){
  var el = document.createElement('div');
  el.className = 'msg pre';
  el.innerHTML = html;
  stage.appendChild(el);
  return el;
});

var idx = 0;

function restartProgress(){
  progress.classList.remove('run');
  // Force reflow so the animation replays from 0%
  void progress.offsetWidth;
  progress.classList.add('run');
}

function show(i){
  nodes.forEach(function(n, j){
    if (j === i){
      n.classList.remove('pre','out');
      n.classList.add('in');
    } else if (n.classList.contains('in')){
      n.classList.remove('in');
      n.classList.add('out');
      // After the fade-out completes, park the node back in the 'pre' state
      setTimeout(function(){
        n.classList.remove('out');
        n.classList.add('pre');
      }, CROSSFADE_MS);
    }
  });
  restartProgress();
}

// First message on load
show(0);

setInterval(function(){
  idx = (idx + 1) % nodes.length;
  show(idx);
}, INTERVAL_MS);
</script>
</body>
</html>
