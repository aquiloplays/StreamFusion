<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- StreamFusion — Standalone Logomark
       Lightning bolt inside a blue-to-teal glow ring.
       Scales cleanly from 16px favicons to 1024px app icons.

       EXPORTING TO PNG:
       - cloudconvert.com (upload SVG, pick PNG, set size)
       - favicon.io/favicon-converter for a full favicon set
       - Inkscape: File > Export PNG Image > set width
       Common sizes: 64, 128, 192, 256, 512, 1024. -->

  <defs>
    <linearGradient id="sf-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#5BFF95"/>
    </linearGradient>

    <linearGradient id="sf-bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#5BFF95"/>
    </linearGradient>

    <filter id="sf-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring (bright) -->
  <circle cx="256" cy="256" r="246" fill="none"
          stroke="url(#sf-ring)" stroke-width="14" opacity="0.9"/>

  <!-- Secondary dim ring for depth -->
  <circle cx="256" cy="256" r="230" fill="none"
          stroke="url(#sf-ring)" stroke-width="4" opacity="0.28"/>

  <!-- Dark inner disc — pure brand base -->
  <circle cx="256" cy="256" r="215" fill="#0a0b12"/>

  <!-- Lightning bolt, centered, with soft glow -->
  <g filter="url(#sf-glow)">
    <path d="M 282 112
             L 164 266
             L 236 266
             L 215 400
             L 338 236
             L 266 236 Z"
          fill="url(#sf-bolt)"/>
  </g>
</svg>
